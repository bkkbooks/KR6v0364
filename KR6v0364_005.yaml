body:
  text: 黃教祖師宗喀巴著邢肅芝譯子二次特於後二度學習理趣謂修奢摩他毘鉢舍那二者如其次第即是禪定智慧波羅密多之所攝故此中分六丑一修止觀德益丑二宣示此二攝一切定丑三止觀體性丑四雙修因相丑五次第决定丑六各別學軌今初解深密經云大小二乘一切世出世間功德均是止觀之果意謂止觀不說為修所得相續之功德而云彼等一切功德均是此二之果如何應理如釋真實止觀時說是修所得相續之功德大小二乘一切功德又非彼二之果所以然者以善緣心心一境性諸三摩地悉皆攝為奢摩他品又凡揀擇如所有性盡所有性諸妙善慧悉皆攝為毘鉢舍那品故密意說三乘所有一切功德皆止觀之果無相違過又解深密經云凡夫若能修止及觀二者當能從相縛粗重縛解脫言粗重者謂能緣顛倒增盛堪能心相續中所住習氣言相者謂於所緣顛倒躭著前後所生習氣般若波羅密多教授論說前為觀所斷後為止所斷此等是引有止觀各自之德利餘未明說止觀二者名目凡說靜慮及智慧德益其義相同應知亦是此二德益丑二宣示此二攝一切定依解深密經說大小乘無邊三摩地我說一切均為止觀所攝故凡求定者不應尋求無邊差別應善尋求攝一切三摩地止觀修要丑三止觀體性分二寅一止體性寅二觀體性今初如解深密經云獨坐空寂處所內正安住如是善思惟法作意思惟之復即於此能思維心內心相續作意思維如是正行多安住故起身輕安及心輕安是名奢摩他經義是說心不他散相續作意心於所緣任運自住爾時所起身心輕安之喜樂此三摩地即奢摩他此由內攝其心不於外境馳散即能生起不須通達諸法真實寅二觀體性即此經云彼由獲得身心輕安為所依止捨離心相既捨離已即於所善思維法內三摩地所行影像觀察勝解如是即於三摩地所行影像於此所了知義能正思擇最極思擇周徧尋周徧伺若忍若樂若覺若見若觀是名毘鉢舍那如是菩薩能善巧毘鉢舍那此中正思擇者謂思擇盡所有性最極思擇者謂思擇如所有性尋謂粗思伺謂細察寶雲經云奢摩他者謂心一境性毘鉢舍那者謂正觀察至尊慈氏亦云總攝諸法名應知此止道思擇諸法義應知為觀道又云由依於正住心安住於心最極思擇法應知是止觀義謂依於正三摩地而住其心是為止最極思擇法慧是為觀菩薩地亦同是說修次中篇云既已止息外境散亂於內所緣恒常相續任運而轉自心住於歡喜輕安是名為止即由住於止時思擇真實是名為觀般若波羅密多教授論亦如是說如菩薩地及般若波羅密多教授論云止觀皆能俱緣如所有性盡所有性是故止觀非就所緣境相而分既有通達空性之止亦有不通達空性之觀凡是止心馳於外境住內所緣即名為止最極觀擇即名為觀有說內心不分別住無明淨分說名為止有明淨分說名為觀此不應理以與前引經論俱相違故尤其此說三摩地僅以有無沈掉而為差別故以一切止三摩地概須離沉凡已離沉諸三摩地心皆定有明淨分故故是否為緣空性之定慧是就其心証與未証二種無我隨一而定以心未趣向無我真實者亦有無量明樂無分別三摩地故雖未獲得真實知見而持其心不作分別現前正住故未解空性生起無分別定無少相違如是由此久攝其心由攝心力氣生堪能此既生已身心法爾能生喜樂故樂生無違喜樂生已即由喜樂受相明了力心得明了故說一切明了安樂無分別定不能立為通達真實諸証空性妙三摩地既有空樂無分別所有未趣入空性三摩地亦有極多樂明無分別故須明辨此二差異丑四雙修因相何故不可單修止觀一種而須雙修何也答如夜間為觀壁畫燃灯若灯明亮無風擾亂則能明見畫像若灯不明或雖明亮而為風動則難明見諸色如是觀察甚深義亦須定解真義無倒妙慧及心於所緣如欲安住而無擾亂乃能明見真實或雖具有心不散亂無分別定若無通達實性妙慧於三摩地如何薰修終不能通達實性或則雖有通達無我之見而無正定令心專一堅固安住亦定不能明見真實故須止觀雙運如修次中篇云離止唯觀瑜伽師心於境散亂不能堅固如風中燭不生極其明了慧光故當双修又云由止力故如無風燭諸分別風不動其心由觀力故永斷一切諸惡見網不為他破月灯經云由止力故無散動由觀力故如山王如是心無沉掉不平等慧住奢摩他定次由觀慧能証真實正攝法經密意說云若心等住乃能如實了知真實修次初篇云心如流水無止為依不能安住心不等住不能如實了知真實薄伽梵亦說若心等住乃能如實了知真實又若成就奢摩他非僅能遮如理觀察無我性慧散動過失亦能遮遣無常業果生死過患慈悲菩提心等所修一切觀慧於所緣境散亂過失各於所緣無散亂故所修眾善皆有大力未得止前多是散心故所修善均悉微劣如入行論云諸人心散亂住煩惱隙中又云雖經長時修念誦苦行等心散所作業佛說無義利丑五次第决定入行論云當知具止觀能摧伏煩惱故應先求止先應成辦止次依止故乃修慧觀若作是念如修次初篇云此二所緣無定是說止之所緣無定前文亦說止之所緣統有法及法性先行了解無我真實緣彼而修則心不他散之止及緣空性之觀可同時起如此何故先行修止後修觀耶答此中觀前而說修止者非說引生通達無我正見須先修止因雖無止亦能引生正見故又此正見內生強力覺受亦不須以止為先以雖無止僅由觀慧數數思擇能生強力覺受不相違故若是相違則修無常生死過患菩提心行引生強力覺受皆須依止太成疑問理相等故若爾觀前修止是如何者此中是說引發毘鉢舍那修所生慧未生新生是異生位又特以通達空性為境修無我理下當廣釋但由住一所緣此中波羅密多乘及下三部密乘於無我義若不先以別觀察慧思擇而修之思擇修則不能生毘鉢舍那修所生慧故先須思擇修又未得止者先求了解無我之義次緣此義數數思擇由此思擇不能得止若不思擇安住而修由此為依雖可得止然除修止之外而無修觀之法更須修觀故仍未出先行修止更而修觀之次第是故此宗建立毘鉢舍那理趣若不以思擇引發輕安者則先修止次乃修觀全無正理若不如是次第而修亦不應理解深密經說要依奢摩他乃修毘鉢舍那又云依前而生後說六度中靜慮與智慧之次第又依增上定學而生增上慧學之次第均以修止為先而後修觀菩薩地及聲聞地亦說當依奢摩他而修毘鉢舍那中觀心要及入行論修次三篇智慧稱論師及寂靜論師等皆說先修止後修觀是以天竺有一類師有說無須別求奢摩他最初即以觀慧思擇亦能引生毘鉢舍那者與諸大車所造論典相違非諸智者堪何憑信又此止觀次第是就新生之時應如是修若先已生則無如是次第亦可先修毘鉢舍那後修奢摩他何故集論說有先得觀而未得止彼應依觀而勤修止耶答此非說未得初禪近分所攝之止是說未得初禪根本定以上之止此復是說証四諦已次依此觀而修初禪以上之止本地分云又已如實善知從苦至道然未能得初禪等於此無間住心不作分別是依增上慧而修增上心又為便於立言說故九住心通說為止分別等四通說為觀然真實止觀如下所說要生輕安乃可安立丑六各別學軌分三寅一學止法寅二學觀法寅三學雙運法初又分三卯一正說修止資粮卯二依於資粮修止卯三修已成辦止量今初初又有六一住於順境者謂具五德處所衣食等事無劬勞得易於獲得處所善妙無猛獸等兇惡眾生及無怨敵所住地方善妙不為引生疾病之地伴侶善妙具足良友戒見相同寧靜淡泊晝無多人夜靜聲寂如莊嚴經論云善信修行處易得善妙處善地及善友瑜伽安樂具二少欲者不貪眾多上妙衣服等事三知足者雖得微少粗弊衣服常能知足四絕諸什務者謂行商貿等諸惡事業或太親近在家出家或行醫卜星相等均須斷絕五清淨戒律者謂於別解脫及菩薩戒皆不毀犯性罪遮罪所有學處設稱逸犯速生追悔如法悔除六全斷貪欲等惡尋伺於貪欲等當修殺縛等現世過患及墮惡趣當來過患又生死中愛非愛事皆是無常可壞滅者此定不久與我分離何為於彼而起貪等由是修習能斷貪等諸惡尋伺道灯論云失壞止支分雖勵力修習縱經百千年不能成正定故真欲修止觀定者應勵力修集聲聞地中所說奢摩他十三資粮極為切要卯二依於資糧修止分二辰一加行辰二正行今初常時修習如前所說加行六法及菩提心并應淨修共中下士所緣自性因此乃是菩提心之支分辰二正行分二巳一當以何種加行而修巳二正釋修習次第今初如修次三篇所說座位舒適身具威儀八法此中足者全跏趺坐或半跏趺眼半開閉垂注鼻端身恒正直非太後倚亦勿前屈內念而住兩肩平衡頭勿低仰莫偏一方從鼻至臍保持端直齒唇二者隨其自然舌尖微抵上齒息者內外出入莫令粗猛滑急及有聲响必使出入無所知覺全無功用徐徐而轉如是首應令身具八威儀尤須如其所說善修調息巳二正釋修習次第大凡道次多依辨中邊論所說由八斷行斷五過失而修習止格西拉色瓦所傳教授更於其上加聲聞地所說六力四作意及九住心至尊彌勒菩薩之莊嚴經論辨中邊論亦說九住心及八斷行又獅子賢論師蓮華戒論師寂靜論師等印度諸大阿闍黎亦依此說著有極多修定次第此等在密咒乘中亦須了知尤其五種三摩地過失及如何遣除五種過失道理經中反較詳明此中分二午一引生無過三摩地道理午二依彼引生住心次第初又分三未一繫心於其所緣先如何修未二住所緣時應如何修未三住所緣後應如何修今初不樂修定或樂為定障緣懈怠若不能遮則從最初不令入定偶或能得不能持續速當退失是故起初當以滅除懈怠為要此若能得喜樂充盈身心輕安晝夜行善能無疲厭則滅懈怠然生輕安須於能生輕安之因三摩地恒常精進然生精進須於三摩地具足恒常猛利希欲此欲樂因須於照見三摩地功德生堅信心故應先思定之功德數數修信辨中邊論云即所依能依及所因能果此中所依者謂欲為勤所依能依謂勤或名精進欲因謂深信功德精勤之果即是輕安此中所修三摩地功德謂成辦止身心喜樂增廣現法樂住及由獲得身心輕安心於善緣如欲而轉又由息滅於顛倒境散亂無主則諸惡行皆不得生隨所修善有強固力又依於止能引神通變化等德尤其依於奢摩他能生通達空性妙觀速疾能斷生死根本若能思惟此等功德則於修定能增勇敢勇敢生故恒樂修定極易獲得妙三摩地既得定已亦數修習難以失壞未二住所緣時應如何修分二申一心於何等所緣住申二心於所緣如何安住初又分二酉一總安立所緣酉二明此處之所緣初又分二戌一正說所緣戌二顯示何等補特伽羅應緣何境今初薄伽梵說凡瑜伽師有四所緣初周徧所緣四者謂有分別影像無分別影像事邊際性所作成辦前二就能緣心安立從前二修軌能於如所有性盡所有性攀緣修習而得轉依是所作成辦淨行所緣者謂為對往昔生中貪瞋痴慢妄想增上現行故修不淨觀慈觀界差別觀阿那波那五種所緣善巧所緣亦有五種謂善巧蘊界處十二緣起及處非處淨煩惱所緣有二謂觀下地粗相上地靜相四諦中無常等十六行相此中淨行所緣上品貪緣等易於滅除貪等且易得三摩地故是殊勝所緣善巧所緣能滅離彼等法外另有補特伽羅之我隨順引生通達無我之觀故是妙止所緣淨煩惱所緣能總對治一切煩惱意義極大周徧所緣離前諸所緣非別另有故當依於殊勝奢摩他修三摩地有緣塊石木屑而修定者是顯不達三摩地所緣建立戌二顯示何等補特伽羅應緣何境若是貪欲增勝乃至妄想增盛補特伽羅則如頡隸伐多請問經所說須以不淨觀乃至阿那波那各別决定為所緣依若是等分行者或是煩惱輕微補特伽羅於前說所緣等隨其所樂攝心無須决定此中貪等五增盛者謂往昔生中其貪等五已作串習故於少分貪等五境亦生長時相續貪等五惑等分行者謂往昔生中於貪等五雖不作串習然於彼等不觀為過患故於彼等之境不生上品長時貪等然非不生煩惱輕微者謂他生中於貪等五不作串習觀為過患故於太多上品貪愛境貪等徐起於中品或下品則不生起此復增盛貪等經極長時等分行者非極長時煩惱輕微者速能成辦心住酉二明此處之所緣問此中所緣當依何者而修止耶答總之如前所說補特伽羅須各別緣特別妄想增盛者以觀息為要又修次第中下二編依於現在諸佛現住三摩地經及三摩地王經說緣如來身修三摩地菩提賢論師亦云緣如來身修三摩地道炬論釋亦引此文其緣佛身攝心者隨念如來能生無邊功德若佛身像明顯堅固可作頂禮供養發願等集聚資糧之田及懺悔防護淨治罪障之田故此所緣最為殊勝又死時念佛不退失等功德且若修咒道於本尊瑜伽尤為殊勝義利極多三摩地王經云金色身莊嚴世間依怙處緣彼心能轉菩薩修業住應以所說而為所緣此復有二一心乍現起二於原有者重令光揚及生信易且順共乘故當如及作首先心於何攝求所緣處者謂先當求隨一若畫若鑄佛像數數審視取其印象如是修習而現於心或由師說思所問義意中顯現求為所緣又於所緣不當現為畵鑄等相要令現為真佛形相一類師說置像面前眼注視修智軍阿闍黎善為破之以三摩地非於根識修是內意識修三摩地正所緣者即是意識正所緣境須即於此攝持心故又如前說是緣實境之總義或緣顯現影像故佛身亦有粗細二種有說先緣粗分俟此堅固再緣細分自心亦覺粗分易現起故須先以粗分為所緣境特別若是修止因相未達完滿中間不可更換眾多相異所緣若是變遷眾多所緣而修反成修止極大障碍聖勇論師云在一所緣上意住於至善所謂一切是肯定辭如是初得攝心所緣之量應先次第明顯攀緣一頭二臂身體餘分及其二足其後作意身之總相心中若能現起半分粗大支分縱無光明應知喜足於彼攝心若不以此為足而攝其心欲求明顯數數攀緣所緣雖可畧為顯了不僅不得堅固三摩地且成定障又若所緣雖不明顯然於半分若能攝心當速得定次令明顯其明易成此是智軍論師教授極為切要又總緣身相時若身一分極其明顯可即緣彼若彼復沒仍緣總相若欲修黃而現為紅顯色不定若欲修坐而現為立形色不定或欲修一而現為二數量不定或欲修大而現為小形體不定則定不可隨逐而轉應於前根本所緣為所緣境若是密咒修本尊瑜伽時本尊形相定須明顯乃至未能明現之時須修多種明顯方便此中佛像若是難現於前隨一所緣持心或住於真實决定之見而持其心亦可修定此乃成辦止為主要故申二心於所緣如何安住分三酉一建立自宗無垢酉二遣除他宗有垢酉三正修時量今初此中所修正定具足二種殊勝一心極明顯具明顯分二專住所緣具無分別住分有一類師加樂為三又有加澄淨分而為四者其澄淨分說有二種一能緣澄淨謂在玻璃無垢器皿中滿注無垢淨水較無雲日光所照射尤為澄澈二所緣柱等境像現前直至此等極微聚中澄澈了知然此二者從斷極細惛沉生極明顯分形殊勝攝不須別說適悅行相喜樂之受是此所修定果非初靜慮未到分攝所能生起故此不如是明相現前是斷惛沉專一無分別是斷掉舉故沉掉二事是定障上首亦即此理故若善識粗細沈掉不知善修正定破除此二即奢摩他亦不能生况毘鉢舍耶故智者求三摩地應如此理善巧沈掉二者乃是修止違緣認識違緣及滅除方法下當解釋此中應說修止順緣引正定理所謂三摩地者是說心於所緣專一而住更須於所緣能相續住此須二種方便一於根本所緣令心不散二於已散未散將散不散如實了知初即正念次即正知如莊嚴經論釋云念與正知是能安住一於所緣令心不散二心散已能正了知若正念失壞所緣忘散則於此無間棄失所緣故能不忘所緣念是根本由此念故能住所緣理趣已如前釋念如集論云云何為念於串習事心不忘為相不散為業此說具足三種差別所緣境差別者曾未經境念則不生故說於串習事此中即令現起先所决定所緣之相行相差別者謂心不忘即心能明記其境此中謂不忘所緣不忘失理非因他問或自思察僅能記憶師所教示所緣如此是須令心安住所緣無少散亂若生散亂其念便失故於所緣安住心已須起是念已住行緣次不更起重新觀察相續將護此心勢力是修念心最切要處作業差別者謂從所緣心不餘散如是調心令住所緣如調象喻如於極其堅牢木柱以重密繩索拴其狂象時馴象者令如教行奉行者善若不如教則以利鈎數數治罰而令馴伏如是心如未馴之象以正念索繫於前說所緣堅柱若不安住則以正知鉄鈎治罰漸令自在如中觀心論云意之象逆行當以正念索繫所緣堅柱慧鈎漸調順修次中篇亦云以正念正知索繫意之象於所緣樹又云依於正念能引三摩地又云正念如索能於所緣相續繫心故凡修能引三摩地之主因即是修念又念行相堅定為相故修三摩地者若無嚴密堅定了知行相心縱澄淨若不出生定知明顯分念力不起亦不能破微細之沉其三摩地是有過失又除天身等所緣餘全不住唯修心無分別而謂心於何境全無分別住者此由明念次則令心不流不散不流不散即是不忘所緣義同正念仍未超越修念規則如彼修者亦須依於定知猛力之念酉二遣除他宗有垢茲有如是顛倒邪執是所應破或有依據前說策舉其心無分別住雖無沉沒而掉舉增上現見不能持續久住若低其舉任其緩現見住心速起以此方便善妙於是倡言善緩即是善修此是未辨起修起沉二者差別以無過失三摩地必須具足前者二種差別非僅心無分別住一分而足若以心濛濛然趣惛昧面是為沉者無彼沉時心內澄淨是無過三摩地者此乃未辨惛沉二者差別下當廣釋故猛利策舉雖有明分由掉增上住分難生若太緩慢雖有住分由沉增上雖有住分又不明了緩急適中界限難得故極難生俱離沉掉妙三摩地振扎果米論師云若依勤猛生掉舉若離勤猛易鬆懈緩急平等轉極難我心擾亂云何修又云若勵力修起掉舉若緩緩修易鬆懈中道而修極難能我心擾亂云何修是說勤猛策勵易生掉舉因此放棄勤猛令心緩轉則心易鬆懈心離沉掉二邊平等運轉安住是極難得又說若極緩修全無困難生沉而已如以此理修三摩地不應道理故緩急適中界限是在自所明記心既專繫於此覺有定生掉舉時量斯為策逼反是為緩又心住於此覺有易生沉沒時量斯為弛緩反是亦應立為高舉理趣如無著菩薩云於內住等住中有力勵運轉作意初二心時作如是說修次初編云遣除沉沒當堅持所緣若如前說依念理趣不知而修縱經久修忘念愈重擇法之慧日益愚鈍過患極多若謂如前以念令心住所緣已爾時可否分別觀察於所緣境持未持耶此者定須觀察是修次中篇所說此亦非是棄捨三摩地已如是觀察是住三摩地中觀其住或不住根本所緣若不住者當觀隨逐沉掉何轉謂非住定極短促時亦非太久是於中間時之觀照若於前念心未盡勢力修此觀察能生前心相續久住則能速疾了知沉掉是有大用如是於中間時念念流注前前所緣而修其念必須有大力用能為相續運轉之因此種修念理趣是聲聞地所說辨中邊論釋亦云念謂不忘所緣即是不忘住心教授意言之增語故依於念是為能滅從境流散及忘所緣不忘所緣即是意於所緣數數作意比如恐忘所知了義數數作意即難忘失酉三正修時量問由念令心住所緣境應住幾久有無定量答此中聲聞地等諸大論典雖未明說受持時量修次下編云由是次第一更半更或一修時或盡其堪能爾時而修此是成辦奢摩他已修毘鉢舍那時所說時量初修止時應亦同此此復如前修念知軌中間時之憶念觀照所緣時雖畧久應無過失然初修者若時太久易生忘念流散爾時其心是沉是掉非經久時不能速知或須未失念其心易隨沉掉而轉沉掉生已不能速知前能障生有力正念後能障生有力正知故難斷沉掉尤以忘失所緣不覺沉掉更惡於未忘所緣不能速疾了知沉掉故為對治散亂失念修念之法極為切要若忘念重正知力劣不能速疾了知沉掉則須短時修若能速疾了知沉掉時亦無過故密意說或一更等未說定時總以隨心所能故云乃至堪能又若身心無病即應安住有病不應勉強而修先治病障是諸善巧所許如是修者應知亦是修時支分未二住所緣後應如何修分二申一生沉掉時應如何修申二離沉掉時應如何修初又分二酉一開示不知沉掉之對治酉二既知已為斷彼故不起勤奮之對治初又分二戌一抉擇沉掉之相戌二於正修時生起了達正知方便今初初掉舉者如集論云云何掉舉淨相隨轉貪分所攝心不靜照障止為業此中有三一所緣可悅愛境二行相心不寂靜向外流散是貪分中趣愛境相三作業能障其心安住所緣於內所緣令心住時由貪色聲等之掉舉於境牽心令不自在貪愛散亂如懺悔讚云如此如此止所緣意於彼彼時安住從彼彼外煩惱繩牽往貪境無自在沉者多種譯名亦譯鬆懈有云於他境上安住不散心昧不明許之為沉不應道理修次中篇及解深密經說由惛昧生沉集論亦云沉亦說為隨煩惱散亂之時彼說散亂亦有善性非定染污故惛昧者集論及俱舍釋云是痴分攝身心沉重無堪能性沉謂心於所緣執持力弛不勝極明所緣雖有明分而所緣持相不明即是沉性修次中篇云若時如盲或如有人趣入闇室或如閉目其心不能明見所緣爾時即是沉沒未見其他論典明說沉相沉沒有二善及無記昧是不善及有覆無記隨一唯是痴分諸大論典說遣除沉思佛像等諸可欣境及修光明相策舉其心故心闇境晦及心力低劣皆應滅除故須双具明顯及持力二者掉舉易了唯沉相諸大論典均未明說故難了知然極重要以易於被誤為無過三摩地故應如修次所說從實修上以細心觀察而求認識戌二於正修時生起了達正知方便非僅了知沉掉便為滿足斯須在正修時能起有無沉掉如實了知之正知又所漸生有力正知在沉掉生起之無間即刻能起實知之正知自不待言又未生將生頃亦須預作如實知修次中後二編云見心沉沒或恐其沉見心掉舉或恐其掉如是直至正知未生中間若謂此中已無沉掉是無過修難可斷言以沉掉有否不能决定未能生起有力正知故辨中邊論亦云通達沉及掉能了沉掉須如實知故如是若未生起對於所起沉掉無有不察之正知則雖久修不能覺受所起沉掉將為微細沉掉所誤若爾正知如何生起如前所說修念法則即是重要之因以若能生相續憶念即能破除忘境流散亦能止滅沉掉已生久而不覺為易了達沉掉故須察失念時之沉掉與未失念時之沉掉從其時間長短二者覺察則極明顯入行論於此密意說云何時從意門護念住於境爾時起正知辨中邊論釋亦云念為正知之因一因者即令心緣佛像等所取之相或緣能取明了等相次如前說於修念中觀察於他散與不散任持守護其心此即修習正知最切要處入行論亦云數數當觀察身心諸分位唯有如此者護守正知相由此能生沉掉了知正知依修念法是遮散後所起妄念應善辨別酉二既知已為斷彼故不起勤奮之對治如前所說善能修習念及正知修習理趣因而生起有力正念微細沉掉能由正知覺了必無不知沉掉之過然二者既生不依滅除勤奮任其滋長或不作行是三摩地最大過失為對治彼起作行功用應當修思此中分二戌一正明其思滅沉掉法戌二明生沉掉之因是依何者今初如集論云云何為思令心造作為性於善不善無記令心隨轉為業意謂如由磁石吸力令鉄無自在轉如是於善不善無記三者隨一能鼓動之心所是名為思此中是說生沉掉時為斷此數數令心造作之思若爾復應如何滅除沉掉心之沉沒謂太內攝忘失所緣行相故應作意可喜事物引心昇轉之因所謂可喜亦即如緣佛像非引煩惱又可作意日月光等之光明相沉沒既除應即無間堅持所緣行相而修此乃修次初編所說此不應修厭倦所緣由厭令心向內攝故又以觀慧思擇所希求觀境悅樂觀擇亦可滅沉攝波羅密多論云勤修勝觀力怯弱而策舉故沉或弱是於所緣行相漸趣低劣是名為沉太過內攝是名為弱故由悅樂策舉及廣大所緣持相即能滅除中觀心要云退弱應寬廣修廣大所緣又云退弱應策舉觀精進利益故滅沉能為最要對治者應當思惟三寶及菩提心之義利暇滿義大等之功德如昏迷者面洒冷水頓能清醒能續策行此亦依於先能修習觀擇諸功德品而生覺受又生起沉沒所依之因謂惛睡二者及能生此二之心品黑暗相若修光明為依而為對治則依於此等而生之沉均不得生從生亦滅聲聞地說威儀經行時應善取明相并數數修及隨念佛法僧三律儀捨本尊六中隨一或以其他清淨所緣策舉其心或讀誦宣說惛睡過患經論或瞻視方向星辰或以冷水洗面復次若沉輕微或偶起即沒可策心正修若沉沒重或屢現起可暫棄修如其所應修彼對治待沉止滅再繼續修又心所取相不明顯心境相暗可隨其厚薄修此對治取其灯火日光等明相數數修習則心可生起廣大明淨相掉舉者是貪門攝令心追逐色聲等境此應作意諸可厭事能令其心內攝於此息滅掉舉無間即住其心中觀心要云作意無常等息滅掉舉心又云觀散過患相攝錄散亂心若是散亂力猛時長暫時擱置而修厭離極為切要心非流散乃可攝住若掉勢不猛則可攝錄安住所緣攝波羅密多論云何時意掉舉以止理滅除心正掉時不當作意可欣愛境以是向外流散所依因故戌二明生沉掉之因是依何者先明沉掉二者其因不護根門食不知量上下時分不勤修習覺寤瑜伽不正知住次明沉因睡眠過多心於所緣過於鬆懈止觀不等著重止修心濛然住不喜安住所緣三掉舉因厭離過少心於所緣過於策逼不精進修親朋尋伺動亂其心沉掉雖微亦以正知覺了悉皆滅除故若有說微細掉舉散亂初時難斷捨而不斷又謂彼等若無猛利恆常相續勢弱時促不能造業故不須斷此是不了修習無過三摩地者且亦棄捨慈氏等已所决擇修習三摩地規則故如是應從散掉攝錄其心住內所緣而求住分住分生時慎防沉沒應求明淨此二展轉修習乃為無過三摩地不應託意無持相俱行之明分唯澄淨分申二離沉掉時應如何修如前所修亦已斷除微細沉掉則無沉掉令不平等其心便能平等運轉若有功用行仍是三摩地過此之對治是當修捨所謂有功用行成為過失理者此由心內攝錄沉則策舉防護而修有時沉掉俱不現起若仍如前防沉防掉精勤而修心反散亂爾時故須放緩然雖放緩但不棄捨所持行相是修等捨此亦非是所有沉掉不起之時乃是已有摧沉掉力後若無摧伏沉掉之力無等捨故云何等捨此復有三一覺受捨二無量捨三行捨此是後者行捨自性如聲聞地云於所緣必平等性於止觀品心正直住自任運轉事堪能性既得如是等捨時修三摩地者在沉掉未起時正修等捨當以不勵力功用轉辨中邊論云依住堪能性能成一切義滅除五過失勤修八斷行懈怠忘聖言及惛沉掉舉不作行作行是五失應知即所依能依及所因能果不忘失所緣覺了沉與掉為斷而作行滅時正直轉其依住者謂為滅除逆品勇猛精進依此而住於此能生心堪能性三摩地此亦能成辦神通等一切義利是神變之足或其所依處故能成辦一切義似此三摩地即是依於斷五過失及八斷行為因而生五過失者謂加行時懈怠為過不努力三摩地故勤修定時忘失教授是其過失既忘所緣其能緣心不能等住既等住已沈掉為患此二令心無堪能故沉掉既起不作加行為過以此不能息滅二過離沉掉時作行之思為過修次等說合一為五若各分別則有六種對治此等為八斷行對治懈怠有四謂信欲勤輕安對治失念沉掉不作行作行如其次第修念正知行思正住之捨前已解釋此乃一切以念正知遠離沉掉修心一境性之三摩地共同教授不應執此是相乘法門非咒所須無上瑜伽續中亦多宣說故午二依彼引生住心次第分三未一正明引生住心次第未二由六力成辦理未三具四種作意今初初中九心一內住者謂從一切外境上內攝其心住內所緣莊嚴經論云心內住所緣二等住者謂即初所繫心不他流散於彼所緣相續而住如云續相不流散三安住者謂由妄念向外散時能即了知還復安置前所緣境如云散亂速覺了還安住所緣四近住者般若波羅密多教授論云從廣大境數攝心性令漸微細上上而住如云具慧上上轉內攝其心性五調順者謂由善思三摩地功德心悅正定如云復由見功德於定心調順六寂靜者因見散亂過失於定心不喜七最極寂靜者謂若生貪心憂慼昏濛睡眠等能即止息如云貪心憂等起即如是寂靜八專注一趣者為令任運而轉故作策勉如云次勤律儀者由心正作行故得任運轉九等持者修次篇說心若平等應修等捨般若波羅密多教授論說由修專注一趣能得任運自在而轉如云從此而修不作行此中九心之名是如修次初篇所引如云此奢摩他道是般若波羅密多等所說未二由六力成辦理力有六種一聽聞力二思力三念力四正知力五精進力六串習力此等能成何心者初由聽聞力能成內住謂僅隨順從他所聞於所緣上住心教授最初令心安住內境非是由自數數思惟而修習故次由思力能成等住謂於所緣初所住心數數思惟將護修習初得少分相續住故三由念力成辦安住近住二心謂於所緣向外散時憶念先前所緣內攝其心又從起初生憶念力從所緣境不令流散四由正知力成辦調順寂靜二心謂由正知了知妄想及隨煩惱相流散過患由見其患令於彼二再不流散五由精進力成辦最極寂靜及專注一趣二心謂雖生極細妄想及隨煩惱亦起功用斷滅不令現行由是因緣其沉掉等不能障定定能相續生起妙三摩地六由串習力成辦等持心謂於前心極串習力生無功用任運而轉三摩地故此等是如聲聞地意其他雖有解釋則難憑信若得第九住心例如讀經已極純熟初起欲背之心中間心雖他散然所背誦任運不斷如是初念於所緣境令心住已次雖未能一念相續依於念知然三摩地能無間缺長時流轉由其不須功用相續恒依念知故名無加行或名無功用能生此者先須一類功用依於念知令沉掉等諸逆品法不能障碍生三摩地經極長時此即第八住心此與第九所有沉掉等三摩地障不能為障二心雖似然於此心必須無間依念正知故名作行或有功用能生此者須於微細沉掉等垢隨生隨除而不忍受故須第七心生第七心須先了知妄想及隨煩惱散亂遇患由有力正知於彼等上觀察令不流散故須第五及第六心此二即是有力正知所成辦故能生此者須於散失所緣境時速憶所緣及從最初於所緣境令不流散故須第三及第四心以此二心即彼二念所成辦故又生此者須先令心安住所緣及令住已相續不散故應先生初二種心如是總謂先應隨順所聞教授善令心住次如所住數數思惟畧令相續將護流轉次若失念散亂應速內攝忘所緣時速令憶念次更生起有力正念於所緣境初不令散若已成辦有力正念又當生起有力正知觀沉掉等從所緣外散亂過失次當起功用力惟由微細失念而散亦能無間了知斷截既斷已令諸逆品不能為障相續延長若生此心精勤修習得修自在即能成辦第九住心無諸功用勝三摩地是故未得第九心前諸瑜伽師須以功用於三摩地安住其心得第九心已雖於住心不加功用亦能任運入定雖得第九住心若未得輕安如下所說尚未得說為得奢摩他何况能為得毘鉢舍那然得此定有無分別安樂光明而莊嚴者誤為已生根本後得共相合糅無分別智尤有眾多於聲聞地所說第九住心誤為已生無上瑜伽之圓滿次第者下當廣說未三具四種作意如聲聞地云於九住心有四作意此說初二心時須勤策勵為有力勵運轉作意次五心時由沉掉故中有間斷不能久修為有間缺運轉作意次第八心時沉掉二者不能障隔能長久修為無間缺運轉作意次第九心既無間缺又不須恒依功用為無功用運轉作意若爾初二心時既有有間缺運轉中五心時亦須策勵為何初二心位不說有間缺運轉作意中五心位不說為有勵力運轉作意耶答初二心時心於三摩地有趣入不趣入二者以後者長久中五心時住定時長故於後者就定障立名前者不爾是故此二雖共有力勵運轉然現前有無間缺運轉則不相同故於中間五心不建立有力勵運轉之意此復攝波羅密多論云由無間瑜伽精勤修靜慮若恒時怠惰鑽木不出火瑜伽法亦爾不得勿停止卯三修已成辦止量分三辰一成辦未成辦奢摩他之界限辰二依奢摩他趣總道軌辰三別趣世間道軌初又分二巳一宣說正義巳二有作意相及斷疑初又分二午一從得未得圓滿輕安而說得未得奢摩他午二既得圓滿輕安已顯示真奢摩他宗今初如前所說第九住心能離微細沉掉長時而修且亦不待勤策功用相續依止念知得任運轉之三摩地是否已得奢摩他耶答得此定時有得未得輕安二者未得輕安僅是奢摩他隨順非真奢摩他如解深密經云薄伽梵若菩薩等緣心為境內作意心乃至未得身心輕安於此中間所有作意當名何等慈氏非奢摩他是名隨順奢摩他勝解相應作意莊嚴經論云由修不作行次獲得圓滿身心妙輕安名作意相應此之作意即奢摩他修次中篇明顯說云如是修習奢摩他者其身其心何時生起輕安並如其所欲心於所緣獲得自在應知爾時即是成辦奢摩他般若波羅密多教授論云如是菩薩獨處阿蘭若作意思維如所思義斷除意詮即心所現多次作意乃至未生身心輕安中間是名隨順奢摩他作意何時能生爾時即是奢摩他若爾未生輕安之前此三摩地是何地攝耶欲地所攝如本地分云似此雖俱心一境性仍是非等引地其不能立為等引地者因非成辦無悔勝妙喜樂輕安為因相故由是未得輕安雖不必一向依止正念但無分別心自力運轉復能融會行住坐臥一切威儀此之三摩地是名欲心專一境性仍非真奢摩他午二既得圓滿輕安已顯示真奢摩他宗問云何為得輕安既得輕安云何立為成辦奢摩他理答所謂輕安如集論云云何輕安謂止息身心粗重相續身心堪能性遣除一切障碍為業身心粗重者謂其身心於善所作隨其所欲無有堪能能對治此身心輕安者由離身心二種粗重則其身心於善事轉極有堪能又能障碍樂斷煩惱煩惱品攝內心粗重正起加行斷煩惱時離身重等不堪能性身獲輕利名身堪能如是能障樂斷煩惱煩惱品攝內心粗重正起功用斷煩惱時能離心於善緣愛樂運轉不堪能性心於善緣運轉無碍名心堪能如堅慧論師云身堪能者謂於身所作事輕利生起心堪能者謂趣入正作意令心適悅輕利之因之心所有法由此相應心於所緣能無碍轉名心堪能總之若得輕安即能遣除斷煩惱時起加行欲如作難事畏其惱害身心難轉不堪能性身心俱足最極調柔安樂如是身心圓滿堪能是從初得三摩地時便有微細少分現起漸次增廣最後而成輕安心一境性之三摩地又因最初微細難了後則易知此為聲聞地所說將發如是眾相徧滿明顯易了之輕安預示徵兆謂精勤三摩地補特伽羅於其頂上似有重相生起然此重相非不安樂此生不久即能遠離障碍樂斷煩惱品心粗重性即先所生能對治彼心輕安性如聲聞地云爾時當起強盛易了心一境性身心輕安恒常無碍而轉所有預示徵兆即於頂上似重而起非損惱相此生不久即能遠離障碍樂斷煩惱品心粗重性即此對治心堪能性心極輕安亦得生起次依心堪能輕安生起力故有能引發身輕安因風入身中此風徧滿身分即得遠離身粗重性亦即生起對治身粗重之身輕安此亦由其堪能風力徧一切身分狀如滿溢如聲聞地云由此生故身輕安隨生風大種等來入身中此等入時即能除遣樂斷煩惱品能為障碍身粗重性能對治彼身輕安性充滿身中狀如溢滿此身輕安是極悅意內身觸塵非心所法堅慧論師云喜所攝持身內勝觸當知即是身輕安經說心喜身起輕安如是身輕安最初生起由風力故身起大樂又依於此心亦生起勝妙喜樂此後輕安初勢漸趣微細然非失去輕安是初強盛太動其心彼漸退已如影隨形輕妙輕安隨有不動三摩地而起心中所有歡喜踊躍亦漸退減心於所緣堅固而住遠離大喜躍動不寂靜性斯乃獲得正奢摩他聲聞地云彼初現起心俱喜悅心極適樂勝喜相應所緣境相亦現喜樂次後輕安勢力初所生者漸漸舒緩有妙輕安隨身而轉心喜悅性漸次退減由奢摩他所攝持故心於所緣寂靜相轉如是生已名有作意以得初禪近分所攝真奢摩他乃得等引地最下作意故如聲聞地說巳二有作意相及斷疑分二午一有作意相午二斷疑今初具何相狀能會自他了知已得作意聲聞地說謂得如是作意則得色地所攝少分定心身輕安心輕安心一境性四者有力能修粗靜相道或諦相道淨治煩惱內住其心身心輕安急速生起貪睡等蓋多不現行從定起時身心輕安亦少隨轉由得具足如是相狀作意力故奢摩他道極易清淨謂奢摩他心一境性住定之後速急能引身心輕安輕安轉增如彼輕安增長之量便增爾許心一境性妙奢摩他互相輾轉能增長故總之若心得堪能者風亦堪能爾時其身便起上妙輕安此若生起便起勝三摩地復由此故其風既已成辦殊勝堪能故能引發身心輕安又聲聞地說不趣一切相當修無散亂謂從最初乃至近住不念亦不作意此說從最初心一境性時餘念作意全無所住如是修者如聲聞地說三摩地生起理趣云若汝能於所緣專一安住內心并依奢摩他安住次第則心相續及心等流一切無相無有妄想湛然寂靜如是令心正住如是若得奢摩他心識由失念及不修過患諸相妄想及隨煩惱等現在前隨所生起即更當修不念不作意謂先所見諸過患相增上力故即於如是所緣境像由所修習不念作意隨遣散滅當令畢竟不現前住賢首此所緣相微細難知汝為了達此故應當希求猛力勵力此中令心正住以上一段是說如前而修無相等三次第生起理趣次更當修不念不作意以前一段是說雖成辦止若無更強修習為依則心中諸相現前心為此等所轉憶念過患故須不隨所轉全無思住當令畢竟不現前住以前一段是說因如是修相等三者縱然生起而因不思串習力故於所安住不起觀待自趣寂滅無有彼三現前而住自心不向此等流散賢首以下一段是說奢摩他微細難知又相者謂色等五境及三毒男女等十相滅此等相理趣初時色等種種境相任令顯現其現不久還滅自淨最後等持更不現起色聲等相唯起心明淨分及純淨樂此後滅除妄想理趣亦如前說安住不念并不作意凡所生起妄想如水中泡不能久住瞬息自滅繼復如前所說而修覺受及樂顯現任令現前其現不久如去皮樹不能久住自滅自淨樂及覺受轉趣微細爾時住定身等形相全不現起心與虛空無二無別次從定起身忽爾生如是後時瞋等煩惱妄想生起亦如前說各以相異躭著任令顯現其等流性不能持續此等分住全趣寂靜則明相廣大不僅屋柱即牆等眾多微塵亦歷歷可數又住分深厚睡時亦如以前未得定時與無沉睡三摩地和合而轉且有眾多清淨夢相現起午二斷疑如前所說若生似此功德之定於五道中立為何道答若以無倒勝解無我正見依於此見而修三摩地雖可立為異生位解脫道若是與此相似而未如是修者如聲聞地云即修第一根本靜慮觀粗靜相諸世間道皆依此定而引發故外道仙人由世間道於無所有以下能離欲者皆須依此而趣上地是故此定是內外二道所共若無顛倒通達無我正見又善了達有邊過失厭離生死希求解脫由出離意樂所攝持者是解脫道若為菩提心所攝持亦得轉為大乘道如與畜生一搏之食所行佈施及護一戒為此意樂攝持如其次第便成解脫道及一切智道之資糧然今非觀察由一他道攝持趣不趣入解脫及一切智道是就此定自性觀察為趣何道是故不念不作意修由真實慧無有計執而於名目安立樂明無分別者是否為修真實義諦空性三摩地此有二種應善抉擇極為切要以未通達真實義以為通達錯誤極大若不分辨如前所說則於自他共同三摩地執為無上瑜伽圓滿次第主要故當細察辰二依於奢摩他趣總道軌如是已得如前所說無分別三摩地作意又有明顯及無分別等殊勝差別唯應修此無分別耶答於相續中引發如此三摩地是為引生能斷煩惱毘鉢舍那若不依此而生勝觀縱如何修定當不能斷欲界煩惱云何能斷一切煩惱故須修觀此又有二一能暫伏煩惱現行趣世間道毘鉢舍那二能永斷煩惱種子趣出世道毘鉢舍那其中前者修粗靜相觀下地粗相及上地靜相後者觀無常等四諦十六行相聲聞地說主要通達補特伽羅無我正見外道因修粗靜相道暫伏煩惱現行佛弟子修無我義能伏煩惱根本故凡內外二者瑜伽師等須修前說奢摩他為伏煩惱基本不僅如此即是大小二乘瑜伽師亦須修此三摩地又大乘中不論咒乘及波羅密多乘二者瑜伽師亦須先修奢摩他以奢摩他是瑜伽師能趣一切共道之根本故又內道中毘鉢舍那亦有二種前者非必不可缺後為通達無我勝觀是不可缺之支分又若得前說第一靜慮未到地攝正奢摩他縱未獲得以上靜慮及無色奢摩他然即依彼修習勝觀亦能脫離一切生死纏縛而得解脫若未通達未能修習無我真實僅由前說奢摩他及彼所發世間勝觀斷無所有以下一切現行煩惱得有頂心然終不能脫離生死者如讚應讚云未入佛法中痴盲諸眾生雖到有頂中仍感三有苦若隨佛法行雖未得四定如蒙諸魔眼而能斷三有故修無上瑜伽師雖不必生起緣所有粗靜行相勝觀及彼所引奢摩他然必須生一正奢摩他又此初生之時亦是生起次第時生辰三別趣世間道軌聲聞地說此中從第九心起乃至未得作意說名作意初修業者既得作意欲淨煩惱修習各別了相各淨煩惱初修業者若未善了聲聞地意須覺靜慮及四無色最下之道是初靜慮近分定於彼說有六種作意初是了相故起誤解謂初生起近分攝心即是了相作意若如是計極不應理以未得正奢摩他必不能生初靜慮之近分未得近分定不能得奢摩他故了相作意是觀察修由修此故若先未得正奢摩他不能新生故故初近分天作意之最初者是修近分所攝勝觀之首非初近分之最初其前尚有近分所攝奢摩他故未得初近分所攝三摩地前一切等持皆是欲界心一境性若依諸大經論所說得奢摩他亦極稀少此中近分六種作意能離欲貪理趣惟恐文繁不錄以上奢摩他品竟
