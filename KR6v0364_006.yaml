body:
  text: 黃教祖師宗喀巴著邢肅芝譯寅二修觀法分四卯一依止觀法資糧卯二觀法差別卯三正修觀法卯四修後成辦觀量初又分二辰一總論辰二別説抉擇正見理今初修次中篇説依止尊勝士夫聽聞正法如理思維是毗鉢舍那三種資糧此亦即是親近無倒了達佛語扼要大善巧師聽聞無垢經論由聞思慧引發通達真實正見是不可小觀資糧因若於正義無決定見必不能生通達如所有性毗鉢舍那故又此正見要依了義而善尋求不依不了義故須先知了不了義二者差別乃能悟解了義經義又若不依定量大車釋經密意如同生盲獨自無導而往險地故當以無倒釋經論為據若爾當依何等釋經論耶謂薄伽梵於衆多經續明了授記能解深意聖教心藏遠離一切有無二邊遍揚三處聖者龍樹應依其論而求通達空性見解又聖者提婆亦為佛護清辨月稱寂命等大中觀師奉為定量等同龍樹父子二人統為餘等一切中觀派鼻祖故諸先德稱此二師為主流中觀師餘等稱為旁支中觀師又有一類先賢作如是言就名言門而立其名故有二類中觀師謂於名言許外境有名經部行中觀師及於名言不許外境名瑜伽行中觀師又就勝義理趣亦立二名一於芽等有法及現量非實二者雙聚許為勝義諦成如幻理二於現量境斷絶戲論許為勝義諦極無所住此二前者是寂命論師及蓮花戒論師等所許其如幻及極無所住之名言印度論師亦有許者覺慧大譯師云就所許勝義所立二宗是令愚夫生驚奇覺智軍阿闍黎云聖父子所著中觀論原未明外境有無之理其後清辨論師破唯識宗在名言上立有外境宗再後寂命論師依瑜伽行教於名言上説無外境於勝義上説心無性創立不同中觀理趣故有二種中觀師前者名為經部行中觀師後者名為瑜伽行中觀師此種説法産生次第是依諸大論典至月稱論師雖於名言許外境有然不落其他宗派舊規故不可説為隨經部行者更不可説為同婆沙師雪山部落後宏教時有諸大德於中觀師安立二名曰應成派曰自續派此據明句論而判故就名言許不許外境定為二類若就於自相續引發空性定見異門而立名者亦有自續應成之二如是應於此等諸大論師當依何者而求聖父子密意尊者是以月稱論師派為主依此教授諸大高德亦以此派為宗月稱論師是於所有中觀論釋中以佛護論師最能表達聖者密意故以為據他則多採清辨論師妙解并破其些微不合理者納入聖者密意正解此二論師所有釋論解説聖父子意趣最為殊勝故當以佛護月稱二大論師著述為抉擇標準辰二別説抉擇正見理分三巳一正示染污無明巳二示生死輪回根本巳三為求斷除我執尋求無我正見今初薄伽梵説貪等煩惱對治僅是一分對治所説無明對治乃是根本對治以無明者是一切過患之根本如明句論云佛在九部契經依於二諦宣説就諸世間大行此中廣作闡揚其為除貪愛故非為滅除瞋恚正説滅除瞋恚亦非滅除貪愛凡説滅盡慢等亦非摧毀他染既是非周遍説彼彼均無大義凡説滅盡無明乃正滅盡煩惱佛説所有煩惱均以無明為依此説對治無明須修真實然若不知無明則無以修其對治故先了達癡相最為切要言無明者為明之敵品明亦非任何明了惟是悟入無我真實智慧敵品全無其慧并於餘等相違執著即增益有我增益又有人我法我二種即於人我法我迷執不悟增益理趣謂於諸法自體或其自相執有實在自性如優婆離請問經云繽紛悅意花齊開輝煌金殿快意哉此中全無真作者盡是分別所假立分別故立世間相此説諸法全由分別假立六十正理論亦云世間既是癡為緣何故正等正覺佛説此世間是虛妄是故云何不應理注釋解云世間一切無實自性唯是分別假立百論亦云若無分別其欲貪等有即非有諸有智者誰又計執所謂勝義及云分別自釋亦云由有分別故虛妄有若無分別有即非有此等當知如於盤繩油然生起蛇想無實自性此就安立無實自性分而説貪等一切等同繩上安立為蛇非説繩蛇及貪等諸法在名言上有無相同故由此等理由計執所遮諦實理趣非就無始虛妄假立是就自性門於其境上執為實有即於所耽著境説為我或自性以此為據若於補特伽羅無有名補特伽羅無我若於眼耳等法上無有名法無我若於補特伽羅及法上執有此自性是二我執百論釋云此中所謂我者謂不依仗所有萬物他性獨立主體自性此若無者即是無我應知此有法及補特伽羅二者差別故云法無我及補特伽羅無我至於補特伽羅我執所緣甚多如入中論説正量部一類師説緣五聚蘊又一類師許一識心為我見正依識心亦有唯識師及中觀師所許阿賴耶識又有一類中觀師不許阿賴耶識如清辨等中觀派多數聲聞部則許意識所緣此等宗派又有説能修道者我漂流生死者我其我之根據須知是就賴耶等而有二種建立理趣薩迦耶見俱生我執入中論中破蘊為所緣釋論説緣假立之我且唯蘊聚亦非名言之我以時一聚及蘊時前後相續聚統非所緣其所緣我要起我想唯緣補特伽羅故我之根據統非建立於一一蘊及二時聚又此宗派最上差別法數他處已廣釋訖俱生薩迦耶見所緣須於自我起我想心緣他相續執有補特伽羅自相實有俱生雖是俱生補特伽羅我執但非彼補特伽羅俱生我見計執我所俱生薩迦耶見所緣即是起我所想心俱生我所所緣不執我之眼耳等所緣行相即從攀緣所緣已計執我所自相實有計執法我俱生所緣謂自他相續所攝色蘊等眼耳等及相續所不攝之器世等行相如前入中論釋云云何無明謂不明萬物自性非有而作增益於見自性障覆為性説名世俗又云由如是有支所攝染污無明增上力故謂即於境執實無明説此即是染污無明計執法我若以煩惱所知二障建立理趣説之此中如前此者亦是聖父子所許如七十空性論云因緣所生法凡分別真實佛説為無明此生十二支見真實法空無明則不生既是無明滅故滅十二支言分別萬法真實者即真實實有或執諦實寶鬘論云乃至於蘊有計執爾時於彼有我執此與所説乃至未滅執蘊是實即未滅除我見之義亦同四百論亦云如身根於身愚癡遍安住故一切煩惱壞癡即能壞若見緣起生愚癡無所起故對精勤者唯此語當説如是所説愚癡即是正説三毒隨一之癡染污無明空義可滅無明唯須於緣生義中所現緣起甚深理通達染污無明當如釋論所解是於諸法諦實增益此理是佛護論師隨據聖者密意解釋月稱論師明顯宣説巳二顯示生死輪回根本如是如前所説執有二我之無明復有內道外道多種宗派所許不同有立常一自在之我有許所取外境無東等方分一一極微及聚粗色有許能取內識了別無前後時分心識無剎那分有許心識等流有許無能所二空唯識實有遍計執性補特伽羅非法我執不論由宗派變不變心一切均有此不觀待宗派變心是説無始以來俱生二種我執即為此中所説輪回根本入中論云諸於旁生多劫轉彼雖不見常轉因彼等我執亦隨逐義説一切有情生死繫縛即是俱生無明遍計無明唯是宗派論者所有不應立為輪回根本故於此中變更所緣獲得決定最為切要若不知者在抉擇正見時不能攝持何為俱生無明之義如能握持抉擇重心縱不了知諸遍計執境壞相而能捨棄俱生無明壞性可滅二我故如前説非唯破除諸宗派論者種種安立唯抉擇無我即在修時亦唯此須修以正見抉擇是為所修義故是以由修而證修達究竟亦唯無餘滅此先見唯遍計執性安立二我是無次求滅除俱生煩惱極為應理入中論云證無我時斷常我此亦不許我執依是故若能了無我説滅我見最希有釋論亦云以譬喻門顯示此義互無係屬故説頌曰自室牆隙見有蛇為除恐懼説無象謂能斷除蛇恐怖嗟乎為他所譏笑此雖是説補特伽羅無我法無我亦同故可作如是説證無我時斷妄我不許此為無明依是故若能了無我滅盡無明最希有問若爾云何寶鬘論云乃至於蘊有計執爾時於此有我執若有我執亦有業從業展轉而結生是説執有實蘊法我計執是輪回根本又入中論云一切煩惱過無餘均從壞聚見所生慧者當能遍照見此又説壞見為輪回根本則二者相違不應輪回根本有二種不同故答云無過因此宗二我執所緣各別分開執持行相故無相異兩者均是執著自相實有為行相故又輪回根本兩相違者謂行於境持相二者不同亦能建立輪回根本故是以宣説法我執是壞見因是説無明內中二執因果之理若説二執為煩惱根本者是説我執及持相相異統為餘一切煩惱根本故此理趣有二無違無明類同前後兩者説為輪回根本無所相違月稱論師於壞聚見既未明説無明為主亦未別説法及人我但總説執法實有即是染污無明又説補特伽羅我執是執補特伽羅自相實有亦多宣説俱生薩迦耶見即是輪回根本若説從計執實有無明而外另有餘事故立輪回根本持相兩種不同而相違者實則二者俱是無明前説俱生無明即於所增益境上俱生餘一切遍計煩惱是於各別境所取而轉如眼等餘四根是依於身根而住只取自境如是餘一切煩惱亦依俱生無明而轉故説癡為上首如云如身根於身癡為遍依處百論釋云貪等本淨唯由愚癡遍計諸法自性故於愛非愛等差別境上增益而轉即以此故與癡相屬而起亦依於癡癡為上首故由愚癡於一切境執取自相實有所取之境若順己意緣已起貪若逆己意見而起瞋若於其境無所順逆中和而住不起餘二同愚癡類而起後者六十正理論云三有含識諸有情云何不生大惱毒何時住於無順逆即由煩惱變成執本釋所説如前寶鬘論亦顯密意云由執實蘊而生壞見而有餘煩惱生其理在共中士道時已釋應當推知又量釋論云凡諸見有我云我耽著常於我樂起愛由愛障過失遍愛其功德取辦我所樂故於我貪著即成生死因此宗前所説二種我執建立道理雖異但煩惱次第生理是依於此亦所應知此復初於我想起緣計執我是實有自相而起我貪在我樂上生起愛著所謂我樂亦不觀待我所因不自在由愛我所故障過失而見功德遂取我所成辦我樂如是引生煩惱造作行業由業結生流轉生死空性七十論云業惑為因相行惑業為主身是業因相三者自性空由如是理生死輪回次第須得決定依之而修巳三為求斷除我執尋求無我正見分二午一欲斷無明須求通達無我正見之因相午二生起通達無我正見之理今初前説為令盡斷無明二種我執雖須希求而於所希求者尤宜明了或能如是正求而於我執是為流轉生死根本道理不作勤奮求其了知或有所知既以了義經論善為破除我執所取之境而於相續所當生起清淨無我正見事不作奮勉斯乃極鈍根性既捨趣入解脫及一切智道慧命難續法稱論師云此境不破滅斷彼不可能斷德失隨起貪欲瞋恚等不見彼等境謂斷內心上所斷則不計執如為刺患若欲拔除須用針鋒從根拔起如是外境所斷是不觀待所取境滅須斷我執則於境上所取事全無所見月稱論師云貪瞋等煩惱及一切生死老等遇患是從我執所生為滅除此故起斷欲爾時我執所增益境補特伽羅之我諸瑜伽師則由正理滅除入中論云無餘煩惱患壞聚見所生具慧明了見我是境分別瑜伽師滅我此復須是修真實義者名瑜伽師此理亦是龍樹菩薩尊勝密意六十正理論云此是諸見因此無惑不生故若遍了知惑見均遍淨凡若擬了知須了緣起生緣生即無生此即遍智説謂染污見許為餘一切惑因於緣成法執為諦實由緣生理通達諸法自性無生故説能斷言了知自性本空者謂所計執諸法自性實有境本無滅故是不生提婆菩薩所説同此前已引證又四百論云境若見無我三有種隨滅謂我執所取外境既見無我則盡斷三有根本無明寂天菩薩亦云補特伽羅空性極應成辦斷此根本一切煩惱均不生故如聖如來祕密經云如是寂慧應知如斷樹根則一切枝葉枯萎如是寂慧若是止滅薩迦耶見則一切煩惱隨煩惱無不全淨此説修而證得補特伽羅自性空之空性則滅壞聚見此若滅者則一切餘煩惱盡滅不滅補特伽羅我執之境不能通達無我故經中明説壞見是一切餘煩惱根本若以除無明外而有二種生死不同根本此亦不應理故總之諸大善巧解釋甚深經義抉擇真實義諦是由多種教理解釋凡是顛倒執取之我全是無有空不見其我是為無我凡未能通達空性者如是深切了知最為切要若於所破生死繫縛根本倒境之義不修習者縱欲修習此外餘甚深義則於我執毫無傷損既不能引發無我慧及真實空性自不能滅我執故又不能壞我執境心於彼境僅作內攝不令外散此亦不能建立趣入無我此義是説意於境轉有三所緣一者執實一者執不實一者計執不計此二差別既不執不實亦不執為實如是既不趣入二我亦不須趣入二無我心於第三聚漫無邊際要知二種我執主要是緣人法二事而轉凡於亂本如何是無所取彼相是須抉擇否則等同捕賊已藏密林徒勞追蹤故能滅盡亂本是由修習所抉擇義似此之空是最勝真實義如是於男女等補特伽羅色受等法戲論執為實有之無明是由修習既得通達無我空性正見而滅此若滅者執實緣境所起愛非愛等增益相非理作意虛妄分別亦滅此若滅者壞見為根本所起貪等諸餘煩惱亦滅此若滅者此所等起諸業亦滅此若滅者衆業牽引生死無自在生亦滅得解脫道決定堅固生起故當尋求無疑真實正見中論云業惑盡解脫業惑從分別分別從戲論空性離戲論故能了知止滅輪回流轉次第是須愛重能證真實義諦不善抉擇所緣無以成辦午二生起通達無我正見之理分三未一將生二無我見次第未二正生二種正見次第未三建立世俗勝義二諦今初二種我執生起次第先由法我執引生補特伽羅我執若即彼我執轉為無我先起補特伽羅無我正見後引通達法無我正見寶鬘論云士夫非地水非火風虛空非識非一切六界集聚故此外何所有故無真實性如是一一界集聚亦不真如前所説補特伽羅及所安立根本地等諸界全無自性明句論及佛護論師亦云若能入真實義諦須先能入補特伽羅無我寂天菩薩亦如是説所以必須如是次第謂於總事人法之上猶待決定之無我雖無粗細而別事要旨在補特伽羅上易於決定在法上難以決定故如以法無我為例在眼耳等上難定在影像等上易定此等如前所舉抉擇無我之喻顯此密意三摩地王經亦云如何爾自起我想心於所知當推量一切諸法之自性周遍清淨如虛空能由一法知一切亦由一法見一切謂若善知凡所生起念我我想我自性以之配合內眼耳等外瓶等諸法并能了知與彼相同由是見知一法本體之亦能見知餘一切法自性未二正生二種正見次第分二申一抉擇特補伽羅無我申二抉擇法無我初又分二酉一正釋補特伽羅酉二抉擇此無自性今初云補特伽羅者謂天等六種及異生聖者等補特伽羅此復造集黑白業者果感受者生死流轉者為解脫事能修道者證得解脫者等入中論釋等引經量云云我是魔心爾是見所轉空去此想蘊有情則非有如諸支分集依此説有車如是依諸蘊説世俗有情此中初頌是説在勝義諦上無補特伽羅故無補特伽羅之我又頌第一句説補特伽羅我執緣於魔心頌第二句説如是執者為惡見所蒙頌三四句説蘊聚補特伽羅空第二頌説補特伽羅在世俗上有此復初二句是喻後二句是法補特伽羅僅是依蘊假立或以此經既説蘊聚是補特伽羅所依事則所依事即能依法不應道理以蘊聚者不外時一聚及時前後聚二者又立蘊聚相續為我不應道理若立能聚為所依事所聚亦可立為所依事故此二者亦不應理入中論云經中是説依於蘊故唯蘊集不是我又云何故大師説蘊我是故若許蘊為我可滅蘊外有餘我色非我等他經説謂諸行者婆羅門等我及我所見唯於此五蘊上見如有蘊異體我而為俱生我執所緣已由唯字破除既破除此則亦非説蘊為我執所緣若實爾者則與他經所破五蘊是我成相違過以從二種我執所緣內若是緣境須立為我又經説因蘊起見之義須知是在依蘊假立之我上而作攀緣是故經説於唯我上假設為我許世俗有計執自性實有之我雖僅世俗亦無如以此宗所詳擇者即是所許世俗有補特伽羅之我亦不許有似以補特伽羅正解是此無上宗門特法若能善了是為通達不共補特伽羅無我最妙方便酉二抉擇此無自性分三戌一抉擇我無自性戌二抉擇我所無自性戌三依此開示補特伽羅如幻顯現理趣今初此中有四要旨第一認清執有補特伽羅宗計是待自續此如前説第二若是補特伽羅自性實有不論與蘊體一體異全須是實此二者外無實方便如總説柱瓶心若決定若是有對則遮無對又如説瓶若是無對則遮有對一多全無遣第三聚故一體異體二者全無均能決定第三蘊與補特伽羅二者一體見其過失第四此二異體亦見其過如是圓滿此四則通達補特伽羅無我正見清淨生起又此蘊我體性若一有三過失一許我無義謂既一體自性成實無差別因以勝義上任心所緣不現差異即在世俗假上幻現真實兩應無違而實有違中論亦云若除取蘊外其我定非有計取蘊即我汝我亦是無二我應成多若我與蘊自性是一一補特伽羅如有多蘊我亦應多如我獨一我亦應一有斯過失入中論云若蘊即我故蘊多我應多三我應有生滅中論云若蘊即是我我應有生滅謂如蘊有生滅我亦應生滅二而一故若是許我或補特伽羅有剎那生滅當有何過在世俗上雖如是許無過但外道是許補特伽羅自相實有故生滅須許自性實有入中論釋説有三過初過失者本論云凡是自相各別異彼等一續不應理自體既是前後相異不應後待前起前後各有自在獨立性不應仗他故如是既非一續佛不應説爾時我是某甲譬如天授念宿命時不應作念我是詞授相續異故自宗雖是剎那壞滅而由前後一續不相違故念宿命應理諸有未了此義引多經説我前是此於是即以覺時之我即是前時之我二為一體又云若是有為剎那所滅是一非理二是常故此是依於前際所説四惡見中第一倒見不墮此見特須善了憶念宿世時境時自性差別衆多差異所云憶我之憶理二過作業失壞者謂作業者及受果者不應納於唯我一相續上三過未作會遇者謂雖諸餘他異相續所集業果此一相續應能感受此二過失亦如前説補特伽羅自性若是實有前後多剎那不應一續中論亦云若人天各異相續不應理若作是念如許我蘊二者自性實有相異有何過失中論仍云有過若從諸蘊外無有蘊自性故從蘊我若有實異體性則不具足蘊有為法所示因相生住異滅如馬異牛不具牛相又若如是計執不應緣於俱生計執所立名言我事是無為故如虛空花或為涅槃又蘊等相離變礙色等自性異有須是可得如色心相異然不可執故無另我中論云若從取蘊外有我不應理若異無所取應見然不見入中論亦云是故離蘊外無我除取蘊外無所執故由如是正理乃至能見我與諸蘊若自性異有諸過難應當求其能得定解若是於此一異品過引生清淨決定了解縱然決定補特伽羅是無自性亦唯知解非是獲得清淨正見戌二抉擇我所無自性如是於我既以正理尋求有無實有自性是一是多全無所得則滅我有實性爾時再以正理觀察真實性則我所實性亦不可得如石女無兒則其所有眼等亦無中論云我性若無有我所何所有入中論亦云何故無能作無業是以我無我所無故見我及我所空瑜伽師能得解脫故於自續因唯我想所執我或補特伽羅由正理抉擇自性不實當能通達地獄乃至佛果之數取趣一切我所諸有漏事無漏蘊一體異體如實自性現證一切補特伽羅無我義如是亦當了知一切我所無自性成辦理趣戌三依此開示補特伽羅如幻顯現理趣分二亥一顯示佛説如幻義亥二依何方便現如幻理初又分二乾一無倒幻現道理乾二開示幻現正見今初三摩地王經云如是陽焰尋香城如幻如化亦如夢串習行相體是空當知一切法如是又大般若經亦云從色乃至一切智中一切諸法如幻如夢經説如幻其義有二一説勝義如幻僅可言有而破諦實二説自性本空現見如幻此是後者此須如其所現要有所見事及自性空若唯現見猶如兔角及石女兒亦非宗要或如所現有所見事空不現顯心亦不現如幻現事故以如幻喻能知餘一切法者如魔術幻師所變馬象如所幻現實無馬象此是因見真有馬象故亦不能顯現不實如是在諸補特伽羅法等所緣境上從本以來自性雖空而因見實故亦不能知其是假如是所見人天等補特伽羅及所現色聲等事諸法安立從然一切我法自性塵許亦無但能造業者等及見聞所作等一切能所緣起應許是有既一切能所有故則非斷空且亦非是於如是諸法本來空上唯是知空心以為空由如是許一切所知亦非小乘日時部所計空能修此者則亦趣入一切執實耽著之對治故甚深妙境非心於境均不堪忍如以正見抉擇正修所修勝義於境能堪非如不修道者似知似了一無所有之空若作是念若是了知彼影像等隨所顯現決定是空已為通達無自性者則異生住現證無性皆成聖者若非通達彼等何能堪忍無自性喻此如四百論云説見一事者即見一切者以一法性空即一切空性此説通達一法無性空性即能通達諸法空故是亦不然以達物影物質雖空而於影像計執自性實有之境全不能損故不能壞彼境以未通達空去影像自性實有之空性故其心非是證得影像真實據此雖然通達幻現馬象由幻故空及夢境顯現隨其所現故空如夢如幻非是獲得通達中觀正見然以此等取喻可從色聲等例知餘法為易於通達無自性之因相而證性實之自性空若境實有何者是空此外他求心不可現以此二者成相違故初於此等世稱假喻先能證入自性是無次於世所未説諸餘假法是須當起了達無有自性因須此二前後次等故若通達一法空性密意非説即是現證一切餘法空性他法有無實性經説心品是能通達之義如是依夢所知而證所現男女等相空及實是夢而見一切法如夢兩者義亦有異現觀莊嚴論云諸法全亦夢故見如夢等如是修習定心所現諸瓶等相隨其所見證得彼空及證彼等如幻如夢自性不實義亦相異故於了義經論所説當證如幻如夢之如幻現道理諸不共差別當善尋求又若爾者猶如愚童執有鏡影所現諸像及於幻現不知戲法執有馬象亦同不知依夢所起而於所現山林房舍等執為真實及年事既長明辨是非魔術幻師於夢知夢亦同了知彼及彼等均是不實故此二者均非獲得真實正見乾二開示幻現正見不善受持前所破量觀察外境離於正理則首生起境無有想次於能觀察者亦見如是乃至勝解空者亦復非有任於何法此是此非皆無能生定解之處次見現境渺茫故不明辨自性有無及僅有無似此之空是為破壞緣起之空由證此空引生顯現現境渺茫畢竟非是如幻之義故以正理觀擇覺補特伽羅等在自性實有境上無少安住依此因緣現見此等唯是渺茫顯現并非難事如此顯現凡諸信解中觀宗義稍聞開示無自性法要一切均可然其難處謂盡破自性實有之自性及以無自性補特伽羅等立為造業受果者等至心定解而能雙立此二聚者是趣有際故中觀見最極難得故以正理觀察諸法真實性時不得生滅相者是遮自性有生非遮一切所有生滅等法否則一切法空則如兔角龜毛經説一切緣起能作所作有不應理之過如四百論云如是則三有如何能如幻本釋云若能如實見緣起者當如幻化非如石女兒若由此觀察破一切生相説諸有為皆無生者爾時即非如幻石女兒等是能度量我因恐怖無緣起過不能隨順彼等不違緣起順如幻理又云是故如是周遍觀擇諸法自性皆無實性諸法別別唯餘如幻是故唯執現見如幻之緣起有非有過失幻執若於如幻所現執有自性且是諦實斯為過失三摩地王經云三有衆生猶如夢於此無生亦無死有情人命不可得諸法如沫如水蕉一切如幻如閃電猶如陽焰水中月全無人從此世歿更無往生他世間然所造業終不失生死成熟黑白果謂以正理觀擇真實而作尋求雖微塵量許亦不可得若生若死補特伽羅然諸法如幻引生黑白業果須如經説善修此復非是如等引宗心絶諸緣心全不著專一境性由所獲得堅固定力次從定起現見山等非如先見堅實而如霓虹輕煙無礙現象此亦非即經説如幻顯現僅是空去粗相有礙顯現以此等現境並非空其自性實有故又無有礙堅實之相畢竟不許無自性空故若不爾者取虹等異事時不能生起實執又取有礙異事時不能引生通達不實之慧斯成大過亥二依何方便現如幻理若作是念是當如何乃為顯現無倒幻義譬如幻現馬象眼識所見及無所現馬象意識所定以是因緣如其顯現馬象引生決定或幻或假如是補特伽羅等依世俗智假有顯現又彼自性是空依是理智二種決定此補特伽羅幻或假現定解可生依此要旨在三摩地中假托持相所緣縱塵許亦無猶如虛空趣是扼要修空次從定起觀察所現正境於後得時現起如幻之空如是於一切法由以觀擇有無實有自性正理多次抉擇則於無自性空既生猛利定解已其後觀待所現起境是如幻現在幻空外無抉擇理故將修禮拜旋繞等行品時亦如前以觀擇定解智力攝持次修彼事學習如幻於此幻中修禮拜等既能清淨後雖僅念正見頃彼等均如幻現若以容易尋求此定解宗而説應如前釋於正理所破總相善能顯現於心并善思惟透徹認識自續無明在自性上如何增益此復若有似此自性不出一異道理或共許一異二聚則緣有害宗派分析思之固見其害引生定解後起此想補特伽羅自性少許亦無由此堅定於空性品多次修習遂於補特伽羅世俗假法見不堪能心於境現心且作意所有安立造業及感果者諸緣起品則於説無自性緣起正宗能得定解若見此二相違爾時則取影像等喻思無違理如同影像諸眼耳等隨其所現是空亦如影像是依鏡及物質二者而起若此等緣少許違滅如彼二法同於一事不能遮止如是補特伽羅雖無自性如微塵許然造業者及受果者又依宿業煩惱而生皆無相違當淨修習如是道理於一切處皆應了知申二抉擇法無我補特伽羅假施設事地等六界眼等六處是名為法此自性空名法無我抉擇此理有二一據前所説正理辨難破二前所未説餘理破初中蘊界處等法又二一有色等是自有東等方分抑由緣而有方分二心識等是自有前後時分抑因分別而有時分如是觀其一異實體何所成立則如前破并如前引經義云如汝知我想如是觀諸法此又分二未一證成緣起未二雖是無為亦非實有道理今初海慧請問經云凡是緣起生彼等無自性此由緣生記別明破自性實有又無熱惱請問經云凡從緣生彼無生又彼自性本不生凡待於緣説彼空了空性是不放逸此在契經中所説極多此中首句説無生義次句是説自性本不生謂在破有生上如所破簡別言楞伽經云自性無生我密意説一切法無生明顯句論所引亦云未作簡別説無生等是恐計執凡是一切生全無有故取世尊契經密意説自性無生義頌第三句所説仗待於緣實體是空義者謂自性體空即緣生義非説僅破有生為空如中論云凡是緣生法彼自性寂滅是説由緣生理體實寂滅或空中觀派者即以緣生法説云無生似此證成緣生道理極應讚歎無熱惱請問經云智者能達緣生法則於邊見不為依此説了達如是緣生則邊執見不為所依入中論又云何故法依緣起生此等不能分別觀是故由此緣生理斷諸惡見網邊際此是聖者龍樹父子無上特法故從所有正理之中當示緣生正理此中有二主要錯點可為清淨正見障礙一於諸法執為諦實有實仗託所緣常增益見二因握持所破量力決定因果緣起於自宗內屬於了義此是此非無可置辨斷損減見此二均是依於由此因緣而生此果之因引起若破自性實有則可全斷以因所決定斷見宗所決定常見均從根本拔除是以牙等外法從種子等生行等內法依無明等生果如此者自性實有則不應理以自性是實本體具有自在功能依仗因緣則成相違百論云法從依有生此則無自在以既無自在故我亦非有補特伽羅及瓶等亦是依於自聚假立應知無實自性以建立緣生之因有二若是依他生及是依他假立凡其依托無有與此成一自性若有一性一切能作所作均應成一此二亦無實有他性若是有者能各獨立觀待於彼成相違故中論云法有所依生此非即彼性亦非彼所餘故非常非斷出世讚亦云若是自所作他作及俱作無因外道許佛説依他生凡緣起所生佛説即是空實事無自在無等獅子吼此説緣起之因遮止一異斷常及有生四邊實執從是引起空去一切相執託緣之空性悟解並不棄捨業果關係故於開示取捨極其讚歎菩提心廣釋云由了諸法空凡所説業果希有更希有殊勝更殊勝如是凡説有自性其有及無自相其無須分別其差別如入中論釋云影像無自性其因果安立亦如是知任何善巧住於色受等因果不異僅緣其有能悟解自性俱是故雖緣其有自性無生此等若不分辨有實事遂自性有無自性遂全無則不能超越增益損減二邊百論釋云如説有實事師若時説有實事爾時即是説有自性若時無性爾時即説一切實事全無等同兔角未出二邊故此所樂一切難以吻合故無自性能離有邊即於彼上能立無自性之因果離於無邊廣釋邊理論云盡端近類低謂邊如是諸邊在自宗內雖亦同許然説離邊錯見之邊者如中觀明顯論云設中觀師心性實事勝義堪能成其為有爾時其有常無常耶現前所耽亦復落於邊者以隨行實事真實如所有性故即此如理作意是過患處不應道理以如是作意如何住義非過患處亦非邊執如世間説險崖深淵墮於此中説名墮邊如是計執諸法諦實全不諦實或無所有而與勝義品類相違是落斷常二邊然於諸法勝義諦無業果等法世俗假有則非邊執回諍論云若違無自性則成有自性此説勝義諦若非無即是有又云於世俗不許吾等不能説空性七十論云世間説緣生此理不遮止故於彼境説非有及有説非無及無辨其差別唯就説者宗派差異兩俱句義雖就心上顯現道理安立爾許而無有異故由此理説墮邊不墮邊者僅就四句表達盡矣未二雖是無為亦非實有道理如是諸有為法及補特伽羅由前所説道理既是證成無實有性則可比知虛空擇滅非擇滅真如等無為法亦無瞬間成其實性中論云有為既無性無為何有性一類自部實事師説有為有自性既如前破無自性矣然許縛脫因果能量所量等能所建立可有此若有者如無為法法性擇滅雖是亦無實性而許有所證道所量所化歸依處所法寶等諸種安立為有如不受許此等為實則建立此等設施所為不應道理既全説無自無許有之義既又許此等實有則彼等能相所相離因離果正量所量諸種安立須全共許爾時此等各自所證因相能量等不相繫屬一切能相所相無繫屬轉不能遮滅若許繫屬自性實有不必待他故其相屬亦不能立如是雖假説一異仍應破者以由正理觀擇所許諦實若不能破則有為法亦同其類實有縱是少分亦不能遮設作是念所言有為自性所成自體空義是於彼法無彼自體成為斷空真如法性應是實有自體如是説者首於有為緣起墮損減見且自體有更是執實常增益見是於清淨性空之義趣入顛倒又若自性所成體空則於法前無有其法法自無有然許法有少分為實及以教理證成諸師亦應自性所成自體是空是宗不成以於少法實有宗派建立未經深細觀察而説具種性者能善通達此理可知西方自部諸師所有説法實有定為説有實事故名彼等為實事師及後説無實事凡所有法全不許實者較之此方誑妄説者尤為特勝之因此中於真實性雖有相異二説然世俗諦自性實有自體是空道理如前再就根性相等於勝義諦其勝義成不成實諍辨道理雖如何轉就前所釋須善了知以由正理既破諸法實有因而不許一切實事及法諦實并由了空過患斷空之見而説實事及法無實兩者不相同故又若如前所引有為既無性無為何有性云何不與六十正理論及法性讚相違六十正理論云唯涅槃是實諸佛一時説善巧誰能了是説唯涅槃是實餘均非實法性讚云開示空性經世尊如許説均為滅煩惱非為壞此界此説開示無自性空性諸經是為斷滅煩惱非説無有自性清淨界此等均為倒解經義經之正義者佛云諸苾芻唯此諦實如是涅槃是不欺誑有法一切諸行是假欺誑有法此説涅槃是實諸行是假解釋極明又涅槃勝義諦是為六十正理疏所解疏意在現量親證心前無實自性其心照見無倒其餘諸行在現量親證心前自性不實照見有倒抉擇諦實不實何能僅滯其名不於其義微細思維又六十正理論云三有及涅槃兩者俱非有即遍知三有當説名涅槃是説生死涅槃二者俱無自性即以所了三有無性為境安立涅槃何是所許無實輪回之空斷空品類空性讚教義又云説無自性開示空性諸經是為破除餘一切煩惱根本實事計執是説無所耽境非説既滅二我執境自性清淨界之空性是無空性雖有但非諦實教義且説所遮滅除實有之空性亦無斷盡煩惱自不須證勝義真實空性是為滅諦根源故讚又云由苦空無常三者能修心最勝修心法即是無自性又云即諸法無性當修法性空是説所修諸法無性即所修空性能修此者是最勝修如是何能説為照見諸法無有自性之空為斷空另外有一所修實有空性乃建立為空譬如東方本無蛇而以為有為除恐懼説名東方無蛇不成對治如是在西方説有樹幹亦同諸凡夫類如其所觀既耽實有而欲除苦豈能執實為本而能證得無實不為對治其明未三建立世俗勝義二諦分四申一明二諦根本申二數量申三區分之義申四各別解釋今初分辨二諦根本前諸尊長所説理趣雖多此中是據集學論云一切所知盡納世俗勝義二諦此言所知是其根本申二數量如中論云世間世俗諦及云勝義諦申三區分之義既分為二必須相異相異道理是如何者此中衆多先德説有三種異相如瓶與布是體異造作無常二者體一破異此二異因俱是實事兩者隨就無實事此之異名遮一之異二諦即屬後者有一類師二諦體一許為破異如中觀顯論説聯繫一體於無實事亦不相違異因俱無實事及隨一無實事兩者體一遮異無違入論釋云一切實事自體有二即世俗勝義即凡每一有法體上均有世俗勝義二者之體又二諦體若非一而是相異極不應理彼二體無應無所有有體應可隨其有一有多故菩提心釋亦云世俗就空性説唯空性是世俗無則悟無生故如作及無常等猶如稻芽若是與自勝義異體與自諦空亦應異體稻芽應為實有故非體異而是一體稻芽自雖體空即自亦非勝義諦少分論典説二諦非一非異一類説自性實有一異又一類説體異破一兩者均非申四各別解釋分三酉一世俗諦酉二勝義諦酉三二諦數量決定初又分三戌一釋世俗及諦名義戌二世俗諦因相戌三世俗之差別今初明句論云世俗有三説障真實性互為依事世間名言後者是就有所詮能詮所知能知等因相上説非唯有境上名言即足凡一切所知所詮亦不立為世俗諦此中就諸色等了知世俗上安立諦實云世俗者是三説中之初又在無實自性之諸法上説有是增益無明以無真實事安立為諦是就其心在無諦執之心上諦無所立故亦如入中論云癡覆自性故世俗由此非真見為實能仁故説世俗諦所有假事名世俗論疏云如是且以有支攝之即由染污無明故建立世俗諦此復聲聞獨覺菩薩斷除染污無明即於諸行影像等似現諸色自性假而非真現見真諦無貪求故諸愚夫等顛倒造作再有一類了知如幻即緣起生故唯世俗論疏之義既非因有無明立有世俗諦亦非因就斷染污無明之二乘菩薩不立世俗諦此中初義已如前説染污無明既是執實此所取事即是名言亦無所有若是世俗諦者名言應有故安立諸法世俗為有三立處若是世俗者必非染污無明所俱世俗論疏第二義諸已斷染污無明之世俗即於集前所立諦實是無耽著諦實之世俗即由此理所見諸行為不真實即非世俗諦不成立故由是在彼等上而説諸行唯世俗者因從世俗及諦兩者之間諦無所立唯言是防真而不防世俗諦故説唯世俗及世俗諦二者密意應如是知明句論云於世間世俗上實有者世間世俗諦入論疏云即於世俗凡所有相現見真實如其無自性見有各別自性此是世間顛倒所計世俗實有名世間俗諦此如前説染污無明俱在世俗上見為真實在名言上不立為諦者以與他處所説自相實有雖名言亦無之宗派相違故又成辦無諦及遮滅實有均就名言上立故由此理智藏阿闍黎所説於世俗上住諦亦當了知法性及二我在執實世俗上既為真實應為世俗諦此唯就執實世俗上為實然不説為世俗諦之諦戌二世俗諦因相在內外每一法上均具勝義世俗之二性即以一芽為例一者由清淨所知見真實義之如理知所得芽性一者由虛妄所知對錯誤事之世俗知所得芽性前者是芽之勝義諦性後者是芽之世俗諦性如入中論云諸法由於真妄見所得二性即計持清淨見境勝義諦虛妄所見世俗諦此説芽體具有二諦之兩性勝義如前知所得世俗如後知所得即一芽性就觀待所知有前後二非就二諦而説入論釋云一切諸法自性有二即勝義世俗即就相異法之自性上分為二種勝義即是見清淨事之知世俗即是見虛妄知所得世俗諦者於不實事執為實有唯就其執實是諦其事必遮知其虛妄以瓶為例了知所知是虛妄事即於其事由如理知定獲能破壞見破其執事耽境以不遮其實有理不能成立虛妄量故瓶布等雖是世俗諦世俗諦心可有世俗事心不須有如瓶布等無自性如是現見雖是如幻此如幻心可有其如幻事不須實有入論疏云此中是就一切異生所有勝義即此勝義聖者顯現俱一切有境唯是世俗即此均是自性空為此等勝義是就破説以異生者於瓶等法既執為實即於勝義亦執為有觀待於彼就異生心瓶等一切是勝義有非世俗事即於此等勝義實有之根本一切瓶等聖者相續現起如幻就其稱量智照是為世俗若觀待所了諦無所立故云唯世俗如何亦説此等自性是勝義諦如云瓶等世俗及此等自性聖者勝義此當分隔解説不應説瓶等在聖者心為勝義以由如理知照見真實義瓶等不可得故及由如理知照見真實義所得勝義諦事戌三世俗諦之差別中觀自續諸師心識所現自相實有如其所現決定為有在所緣上亦不分二亂在見境時如其所見而分自相有無者如二諦論所許所現雖同事有別有堪作事無堪能又有清淨不清淨是為世俗之差別此派許有無明俱起自相實有所見一切其心識所現是為無明所染在世俗境上亦不分別二種錯亂此中入論疏云凡諸世俗又不實者此非世俗諦謂於假現世間世俗之前有如影像由此影像不實觀待此者非世俗諦若由照見所知假事所得實事為世俗諦如其見影像心見境錯亂諸有無明俱起所見青等雖是自相實有而見境錯亂相同若立所量實有如是與其安立錯亂相違又建立所量是假是仍入於其類若不爾者在名言上不成實有則難建立世俗諦以於名言建立諸假如幻不能建立俗諦故中觀應成派諸師會遇亂因所未染之六識及此相反六識由前六識所取六境是錯亂六境六識立為錯亂世俗由後六識是無倒六所取之境立為清淨世俗又由觀待世間或名言量亦立清淨錯亂世俗非是觀待聖者觀照隨行之如理知中觀自宗諸師許無明俱現見影等及青等二是待現境無有錯亂及不錯亂二者不分清淨錯亂二種世俗入中論云由無傷損六根等凡是所取世所證即此世間是實有餘從世間立錯亂計執法及補特伽羅自相實有是因會遇雙有自部劣等自宗染意所起如其持相相違品類名言量所不成是其特別復次盡離一切無明習氣所薰染因在此盡所有智上雖出現有二相但在所現見境並非錯亂此種道理他處已釋酉二勝義諦分三戌一釋勝義及諦名義戌二勝義諦因相戌三勝義之差別今初明句論云謂此是義亦是最勝謂之勝義此即是真實名勝義諦此就勝義兩者許勝義諦勝義諦實道理是不錯亂此復法性隨其所住如其所現而見於世間心無錯亂故勝義諦僅是隨世俗名言故立為有此據六十正理論疏説故世俗諦之諦者就執實有為諦與勝義諦名義詮釋不同戌二勝義諦因相分二亥一正義亥二斷諍今初勝義諦因相者如入中論云謂見所知正境所得已如前釋又論疏云所謂勝義者即諸照見勝義之勝智即於其境證我本體此我自體不是另有是一體故義説稱量真實性之無漏智所得自性非實故此破有説無漏等至所得得應是實有之論所云勝智不可泛指凡諸聖者智所得唯指見如所有之智所證云證得者即由其智如是成辦之義此於世俗亦同又如何證得道理者如以障翳眼見虛空中有毛輪現眼無障翳空中毛輪一無所現如是為無明障翳所覆諸士夫所緣蘊等自體即此所緣如以無餘滅盡無明習氣及以聖者有學三摩地無漏智慧依於照見真實性理是無障翳之眼如是依於極細雙照亦無所見道理凡屬所見自性為勝義諦如入中論云障翳力故毛輪等自體顛倒是虛妄即此佛以淨眼見即此如實此中知論疏亦云即於蘊等自體盡離無明習氣佛薄伽梵以無有障翳見毛輪理凡其所見自性即為此等之勝義諦如是所見勝義者即於每一有法上俱有二種勝義體一者有法實有性空之自性清淨涅槃二者即彼有法盡離垢染種子之滅諦涅槃六十正理論釋云云何涅槃亦世俗諦耶此者佛説是故涅槃唯是就世俗諦上安立義謂涅槃勝義諦雖立為有然唯就世俗諦假有名言心上建立此宗非説涅槃即世俗諦者仍如正理論釋云三諦謂世俗涅槃勝義諦入論疏亦云餘三諦謂世俗及滅諦勝義諦故難若立涅槃為世俗有則與所説勝義諦相違答唯由世間名言説勝義諦故故立一切有乃依世間名言立如十萬般若云此一法者是依世間名言假立非是勝義七十空性論亦云有生住滅相有勝劣平等佛由世言説非依於勝義此説生住滅三下中上三此有此無等建立一切盡所有説佛唯依於世間名言假立而説既非唯就世俗亦非依於清淨真實而立智藏論師亦云於勝義是實為勝義諦此雖如理智亦説為勝義而於其境無有錯亂説為諦實非於實有堪忍觀察以彼論中破一切法為實有故若作是説勝義若於勝義非諦則世俗亦於世俗非諦是所許故若云前前不成後後亦不成立者則將成為因破諦實顯無實諦所破有法可成實有以勝義諦是於所破有法上唯破實有而建立故且諸有法於世俗上既不成立自是假亦不成立故此説極其混淆以見諸有法無實有性即非諦實在破境上自須納入於假由是名言安立為有雖不須由其真實性之如理智證成但須世俗及如理智量均不為害六十正理論釋云住於取蘊無常等四世俗上有攝持彼四觀待於彼是不顛倒及於取蘊常等四相世俗上有雖無所住觀待於彼執持彼四説為顛倒入中論云無知昏睡諸外道如其遍計之我體及於幻境諸遍計此在世間亦無有即外道遍計執我勝我及幻現馬象等諸所耽境雖世俗亦無僅在錯亂心上為有此若説為應成派所立世俗有者是無心要之論即其他大中觀師誰亦不許入中論雖説能緣所緣有無相同但非僅就有無是以二者自性有無而説故諸安立名言有者雖是由世俗名故但不許由此之故一切安立均名言有僅限於依於名言所立僅限一詞是妨有境非名言義安立之義非畢竟妨量所成因如是依於名言假立所立不為滿足若非如上説假立義而要尋其事是如何有得則安立為有不得則立為無則非此宗所許因由此推尋尋而若有所得許為實有似此觀察所得之有在名言上亦不許也於其實性觀不觀察之分際既從此建立若自相實有非唯依於有境名言所安立事從見自體為有然自性自相自體實有即在名言亦不許也此者他處已廣釋竟亥二斷諍設佛如所有智得勝義諦者如入論疏云若云如彼諸相自性非是即無所見是則如何照見彼等此雖是諦然由不見理趣而照彼等謂全無所照説為見真實就能知智説勝義諦是又超越一切智之境於佛地中心及心所所行畢竟滅亡若是佛不見蘊等豈不與釋十力時所説遍知一切法而相違背此中所謂由不見理趣而見者非謂於任何境全不照見是説若由無明障翳力故於此等所緣本有真實性簡別聖者須以三摩地無漏智為緣即由彼等全無所見之門照見彼等真實以所破若有即從堪為所緣而不緣是建立破所破云無所見即是勝見亦如是知此復攝頌云不見色等愛等亦不見想既不見思亦無所見設若不見識及心意三此是見法善逝如來説云見虛空有情遍宣説虛空如何可見故是假如是見法亦復如來説見就譬喻是故不可説義謂不見者五蘊見者是法故見真實義亦同若誰見緣起即是見法又如虛空唯是破有礙觸見或了達若有所破障礙僅緣其堪為緣者不見其礙道理相同此復見者虛空不見者障礙見真實性頌末二句所破所云不見五蘊者是就無漏等至所見真實性不見有法而説入中論又云諸天子勝義諦者具一切相勝是超越一切智之境勝義諦如何非如言詮此釋勝義諦時謂心不見境及有境各各所現即是能所雙亡非説佛不通達勝義入論疏亦云於事不觸有作性唯是現證自性佛於即此了知名之為佛即就佛之如所有智所見真實不觸依他專了法性又心心所行境滅者即是現證真實時滅除分別行境之義非説無心心所明句論云分別若是心行境遠離此故此真實性即是無分別又如經云云何勝義諦若心行境全無文字亦何所須入論疏云所謂心無所行義是説無有分別所行又有學聖者等至時非畢竟滅佛位乃是究竟又論疏云若無自性諸佛子等為通達故前行則無義利既是心相應修如是彼等自性又復如何彼非新作又全不待他是淨離無明障翳智所證性此是有耳誰云是無若是無者是為何事菩薩修習波羅密多道為證法性故菩薩故起百劫難行又云善男子若勝義非有不僅所修梵行無義即如來出世亦成無義立有勝義故説諸菩薩等善巧勝義此謂勝義諦若無所為究竟清淨涅槃事加行無義所調因無所證佛為令其通達故出現於世是亦無義諸大菩薩於勝義諦非為善巧故引經教證成勝義諦有此派所説勝義諦非所了知聖者等至且無通達真實智者唯是顛倒之論又論疏云故從假立説證真實諸法實性非是少分少分所知以能所知兩即無生故此中所説第一義就慧及真實性二者分為境及有境而立通達真實者是於世俗智上建立非就勝慧上建立之義云能知無生即自性無生義如於水安立水云勝智之境即真實心心所不轉唯身現證者謂當現證之所作業即真實性能緣之智為能證之能作圓滿受用身是現證真實之作者正遍知者至於現證道理如前所釋即是違滅心心所顛倒所行論疏解云即彼智身能現證身離心心所有寂靜性佛若不見蘊等其盡所有智及一切盡所有事是為增益以有而佛不遍知兩相違故故盡所有智必照盡所有事本派不説無相照了以就相顯現説盡所有照見境相亦有二種一者不為無明習氣所染佛相好等一者為無明習氣所染不淨器世此中初者於佛地中無所破事次者於佛地中因倒即是破照見道理謂佛相好若在未斷無明之補特伽羅所見如其自相不實於彼所照其境非因無明習氣力故所生因相是彼能緣心因無明習氣薰染力故而現此者唯於他有情前如是見非能緣見於彼以就本身如是見故就佛盡所有智已斷無明而言色聲等是自相不實又此中觀照之義是就俱有無明薰染之補特伽羅唯見此等即是見佛不觀待他非就佛自照故雖色等無自性就有情所見佛智亦俱無明有情之前如是見故於彼有情不待於彼而就佛前由如是照則不是智彼中所見無有錯義此者在智上雖非從有染見而由彼智是為須知一切所知之要如是真正盡所有智者見一切事無我見無自性如假如幻不見實有諸有無明相應者其見分智於此照見唯見實有顯現六十正理論云於事諸善巧見事是無常欺誑法集空無我寂靜相其釋亦云到彼岸者如是照見二諦論云觀察體寂靜如何見唯此所依一切生一切智現證謂一切盡所有全於現證地見如云何時無所見能所知主宰此各相無生堅住故不起此説從寂滅三摩地起時能所雙照亦不起此與所許根本智後得智兩者雖似有違而實無違以見真實性智及見盡所有智二者雖是一體而觀待種種境謂如理智及世俗智兩者所趣少分亦不相違故又見境時在同一有法上雖有如理智及世俗量兩者所證理趣不同而無少分相違是依善了又果位時二智量境不僅如是即於境上二量何趣若善了知雖未定解各各境而於能緣二者境不能順亦能了知此為二諦因相細處亦當了知戌三勝義之差別如入論疏云空性廣分之有十六空中分之有有事空無事空自性空他性空四略分之有補特伽羅無我及法無我二者他論有説正勝義及隨順勝義二者中觀顯論云即此無生亦順勝義故名勝義非正勝義以正勝義是超越一切戲論故中觀莊嚴論亦云隨順勝義故此亦名勝義正勝義是離一切戲論聚二諦論亦如是説二諦論自釋及中觀莊嚴論則云勝義破生等就世俗説此等若就先諸大德所許則將勝義諦分為是非二類於色等上勝義即是破生等之空性是前一類不論何心均不堪為境許非所知故是後一類茲非同彼等之義以法性境雖須作為勝義而有境如理智亦多説為勝義如二諦論云無倒如理是勝義中觀顯論亦云凡於勝義説名無生等者義許是此以凡從正聞思修所生慧即是無倒有境故名曰勝義是此勝義故就如理智又分二種一者聖者等持不作分別無分別智二者依因而起稱量真實俱有分別之如理智等分別熾燃論云即於勝義有無分別智及後得智二中觀顯論亦云所謂二種勝義之二者密意是一而釋二種勝義不就能緣唯就所緣勝義境並非論義此中初義當於真實轉時在自境上能斷諦及能所雙現之戲論聚是正勝義亦即所謂超越一切戲論義第二義者在自境上雖能遮止諦實戲論但不能斷能所雙現之戲論此謂出世間勝義及順隨順相勝義就色等勝義遮止生等之勝義境上亦須二種理趣解釋其一就無分別如理智前於境空性離二俱戲論之正勝義其二就有分別如理智前僅離一分戲論謂之非離雙俱之正勝義非云非真勝義諦是以一類師説除離一切雙現戲論謂之諦空即無離一切戲論所現諦空因若是勝義諦須離一切雙現戲論者並非論義卯二觀法差別如前所説依止修觀資糧若為獲得證得二無我正見是當修觀若爾所修觀法總有幾種此暫不重宣説大地毗鉢舍那正為宣示異生所修觀法若圓滿修觀謂修四種三種六種初四種者如解深密經説思擇等四正思擇者緣盡所有最極思擇緣如所有初有周遍尋思周遍伺察之二第二又有尋思伺察之二謂粗細相思擇其義此如聲聞地及現觀莊嚴等論所説三種者如解深密經云一有相觀二尋求觀三伺察觀如以緣無我義為例先就決定無我為緣作意彼相不多抉擇第二於前未決定義正善抉擇第三謂於已決定義如前伺察入六種者謂尋思一事二義三相四品五時六理既尋思已復審伺察尋思義者謂正尋思如是語中有如是義尋思事者謂正尋思此為外事此為內事尋思相者謂正尋思諸法二相此是自相此是共相或共不共尋思品者謂思黑品過失及白品功德尋思時者謂思如是事當在過去世如是事當在未來世如是事今在現在世尋思理者謂尋思四種道理一觀待道理者謂諸果生是待因緣此復觀待世俗勝義及彼諸事二作用道理謂一切法各有作用如火有燃燒用復此是法此是作用由此法故作此作用三證成道理謂所立義不違諸量於此法中有無現比至教三量四法爾道理謂火熱性水是濕性等於彼法性應起定解是為世間共許法性法爾不可思議法性安立不應思維有他道理令其如是建立如是六種事者謂瑜伽師所知唯三謂言説義及所知中盡所有性如所有性依第一故立義尋思依第二故立事尋思自相尋思依第三故建立餘三及共相尋思又初四種毗鉢舍那其門有三即彼三中隨尋思行説有六種尋思之理是故三門六事是故三門六事尋思攝於前四又前所説力勵運轉作意等四聲聞地説是止觀二所共同故觀亦有四種作意卯三正修觀法分三辰一宣示依止而説修觀之義辰二何所依據大小乘道辰三正説依止修觀理趣今初如解深密經説先修奢摩他後修毗鉢舍那至尊大論菩薩地及聲聞地清辨寂天菩薩蓮華戒論師修次三篇及現觀莊嚴論等亦如是説總以密意非説先不緣無我義隨一所緣而緣從是起止後緣無我即此修觀以止觀二者非就所緣門而分別故現觀莊嚴論亦説先緣能所二空之真實生起止後即就此所緣而緣而起觀修之觀聖者無著亦云緣盡所有性之觀是先生起止後即依於此而修有粗細相之觀此復亦是內外二道異生聖者之共道故由是曾未獲得奢摩他若新起修者除可修其堪能所緣專一而住不可能修自所緣境衆多觀察以前後倒亂不能成辦奢摩他故諸先已修奢摩他者如前唯安立修因此串習勢力當如所有性或盡所有性時位降臨若以慧力分別觀修爾後能引心一境性最勝三摩地是以專一三摩地最為力大似此所修是先所不能故讚歎觀修如此修法是依於先求奢摩他後修毗鉢舍那之軌則此如所緣無我雖一而止觀兩者修法不同此僅總綱而已若分別言之諸修觀者必於上下界過失功德分別其粗細相並於無我義由別觀察慧修無我相是須生起猛利堅固決定此於各別能斷所斷其力乃大緣盡所有毗鉢舍那不僅欲修斷現行煩惱之粗細相如現觀莊嚴論説分別十八界行相亦是觀修故由此例分別盡所有性行相而修之觀餘亦當知教授論雖説在緣如所有止觀二者生起之前當以緣盡所有瑜伽地止觀二者為前導此者如寂天菩薩蓮華戒論師所許先令奢摩他隨宜生起已當生毗鉢舍那此亦即説緣如所有之毗鉢舍那辰二何所依據大小乘道或問若爾似此止觀次第生起道理是據大小乘道及經咒何者答此種次第是聲聞獨覺乘及波羅密多大乘二者亦即大小四派所共密咒三續部亦同此見各續部及其廣釋咒道次第已經解釋至無上瑜伽波羅密多教授論云若安立自心萬法心中住法性空金剛故無法法性密集經亦如是説又楞伽經云既依於唯心不安立外境佛於聖教中説有唯心緣真如性緣及無見瑜伽地三者故許在初二地以安立修及觀察修修止觀法如前解釋緣如所有性相續生起道理相同依據自宗在無上瑜伽時生起了知見法軌亦須以中觀論所説而作修軌容有在證得二次第以後時中因觀察真實性而有作意然因身證攝要堪能之圓滿次第以等持而修真實雖則定須修習專一而住但不必定如他論所説毗鉢舍那之觀察修故於此時建立觀察修為重不安立專一修真實性如是堪可修作諸理此中雖未説明但諸餘道如是説者因相極多辰三正説依奢摩他修毗鉢舍那理趣若是未得無我正見雖如何修所修不能住於真實性故須得無我見又雖有了知見修真實時若不念其見住於其上其修不能正修真實又每次以正見觀察後全不作意亦非為修真實又雖念其正見唯住其上而修僅是前説奢摩他修法不為此外另説毗鉢舍那修法之論義故於無我義應如前説是以智慧別別觀擇而修若唯觀察修則前生奢摩他亦成失壞首騎奢摩他馬觀察而修間以安立修當能增盛此復多觀察修住分減少多安立修雖則能住而心不欲觀察縱然觀察心不能轉若心不失住分又多觀修則止觀兩不失壞其力乃大修次後篇云常時修觀慧力轉大爾時止力轉小如風中燈喻如是心動真實雖極明顯而不能照是故爾時應當修止若止分多如沉睡人真實雖明而不能見爾時亦應修觀如是抉擇而修若以凡是分別均是執實相執是須遮止不應道理以執實之分別唯分別一邊前數證成故又若以為凡是分別見為能害正理是正理所破列為增益教義亦不證成於餘有法雖不許爾然於法性心有所持均為耽著諦實之相執此是未明執持道理之過非均是執以見此希求解脫事教理多門宣説於其實性必須斷諍又作是念此中修真實性若是無分引起別別分別則不能起以因果須隨順故此中薄伽梵明顯解答迦葉請問品云如是迦葉譬如二木相察生火火生而焚二木如是迦葉若有清淨分別則生聖者慧根此既生已能焚清淨分別此説是由分別可引聖慧修次中篇亦引經云由是如是以慧觀察爾時瑜伽師決定實事自性勝義無執爾時入於無分別相三摩地且亦證得諸法即是無性諸凡不以智慧而修分別觀察諸法自性唯是作修全斷作意此不能滅有分別妄想當不能證此亦無自性虛妄以無聖慧觀照故是以即從清淨分別若起清淨如所有見慧火譬如攢木取火即所攢火燒分別木若不爾者從有漏引無漏從世間引出世間從有情而成佛從異生而成聖者則應無有以因果二者不相同故釋菩提心論云凡見有分別此何有空性分別能所心如來所不現故有能所觀此則無菩提此説若有能所實相則無所證菩提又滅別觀察慧若僅滅能觀所觀則與論説由種種分別觀察之門抉擇真實相違因佛説若不照見則為無故即釋菩提心論又云云空性無生云空性無我諸劣士所修彼彼非能修此説不遮所修攀緣自性無生之空性無我是遮有實相執諸劣士修所修下劣空性又如出世間讚云遣一切妄執説空性甘露凡於此耽著佛説是最劣寶鬘論亦云如是無我及有我正等正覺無所緣我及無我諸見等為大能仁所遣滅亦即是説我及無我二者即於勝義亦非實有是破此二勝義有見但不遮無我之見如前所引諍辨若實有自性之自性非無則應有實自性故此等如攝功德寶云云空此蘊雖分別菩薩是行於名相住於無生非信忍大般若亦云所謂色空及云無我行則行於名相非般若波羅密多所行義謂是當受持空性等為諦若不爾者所云住於無生非信忍亦不應理以於彼信忍亦成為行於名相故且與下引多經相違即此經云諸法無性當遍知此是勝慧度所行又云有為及無為黑白業等法何時息慧相塵許不緣時於世間遍淨是入慧度數三摩地王經亦云若於法上分別無我性別觀察已而作如是修此是當得涅槃妙果因凡是餘因不得涅槃般若波羅密多心經舍利子請問觀自在菩薩云菩薩欲行甚深般若波羅密多當如何學即是照見彼等五蘊自性空相法性讚亦云大心所修法即是無自性又云云我及我所盡是外計執若見二無我能滅三有種入論亦云故照我及我所空瑜伽師能得解脫此當了知且應修習無我及無自性定解相續此中修次初篇亦云入無分別相陀羅尼云不作意不滅色等名者義謂凡是慧所觀察不作攀緣即此是名不作意非是全無作意如入無想定從無始時僅伏色等現行耽著作意不是永斷雖經中屢説修不作意永斷相執然經密意由如理作意慧所觀察實執託緣縱是塵許亦不攀緣於所證境平等而住修次中篇又云凡是其心彼復尋求通達空性義謂凡所證得彼復遍尋自性證空性者如是所證是入無相瑜伽此亦是説諸遍了達為先即入無相由是可知僅是全不作意及不以慧觀察諸法自性不能入無分別相極其明顯故寶雲經云若先不以如理作意得真實見則於真實義不能入無分別修次後篇云所謂不可思議及超越其心等是破僅由聞思能通甚深義傲慢故此等是就聖者各各智慧觀照餘等不可思議又破其心於甚深義執實則非如理不遮別觀察智慧所觀察若不爾者則與極多教理相違即此雖是分別體性亦是如理作意體性故若將生起無分別智是當許依有分別故支那堪布所説依於教理雖未得抉擇真實正見全不作意平等而住亦能通達真實了知所説非正諸門破斥最為重要修習此等道理道次教授諸先大德亦有説者如布奪巴尊者云一類師説在聞思時以理抉擇空無自性當正修時唯不分別若如此者無關空性是修之餘不成對治由是正修凡所修習別別觀察何為一異何為緣起即此而住住無分別若如此修能治煩惱許隨一尊是行六度是修般若修人無我亦當如是隨行而修大依怙亦云云何證空性善逝佛授記現證諦法性龍樹之弟子月稱大論師此所傳教授能證諦法性至於如何引導理趣又有大依怙在中觀教授中宣説及蓮華戒阿闍黎密意所説二者密意相同如是修習毗鉢舍那應知如前依於加行六法正修時分修後時分已修未修中間分特於遠離沉掉修持道理均如前釋卯四修後成辦觀量如是若以別觀察慧而修觀察已直至未起如前所説輕安之前僅是毗鉢舍那隨順既生輕安是正毗鉢舍那輕安體性及生起道理俱如前説此復奢摩他先得未失亦由彼所引起輕安非是略有輕安便足若爾云何謂修觀者若由自力能引輕安此後乃名毗鉢舍那此者緣如所有及緣盡所有二種毗鉢舍那得限相同解深密經云薄伽梵若諸菩薩乃至未得身心輕安中間如是善思惟法彼等於三摩地行境及影像中作意如是作意當名何等慈氏此非毗鉢舍那是名順毗鉢舍那勝解相相應作意般若教授論亦云由是身心既得輕安即彼而住即於如所善思惟義內三摩地所行影像境以殊勝勝解別別觀察盡其身心未起輕安中間是順毗鉢舍那作意何時能生爾時是正毗鉢舍那若由自力能引輕安亦能引起心一境性故由修習別別觀察自力引生奢摩他乃是先時成辦奢摩他之功德如是已成辦奢摩他者雖作觀察修而因奢摩他力大趨入殊勝故不應執若作別別觀察之觀修住分損減寅三止觀雙運法如前成辦止觀量時所説若未得止觀二者無可雙運能雙運者須得彼二此復初得毗鉢舍那能得雙運者其中道理謂依先得毗鉢舍那故以修觀察力如前奢摩他時中所説諸蓋不現若得自任運轉等作意則成雙運如聲聞地説齊何當言奢摩他毗鉢舍那二種和會平等雙運以是説名雙運轉道答若有獲得九相心住中第九相心住三摩呬多彼用如是三摩地為所依止於觀法中修增上慧極其勤奮爾時觀法此道為無功用轉任運轉道亦如奢摩他道諸蓋不現為潔淨柔滑毗鉢舍那奢摩他隨轉攝持樂受故名為奢摩他毗鉢舍那二種和會平等俱轉由此名為奢摩他毗鉢舍那雙運轉道修次後篇云何時沉掉俱寂靜故平等俱轉任運而轉於真實義心最明了爾時當緩功用而修等捨當知爾時是名成就奢摩他毗鉢舍那雙運轉道此是從得正毗鉢舍那之限起般若教授論云從是之後即緣有分別影像若時此心無間無缺作意相續雙證止觀二法爾時説名雙運轉道此止觀二者是名為雙運因此二互相連繫而轉無間缺者謂觀察後不須別修無分別住即由觀修便能引生無分別住現證二法謂緣無分別影像奢摩他及緣有分別影像毗鉢舍那雙證二法言相續者因分別之觀及觀後而住之止不能同時生起是由觀力引生真止於其止時緣如所有法微細觀察之觀及於如所有堅固專注之三摩地之止二法同轉於此建立止觀二法平等和會雙運此中須得修所證空猶如小魚浮遊止水僅可立為止觀隨順不可立為正止觀雙運之義如是止觀雙運道理應如彼等清淨論典所説餘等增益解釋非可憑信至於廣釋菩提道次正理論斷能了經文及修法應如廣論説所今當略述道之總義親近善知識即是最初道之根本道理故於彼上當善修鍊次於暇身若起真實取心要欲則從內心策勵修心為生彼故當修暇滿次若未滅求現法心則於後世不能生起猛利希求故當勤修人生無常不能久住死後流轉惡趣道理爾時生起怖畏真心便能誠信三寶功德依止皈依諸共律儀學其所學次於業果當由多門引發堅固深忍信解是為一切白法根本勤修十善滅十不善相續而入四力之道如是善修下士法已當多思惟總別生起過患總於生死令心厭離次觀生死從何因生當識煩惱及業自性發起真實樂斷之欲便於真能解脫三學總道特於所受別解脫戒當勤奮修如是善學中士法已作意思惟如自墮落三有苦海作意思惟一切父母亦爾應當修習慈悲為本大菩提心令其生起若無此心其六度行二次第等均如無基高閣若能生起少許菩提心相應如儀軌受勤學學處堅穩願心次當聽聞菩薩大行了達進止界限生起學故此發起已當受行心律儀以六度成熟自身以四攝成熟有情尤當捨命防範諸根本罪中下纏犯及諸惡作防護不染若有誤犯應勤還出次當特學最後二度故當善巧修靜慮法引發正定又於相續當生清淨遠離斷常二無我見得彼見已應守其見了知清淨修法而修即於如是靜慮般若立止觀名非離後二另有故是正受菩薩律儀學彼應學從中分出此復修習下下漸於上上增欲得心聽聞上上而於下下漸欲修行修彼等時亦當聰利令心平等如是若於導師善知識敬心微劣則斷一切善法根本故當勤修依師之法又若不樂修行應修暇滿若著現法當修無常及惡趣過患以為主要若覺律儀弛漫當修業果為要若於生死缺少厭患求解脫心則成虛言故當思惟生死過患若所作行不甚利益有情是為斷絶大乘根本此當多修願心及因既受菩薩律儀若覺學行執相繫縛猛利當以正理智破執相心一切所緣而修如幻如化空性若於善緣心不安住為散亂奴則當正修專注一境是諸先德所説以此為例其未説者亦當了知總之莫令偏於一邊令心堪修一切善品辛二於別金剛乘理趣如是善修顯密共道其後無疑當入咒道以密咒道較之他法更為希貴速能圓滿二種資糧故若入此者如道炬論説先令師喜較前所説尤為超勝然是對於能具咒道下品德相乃如是作其次先以續部所説灌頂成熟身心次當聽聞了知守護所受三昧耶戒若有根本染犯則可稽延相續生起道之功德故勵力莫染又當莫犯粗罪設有誤犯還出令淨此等皆是修道基礎此若無者則如牆傾危樓曼殊室利根本續云未説犯戒者能成就咒道此謂全無下中上三品成就無上瑜伽亦説若不守護三昧耶下劣灌頂不知真實此三雖修終無成就故若不護三昧耶戒而云修道是極徘徊咒道之外如是若能護三昧耶及諸律儀而修咒道先如下三部所説學有相瑜伽無相瑜伽二種次第次如最上瑜伽學二種瑜伽次第修習此中唯就彼等諸名略為顯示入咒方針詳如諸密咒道論應當了知能如是學即是修學總攝一切經咒宗要圓滿道體得有暇身具足義利是能於自於他相續推廣佛教頌曰佛説經咒二道軌二種之中顯教類闡揚佛語諸論典能生辨才諸妙論是易顯現真教授密咒所説大乘道盡顯幽微故特勝尤於內外大小乘大乘共及不共二密部上下二次第所引共定極明顯亦如先德善妙解是能善證妙道位大瑜伽地任運轉盡攝菩提道論中又諸希求解脫者甚深見及廣大行是從文殊慈氏尊龍樹無著寂天傳大德阿底沙教授融會三種大瀑流由此精勤所得善利樂九有根本教願永離垢常增廣總攝一切佛語樞要龍樹無著二大車之道軌能往一切種智地位上士法範三士所修一切次第圓滿開示此菩提道次第傳承是從大依怙傳內蘇巴及金阿瓦又從布奪巴傳夏日瓦布奮巴又傳奪巴道次等義此菩提道略論作者是多聞苾芻修斷行者東宗喀生善慧名稱吉祥著於日峨根登禪室
