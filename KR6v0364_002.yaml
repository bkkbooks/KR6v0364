body:
  text: 黃教祖師宗喀巴著邢肅芝譯丁二正説取彼心要理趣分三戊一於共下士道次修心戊二於共中士道次修心戊三於上士道次修心初中分三己一正修下士意念己二生此意念之量己三遣除此中邪執初又分二庚一生起希求後世之心庚二於後世所依安樂方便初又分二辛一思維此世不能久住隨念死亡辛二思維後世所生何趣二趣苦樂初又分四壬一攀緣不修念死過患壬二修習利益壬三當發何等念死之心壬四如何修念死理今初人生最後不免一死雖皆有此同感然日日中直至臨終皆作是念今日不死今亦不死其心終執不死方面若不作意對治此念被如是心之所蒙蓋便起久住現世之心因而希求或此或彼等事窮思竭慮唯求成辦現世安樂除苦方便不生觀察後世解脫一切智等大義利心故不能令趣入正法雖然多次趣入聞思修等然因唯求現世故盡所有善勢力微弱况與惡行罪犯相屬而轉故不滲雜惡趣因者極為希貴或雖攀緣後世起修然不能遮後當漸修延緩懈怠并以睡眠惛沉雜言飲食等事耗散時日故不能起廣大精進如理修行不僅如此因墮計執現世圓滿由此煩惱所引惡行漸次增廣趣入正法甘露相違品類引往惡趣更無較此暴患為大四百論亦云凡三世主宰自死無教導若如是多睡無有暴於此入行論亦云須捨一切分我未如是知為親非親故作種種罪行壬二修習利益謂若真起念死之心譬如決斷今明必死則凡稍知正法者因見親財等不可為伴多能任運遮彼貪愛由施等門而取心要如是亦見為利敬等世間法故一切劬勞全無心要便能遮止惡行修集歸依及淨戒等善業不僅自能升勝妙位亦能導諸衆生更有何事較此殊勝是故經以衆喻讚歎如大涅槃經云一切耕耘中秋實第一一切迹印中象迹第一一切想中無常及死想為第一由是諸想能除三界一切貪欲無明我慢如是即以如此能摧一切煩惱惡行大椎是能成辦一切勝善之門故當讚歎總之能成辦士夫義利時者唯是得此殊勝暇身時期我等多是久住惡趣雖則有時或生善趣亦多無暇處所其中難得修法機緣若得一次堪修之身而不如理修者是因遇此暫且不死作意故心執取不死方面是為一切衰損之門如若念死則是一切圓滿之門且不應執此法甚深是他可修者所修或雖當修然作略修不應無間修持故於初中後三所須之理應從至心起修壬三當發何等念死之心若因恐懼與親財等一旦分離起怖畏者此是於道全未修習畏死之理此中非是令發此心所應思者謂由業惑所轉受取諸身皆不免死於此雖生怖畏但無對治能力既不能滅惡趣之因又未成辦善趣定勝種子即便死亡是當恐怖由是若起恐怖而有修作則於死時無所怖畏若未成辦修事總則不能超脫輪回別則定墮惡趣臨終怖畏深深悔惱壬四如何修念死理謂應由三種根本九種因相三種決斷門中修習此中有三癸一思維決定死癸二思維死無定期癸三思維死時除法外餘皆無益初又分三子一思維死主定來復由緣故無法止滅子二思維壽命無增損滅則為無間子三思維生時無暇修法亦必定死今初不論受取何身不論安住何地不論何時均為死主所摧此是無常集所説死主來臨難以逃遁亦非財寶勢力咒藥所能止滅此是勝光大王經所説噶麻瓦云現須畏死臨終則無所畏我等反是現在無畏死時用爪抓胸子二思維壽命無增損滅則為無間如入胎經云壽限能至百歲可謂極長邊際然到此邊際中間壽盡極速謂月盡其年日盡其月其日亦為晝夜所盡此復上午等時所銷故其壽命總量極少此復現見又已先盡所餘不僅無增亦且無間隕滅如入行論云盡夜無暫停此壽恆損減既無可添增我何能不死此復應從衆多喻門而正思維例如織工織布又如驅逼牲畜前往刑場步步漸近亦如牧童持杖驅畜令無自在而赴其所如大遊戲經亦以多喻宣説三有無常如秋雲衆生生死等觀戲衆生壽命如雷電懸崖瀑布速飛馳又如説云如若略能向內思維一切外物無不顯示無常故以多門數數思維能引定解若略略思不僅不生且亦無益如噶麻巴云説思已不生汝何曾思晝則放逸夜則睡眠莫作妄語非但壽限為死所壞而趣他世即於中間壽盡亦無不去者首從入胎即無剎那而能安住已是漸趣他世是故中間生存之時全被老病使者所牽唯是死故引導前行故不應計於存活時不趣後世安住歡樂譬如從高峯墮時未至地前凌空中間不當歡喜此亦如四百頌引經説云人世勇士如初夜住世猶住胎胞中從今而後日日中全無暫息趣死前子三思維生時無暇修法亦必定死謂縱能活至百歲長限亦不應執是為有暇此如入胎經宣説蓋於最初十歲童子身時不能生起修法意念嗣於成長念歲至衰老時無有勤修之力况其中間睡眠復占半份病等耗時亦多故能修時實為極少如是現前一切圓滿恍如覺後一夢回憶所受安樂僅是死時念境死敵已是定當到來何故愛著欺誑現法若如是思定起誓願定修正法如本生論云嗟夫世間諸煩惱既不堅住不當喜此復古摩打功德亦僅成為所念境癸二思維死無定期謂從今百年以內必定當死且於其中不定何日即死即如今日死或不死俱不可料心總應趣死亡方面須起今日定死之心如念今日不死其心則執不死方面便專籌辦久住現法不能籌辦後世之事在此中間死主所劫須帶憂惱而俱死亡若日日中籌辦死事能成後世甚多義利縱不即死亦是善妙若是即死尤是所須此中分三子一思維瞻部洲壽限無定死期無定子二思維死緣極多活緣極少子三思維身極衰弱死期無定今初總北俱盧洲人壽量有定餘等他處各別壽量雖無一定但多數有定南瞻部洲極其無準劫初壽數經無量年今後以滿十歲為壽長際即是現前老幼中年於何時死均無定準此亦如俱舍論云此中壽無定末十初無量故當作意師及友伴壽數未竟忽由內外死緣降臨而死念我亦是如是數數思維子二思維死緣極多活緣極少謂此生命有心無心損害極多若人非人魔鬼旁生損害生命衆多種類如是內病外諸大種諸損害理應當細思復次自身是由四大種成彼等亦復互相侵害諸大種界若不平等有所增減則發諸病而奪命根此等是與自體俱生而有故於身命無可保障如是亦如大涅槃經云夫死想者謂此命根恆有衆多怨敵圍繞剎那剎那漸令衰退全無一事能作增長寶鬘論亦云住於死緣中如燈置風內復次存活即是趣向死沒活緣雖多然無可憑寶鬘論云死緣是極多活緣則極少活亦成死緣故常修法藏子三思維身極衰弱死期無定身如水泡極其脆弱無須大損縱如芒刺微傷且能壞命故由一切死緣侵害是極易事親友書云地須彌大海七日所燃燒灰塵且無剩况此諸有情至極脆弱人如是思已不定何日而為死主壞其身命莫作有暇應從現在多立誓願決定修法瑜伽自在吉祥勝逝友慶喜亦云國主所借身無病衰安住若時取心要無畏病死衰於老衰等時雖念有何益三種根本中最重要者厥為思維死無定期故當勵力癸三思維死時除法外餘皆無益如是若見須往他世爾時親友雖極痛惜而相圍繞但無一人可隨往者盡其所有寶藏雖一微塵量不可携帶即此肉身尚須棄捨何况其他是故一切現世圓滿皆須離我我亦決定須離此等而往他世復應思維今日或死更當多所決定於諸親友身財等緣不能捨者而修能捨此是道之基礎雖極難生亦須勵力布朵瓦云我所確知是修無常可斷親友受用耽著既除現世一切現前所有乃可自在無絆而往他世是以除法而外均不當為由是意念乃能不著現世直至此心未能生起中間是為阻止一切法道奪巴尊者亦云僅是俱足恆心積集資糧淨治罪障祈禱本尊以及上師以此殷重思維縱是百年亦不能生若心中有少許有為法不常住即能生起有於迦麻巴尊者請求開示另換所緣重述如前再問其餘全不作答如是凡諸經論宣説親近善知識暇滿無常法類皆應了知隨時受持而作修習乃能易得諸佛密意餘處亦當如是了知辛二思維後世所生何趣二趣苦樂如是既知急速定死現世無暇停留死後且非斷滅定須受生此復除二趣外無他生處不生善趣即生惡趣自無自在唯是他業純由黑白二業如何牽引受生於是思維我若往生惡趣惡趣之苦當為何似龍樹菩薩云日日應恆念極寒熱地獄應念餓鬼等飢渴等苦逼亦念無量數愚癡苦旁生行善斷苦因得瞻部人身既得人身時斷惡因纏結此中所修輪回總苦以及惡趣別苦極為扼要若能如是自思墮苦海理生出離心能滅傲慢由見苦是惡果則於罪犯極大退避苦乃不願樂所欲得此復由見善果喜修善行比度自苦生悲他心厭離輪回希求解脫由畏苦逼趣入真皈依等故能包攝衆多修持扼要大嗢陀南此等苦德入行論中亦説是依自續已有之苦將受之苦亦當憶念如是思維惡趣之苦此中分三壬一思地獄苦壬二思旁生苦壬三思餓鬼苦初中分四癸一大有情地獄癸二近邊地獄癸三寒冷地獄癸四獨一地獄今初謂從此過三萬二千踰繕那下有等活地獄從此漸隔四千四千踰繕那下而有餘七如是八中初等活者謂彼等有情彼此積聚業為增上由種種苦聚互相殘害悶絶仆地次虛空中發如是聲汝等可復還活次後起身如前殘害是以當受無量衆苦二黑繩者謂生此中諸有情類由諸獄卒以黑色繩結為四方形等而受刀在其上剮割等苦三衆合者謂彼有情共集合時由諸獄卒驅入兩旁猶如羊面鐵山中間二山相夾爾時從諸門中血流如注四號叫者謂此有情尋覓宅舍而入大鐵室中入後四圍火遍燒燃五大號叫者與前相同其差別者是其鐵室二層六燒燃者此等有情為諸獄卒置於衆多踰繕那量極熱銅鐵上燃燒猶如煎魚熾燃鐵椎從尻貫入從頂而出二口二眼二耳二鼻所有竅穴及諸毛孔烈焰猛燒又置熾然溶鐵地上或仰或仆以極熾燃鐵錘周身猛打等苦七極熱者謂以極熱三尖鐵叉從下貫入左右二尖直透二髆中從頂出因是眼等門穴火焰熾生又以燒紅鐵頁裹身又復倒擲燒溶銅鐵湯中而豫煎煮上下漂轉爾時血肉焦萎僅剩骨骼將之撈出置鐵地下待其皮肉重新生已復擲其中餘如極熱八無間者謂從東方乃至衆多百千踰繕那量地極熾熱即從其處烈焰湧騰彼等有情皮肉筋骨次第漸燋直徹其髓周身燒燃猶如燭心其餘三方悉皆如是四方火焰會合受苦無間因其慘叫知是有情又於熾燃鐵炭鐵簸箕中而為顛簸又於諸大鐵地鐵山上下奔馳又從口中拔出其舌釘而張之如張牛皮令無皺摺又令仰臥鐵地以大鐵鉗鉗開其口熾燃鐵丸置其口中又以洋銅灌於口中烙口及喉及諸腸腑從下流出餘如燒熱此等諸苦要經幾時而領受者如親友書云如是諸苦極難堪雖百千劫亦須受如所有惡不能淨此與命根永不離此復人間五十是四大王衆天一日如是卅日為一月十二月為一年至五百歲是四大王衆天壽量又此一切為一日卅日為一月十二月為一年至五百歲為等活地獄壽量以此為例人間百歲二百四百八百千六百歲如其次第是三十三天乃至他化自在天一日如是壽量天人千歲二千四千八千萬六千歲如其次第是從黑繩乃至燒熱地獄一日以各各壽量是從千歲乃至一萬六千歲也故極熱者半中劫無間者一中劫是俱舍論及本地分所説癸二近邊地獄謂彼八大地獄各各均有四牆四門外有鐵圍城繞其城亦有四門各各門外有其餘四有情地獄謂煨坑腐尸臭泥或糞穢泥臭惡如尸利刀阻道無涯大河此中初者謂有火坑深將沒膝彼諸有情為求居所行至此處下足之時皮肉全爛拔出之後皮肉還生二者與此相連有糞穢坑臭如腐尸諸有情等為求宅舍涉足深陷頭足俱沒在糞泥內有蟲名曰利喙由此等蟲破筋斷骨吸髓而食三者與此相連利刃插道諸有情等為求宅舍行至於此偶一駐足皮肉筋血悉皆切斷舉足之時又復生起與此相連有劍葉林諸有情等為求宅舍行至此處才坐樹蔭劍從樹落斷彼支節即便仆地來諸惡犬從後嚙食與此相連有霞麻梨林鐵刺諸有情等為求宅舍行至此處而豫攀登當上升時刺尖向下當下降時刺尖向上斫斷肢體又有鐵喙烏鳥據其頭膊啄食眼瞳是等同為刀劍為害故合為一四者與霞麻梨林相連有無涯河名曰無際諸有情等為求宅舍跌落其中熱沸煎煮上下漂浮猶如煮豆注滿洋銅猛火煎熬大河兩岸有執杖鈎耙網而列阻不令出如有當出則以鈎網仰置火地問何所欲或有答曰我等他無所知然甚飢渴則以火焰鐵丸置其口中及以洋銅灌口其中近邊獨一二中壽量無定則如本地分所説然其感受如是苦業乃至未盡自當恆受如是諸苦癸三寒冷地獄謂從八大有情地獄橫去一萬踰繕那以外另有即從此去三萬二千踰繕那下有寒皰獄更從此各隔二千二千踰繕那處而有餘七其中皰者謂遭極冷刺激全身卷縮猶如瘡皰次皰裂者謂由卷縮皰瘡腐爛三名阿羅羅齒震聲四名阿婆婆寒顫聲五名瞻瞻冷抖聲六裂如青蓮者謂由極冷寒風其色青瘀裂為五或六瓣蓮花七裂如紅蓮者謂由青轉赤裂為十瓣或更多之八裂如大蓮者謂皮赤紫裂為百瓣更或多之此等均依本地分所説至於壽量譬如摩羯陀國能納八十斛芝麻大斗盛滿芝麻次經百歲取一芝麻芝麻漸盡寒皰獄中壽則未盡其餘諸有情壽則較前加二十倍癸四獨一地獄謂於寒熱地獄近邊本地分説人間亦有阿含經亦説近大海邊猶如僧護因緣中説如是能生彼中之因如下當釋極近易為於日日中亦集多種先已集者現有無量故樂安住是不應理應思此等而生恐怖若淨此等唯在存息之時無他方便如入行論云已作地獄業何故安樂住又如親友書云唯有存息能止罪諸等中間時中斷雖聞地獄無量苦如金剛性無布畏見畫地獄及聽聞憶念讀誦塑形相尚能引發諸怖畏况諸正受異熟苦猛利諸苦亦如親友書云一切樂中盡所願如是是為安樂主如是一切衆苦中無間獄苦極粗猛譬如日以三百矛猛力刺擊所有苦此譬獄苦仍輕微些微少分不能比如是能感衆苦之因應知唯自惡行故應勵力雖少分罪行莫令有染又云此諸不善果種子即是身語意惡行縱微塵量莫令侵故當勉力而策勵壬二思旁生苦謂諸畜生弱肉強食或為人天受用自無自在為他驅馳或殺或打種種損害且與人天共依別無處所此是本地分所説俱舍釋説彼等原本海棲後則分為陸棲又有生於幽暗及水中直至老死負重疲勞耕耘剪毛強逼驅使又以種種不同殺害方法苦惱而殺又由飢餓寒熱逼惱又由獵士多方傷害應於此等常引為懼思衆苦理厭倦而起出離至於壽量俱舍論云旁生等經極長劫此謂長者能達劫量短則無定壬三思餓鬼苦謂依上分慳恪則生餓鬼彼復常俱飢渴皮及血肉並皆枯稿猶如火炭散髮覆面口因極乾舌則常舐此中分三一於飲食俱有外障者謂彼若往泉湖池沼即於是處而有有情持槍執劍阻止行近并見其水變為膿血不欲飲吸二於飲食俱有內障者謂喉如針孔之細口吐火焰腹大頸瘤縱得飲食亦無外障但不能飲食三於飲食自有障礙者謂有名火焰鬘者所有一切飲食悉皆燃燒又有名食穢者食糞飲溺及唯飲食惡臭不淨及有損害或有割食自肉不能受用淨妙飲食處所者謂其王國在瞻部洲下過五百踰繕那而有從此展轉散居餘處此如俱舍釋説壽量者則如本地分及俱舍説以人間一月為一日相乘直至五百歲親友書亦云無間受苦逼惡業索堅縛有情壽五千萬歲亦不死此説餓鬼壽量有則五千有則一萬是其釋所説本地分云三惡趣中身量無定由其不善增上力故大小非一如是若思惡趣苦惱應作是念現似插手煻煨之中住一晝夜又似隆冬極寒冰窖裸而無衣住爾許時人間一日如無飲食其身或為蜂蚊所刺尚且難忍何况寒熱地獄餓苦旁生彼此殘害是等衆苦我何能忍度玩在心乃至未能轉變心意起大怖畏而當修習既得善身若如是思能淨先作未來減少由猛利願令轉增長煩多諸當新作堪能趣入則日日中能使暇身具足義利若於現在不思將來墮彼等時雖則怖畏救護依處而不可得爾時於所當不當作無慧力故不能取捨庚二於後世所依安樂方便分二辛一趣入聖教最勝之門淨修皈依辛二一切善樂根本生起誠信初中分四壬一依於何者為皈依因壬二從依止彼所皈之境壬三由何理趣而正皈依壬四既皈依已所學次弟今初總因雖多此如前説謂不能久住現世定當速死死後生處無有自在純為業所牽引所謂業者亦如入行論云如在黑暗烏雲中剎那閃電極光耀如是佛力衆道中世間福慧略略生由是善力極羸弱所作罪業極強盛白業勢弱黑業勢強由思墮惡趣理則起怖畏故於三寶除知其力能救並豫深信若唯具文則其皈依亦同於彼若此二因堅固猛利則其皈依能變其心故當勤修二因壬二從依止彼所皈之境分二癸一正明境癸二明理趣今初如百五十讚云凡有諸過失可以畢竟無若是一切相一切德依處如是有心者即當皈依此讚歎並恭敬是住教種性若有能辨是依非依之慧則佛世尊是無欺者理應皈依此亦顯示法及僧寶亦當皈依如七十頌云佛法及僧伽求解脫所依癸二明理趣但從諸怖畏中自能超脫並於救護他所怖畏善巧方便無有親疏大悲遍轉普利一切有恩無恩是應皈處此亦唯佛有自在等功德他所無者是當皈依由是佛所説法及聲聞僧亦當皈依如是若於攝分所説道理能引勝解專心信仰必無不能救者故當至心生起勝解從能救自二種因中外因全具大師已成然內支中不能實心持為歸依是故苦惱壬三由何理趣而正皈依分四癸一知功德癸二知差別癸三受持癸四唯正皈依不歸其他初中由須憶念皈依功德又分三子一佛功德子二法功德子三僧功德初又分四丑一身功德丑二語功德丑三意功德丑四業功德今初謂正憶念佛相好等功德如讚云佛身莊嚴相淨妙甘露目如秋空無雲衆星所照耀能仁金色身法衣端嚴覆巍巍如金山周圍彩雲繞世尊無所飾面輪極光滿雖是滿月輪淨妙不可比世尊蓮花口蓮華日中開蜂疑真蓮華旋轉如懸索尊面有色金潔白端嚴齒淨妙秋月光密如金山企應供佛右手輪相所莊嚴佛手能救度怖畏生死人能仁遊行時雙足妙如蓮足迹印地上蓮華紋細密應當憶念丑二語功德謂隨世間界所有有情同於一時各別請問請問雖異然由剎那心相應意所攝持以一言音答一切問彼等亦能各隨所聽而生悟解故應思維殊勝理趣如真實品云若諸有情於一時以諸定句而請問一剎那心遍證知由一言音答各問由是應知勝導師宣説梵音於世間此是善轉妙法輪能盡人天苦邊際故當思維語功德理丑三意功德謂於如所有性盡所有性一切所知如觀掌中菴摩羅果智無礙轉能仁智遍一切所知所知廣博唯佛與佛智量狹小不能遍故此亦如讚應讚頌云唯佛智能遍盡一切所知佛較餘他等所知獨殊勝又云諸時所屬法一切種生處如掌中菴羅是佛意行境諸法動非動若一若種種如風行太空佛意無礙轉悲功德者謂諸有情煩惱所縛無有自在能仁亦為大悲所縛不能自在若見有情苦逼則起大悲無有間斷如百五十頌云此等諸有情衆惑縛無別佛為救衆生煩惱長悲縛初應頂禮佛并敬禮大悲佛了生死過應令長久住真實品亦云若見癡暗障常覆衆生心陷入生死獄大仙發悲心丑四業功德謂身語意業任運無間二者利益一切有情此復於所堪引化者能仁無不令其所化會遇圓滿遠離衰損定作一切所應作事布奪瓦云若數數思漸能深信漸淨相續獲得加持能引勝解故能至心歸依并於所學能正學習則一切事悉成佛法無奈吾輩於佛妙智信心猶不能逮信一占卦術士悲夫又云譬如有一靈驗卜者説云我知汝於今年無災則心安泰彼若説云今歲有災此等應作彼等莫作趨吉避凶奮力而為若未如意心則不安而起是念彼作是説我未遵辦若是佛説此此應斷此此應修心相違轉若未成辦心憂慮耶反作是言法雖如是時代變遷不能實行故須如此此乃輕棄佛語固執己見若不觀察隨心愛樂錯謬亂言故應反是內攝其心微細觀察斯乃真實故當數數思念諸佛功德勵力引發至心定解此若能生則於佛所從生之法及修法衆亦能發起如是定解是為通達深入歸依扼要若不爾者名雖歸依無能制心况諸餘道子二法功德謂何故敬佛因佛具足無邊功德此復佛者是由證得滅諦修習道諦斷除過失成辦功德為其體性此復統由教證二法所生此是正法攝義經所説故當憶念子三僧功德此中主要是謂聖者補特伽羅此復由念正法功德由其如理修行門中而為憶念亦是正法攝義經所説癸二知差別如攝分説由知三寶內互差別而正皈依詳如廣論癸三受持如毗奈耶廣釋中説謂依佛為師依法解脫依僧為伴由如是門誓受皈依癸四唯正皈依不歸其他謂由了知內外大師及其教法諸學法者所有勝劣唯有三寶是真實依處凡與此等不相順者不作歸依此中所謂差別之大師差別者謂佛圓滿無邊功德所餘大師與此相違殊勝讚云我唯歸依佛棄捨餘大師此云何為尊無過具功德又云於他外道教如彼如彼思如是如是我我心信世尊彼等非遍智宗見壞其心心壞不能見無瑕大師尊癸四既皈依已所學次第分二癸一別學癸二共學初中分二子一遮止應學子二修行應學今初如涅槃經云凡皈依三寶此是正近事終不應皈依其餘天神等皈依尊勝法應離殺害心皈依僧伽者不與外道伴此謂不皈依其他天神於諸有情斷除傷害不與外道為伴等三其中初者謂於大自在天遍入天等世間諸天尚不執為究竟歸處况於鬼趣所變土地及龍神等若於現法事業請其暫為助伴則無不可此亦不可不信三寶而歸心彼如求施主為活命伴依諸醫師為治病伴二謂於人及畜等應當遠離若打若縛禁閉穿鼻強令負重意樂加行種種損害三謂不共住不信三寶及誹謗者子二修行應學謂於佛像無論好醜不應譏毀不棄地下或當押等斷除種種不敬輕毀應於本師奉為可敬福田親友書云隨其所塑木造像智者堪供善逝佛長阿含經云黃赤仙數論祖勝我仙外道因於學無學僧衆説十八種異類惡語如云汝等象頭豈知法及非法等於是生於頭形相異十有八種鱷魚族中自迦葉佛時直至釋迦文佛未脫畜道雜阿含説拘留孫佛般涅槃後端妙大王令建大塔有一工人再次譏云如是大塔不知何日可成後善成已深自悔惱將其工資造一金鈴挂於塔上其後感生容顏醜惡身形矮小聲音和美名曰善和故於佛像不應妄評凡遇佛像無論好劣及量廣大不應譏毀及遮止等大瑜伽師奉一文殊像請覺喎觀視此善妙耶若屬善妙可將絨巴迦格所供四錢金幣購取覺喎云至尊身像無有不善匠藝中等説已置頂故於一切造像應如是行又於正法四句以上亦離不敬他如抵押經卷作為商品棄置空地眠息寢室鞋襪相雜及踐踏等統應斷除應如法寶而作恭敬傳説格西金阿巴凡遇持經典者合掌起立後不能起殷勤合掌又阿提沙尊者在阿里時有一咒師不從聞法適見字匠以齒污穢沾染經書尊者乃云不可不可深生不忍因是咒師信從聞法又於僧伽或剃度相不謗不毀於一切相不分黨類偏私如敵亦如僧寶而作敬重勸發增上意樂品云希求功德住叢林不當觀察他過失不應起心作是念我是最勝我第一憍是一切放逸本永不詆毀劣苾芻一劫不能得解脫此是聖教正次第三摩地王經云既作如何業當得如是果癸二共學隨念三寶差別功德數數歸依隨念大恩恆勤供養飲食之先亦當供養隨念大悲於餘有情亦如此理安立隨作何事有何所須皆當供養啓白三寶棄捨世間其他方便由知利益晝三夜三而修歸依既歸三寶雖為命緣或則嬉笑守護不捨此中初者如前所説數數思維內外差別及三寶中彼此差別功德二者隨自所有一切善樂悉是三寶恩德故由報恩意樂供養又以經常須受飲食爾時若能供養無間斷者少用功力而能圓滿衆多資糧故隨受用淨水以上首須至心供養如霞日瓦云非以黴糕黃葉是擇其好者作供故供茶時唯作彈指如彈灰塵不成供養譬如良田當播種時而不下種任其荒蕪至堪婉惜如是能生今後一切善樂福田應當四時無間播種善樂種子亦如經云當以信犂耕耘福田當作不作良可慨歎於最勝福田不如庸俗之田此是吾人無上等相故於一切時當勤供養三寶果能如是由於勝田所植善根力故於諸道次慧力增長若於聽聞不能受持思維不能解義修習相續不生慧力最劣之時可依福田之力此是教授又如説云供奉不賴物質是賴信心若有信心無實財物雖用曼達淨水及意變等供具亦可供養若是實有不能施供作是念云我是極貧無福德所有供財我悉無等如布多巴云於一不淨螺壳略放香草念云栴檀氷片妙香水此是生盲欺有眼者若於微供輕侮不供則永生中終是爾爾若由微少生起殷重漸轉善妙應如朴彎瓦行持修學傳説此師每次須配念二兩金之香料至於已得資具大菩薩衆變化其身為百千億於一一身復各化現百千等手往一切剎供養諸佛經無量劫諸由少許相似功德便生厭足説我不於此上希菩提者是於正法缺少知解造次亂言如是應如寶雲經所説而行經云如是聽聞諸契經中所有廣大供養廣大承事由最殊勝增上意樂回向一切諸佛菩薩第三由悲心故盡其所能令他有情安立歸依第四謂見隨作何事及何所需應依三寶及隨三寶而作供養於一切種不依與三寶相違邪道一切時中至心歸依第五分八一得入內道佛弟子者總有多種建立內外差別道理此依覺喎及醒底巴論師所説歸依而為辨別從得歸依乃至未捨是故初入佛者須由至心皈敬三寶受持師道此若無者任作何善不入佛弟子數二成一切律儀依處者俱舍釋云凡歸依者是正受一切律儀之門歸依七十頌亦云近事歸三寶此是八律本謂由歸依則能堅固涅槃意樂從此而生律儀三先所集業減少漸盡者集學論中宣説歸依能淨罪障品中以豬生因緣而作譬喻謂有天子當生豬中因歸依故即未生彼如云凡歸依佛寶彼不生惡趣棄捨人身後當得天子身法及僧衆亦如是説四集聚廣大福德者攝般若論云歸依福德若有體三界雖大不能容大海原是水庫藏歸依福德不能量五不墮惡趣已如前説六人非人等不能損害甚易了知七一切如想成辦者謂作任何合法事業若先供養三寶以及祈禱則易成辦八速能成佛者如師子請問經云由信斷無暇謂得殊勝暇身過歸依處學殊勝道當速成佛如是思念歸依利益日三夜三勤修歸依第六謂身命受用決定棄捨因是而捨三寶則生生受苦不盡凡遇何境不捨歸依以此為誓縱然笑謔亦不當説捨棄歸依前賢有説隨往何方歸依如來是為當學為一學處未見根據如是六種共學是據道燈釋論所説三種別學出自契經後三種者歸依六支論所説若有違犯此等學處當成虧損及棄捨因由若與為命亦不棄捨有違犯者實捨歸依如是雖未棄捨三寶但執異類三寶大師此亦相違説有其他心未誠歸故成棄捨若未如此僅違學處非是捨因是故歸依是趣入佛教正門歸依非徒空言應是依止最殊勝力內外障緣不能違害種種功德易生難退展轉增長如前所説由於怖畏以及憶念功德等門受持歸依勵力不違歸依學處是極扼要辛二一切善樂根本生起誠信分三壬一總思業果壬二別思業果壬三既思維已當行當遮理趣初中分二癸一正明總思維理癸二別明細思初中分四子一業決定理子二業增長廣大子三業不造不受子四既造業必受今初凡屬異生及諸聖者所有舒適行相樂受乃至生於有情地獄涼風吹拂所發樂受一切均從先前善業所生未有從不善業而能生起安樂者所有逼惱行相苦受乃至羅漢相續之苦一切均從先前造集不善所生未有既集善業反而感受苦惱者寶鬘論云苦從不善生如是諸惡趣善生諸樂趣及諸生安樂故諸苦樂非無因生亦非自性自在天等不順因生是從總善不善業生總苦樂種種苦樂差別等亦從二業種種差別無少紊亂各別而生若於業果定律無少欺罔得定解者是為一切佛子正見讚為一切白法根本子二業增長廣大謂雖從少分善業亦能感生極大樂果如是不善業雖小亦能感生極大苦果似此諸內因果增長理趣諸外因果無可與比亦如集法句云雖作少分罪他世大怖畏將起大苦惱猶如毒入腹雖造少分福他世引大樂儲成大義利如諸穀豐熟子三業不造不受謂若未集感受苦樂正因之業則定不受業苦樂果若諸大師享有前所集聚無量資糧妙果雖無須集彼一切因然亦定須集其一分子四業既造必受謂諸已作善不善業定生可愛不可愛果如超勝讚云梵志説善惡如施取轉變佛説作不失不作不會遇三摩地王經亦云此復作己非不受他所作者不當受阿含亦云假使經百劫諸業無忘失若得緣會時有情自受果癸二別明細思分二子一顯十業道為主子二抉擇業果今初如是了知苦樂因果各各決定及業增大未作不遇作已不壞但當先於何等業果理趣生起定解而取捨耶謂先總於能轉善行惡行三門決定三門一切善與不善雖十業道不能盡攝然較粗顯善不善法擇其罪惡根本大者薄伽梵攝其扼要而説十黑業道若斷此等則諸極大義利扼要亦攝為十據此故説十白業道俱舍論云攝其較粗顯善不善如應説為十業道分辨阿含亦云應護諸語善護意身不應作諸不善若淨此等三業道當得大仙所説道是故十地經中稱讚遠離十不善業護戒義理入中論中亦總攝云若諸異生及語生若諸自力證菩提及諸佛子決定勝善趣因是戒非餘如是不能於一尸羅數修防護而善守護反自説云我是大乘者極應呵責地藏經云由如是等十善業道當能成佛若有命存以來最低不能守護一善業道而作是語我是大乘者我求無上菩提此補特伽羅是極欺詐説大妄語是於一切佛薄伽梵前欺罔世間説斷滅語由此愚蒙直至命終顛倒墮落所謂顛倒墮落者當知即是一切惡趣異名子二抉擇業果分三丑一示黑業果丑二示白業果丑三業餘差別初中分三寅一正明黑業道寅二輕重差別寅三彼等之果今初其中斷命事謂殺害有情從三意樂而有四想如於有情事作有情想及非有情想於非有情事作非有情想及有情想第一第三是不錯想第二第四是錯誤想此中等起差別如作是念唯殺天授及起加行誤殺祠授無根本罪故於此中須不錯想若其等起總轉念加行時任誰均殺則不需不錯想如是理趣於餘九種亦隨所應應當了知煩惱者三毒隨一等起者謂欲殺害加行者謂自或他二種能作者加行體性者謂器械毒物明咒等門隨一究竟者即由加行之緣促爾時死或餘時死不與取事者謂為他所有任何財物從三意樂而生想及煩惱如前所説等起者雖未承諾令離他欲加行中能加行者如前加行體性者無任力奪巧取皆同此復若於負債或所信託以欺及詐不與而取或為自義或為他利損害他等均不與取究竟者生起得心此復若是誨偷令盜此心生起即可譬如遣使殺人死時自雖不知其教殺者生根本罪邪行事者略有四種初不應行者謂於母等及母所監護一切婦女以及一切男性黃門或出家女非支者謂除産門所有餘分非處者謂鄰近師長住所及佛塔處非時者謂若妊娘及齋戒期從三意樂而生想者攝分中説於彼彼想是須無誤律藏中説非梵行勝時説想錯或不錯均同俱舍釋説作自妻想趣入他妻不成業道若於他妻作他妻想而趣行者成不成罪有二種説煩惱者三毒隨一等起者謂愛欲不淨行加行者謂致力其事究竟者謂兩相交會妄語事者又分二種初能詮事謂見聞覺知及與此相違四種次所了境謂了他義從三意樂而生想者謂於見者變為不見等煩惱者謂三毒等起者謂變想説欲加行者謂或言説默然或變身相此復所為不論自利利他所説均同此中所説妄語離間及粗惡語雖教他説三亦成業俱舍本釋謂語四業教他亦成律藏中説此等究竟犯時要須自説究竟者謂他了知他若不了俱舍釋説僅成綺語離間粗惡亦皆相同離間語事者謂於有情和及不和意樂生想及煩惱等如前所説等起者和順有情起乖離欲不和有情樂不合欲加行者不論真不真語不論所説美不美妙不論為自為他一切所説究竟者謂了解所説離語粗惡語事者謂令有情遍引意惱意樂想惱如前等起者謂粗惡語欲加行者不論真偽或種性過身過戒過現行諸過説非愛語究竟者謂所説境解所説義綺語事者謂引發無義利事意樂中想者雖僅説如於彼彼想然此即是於其所欲説義彼想而説此亦不須能解境故煩惱者三毒隨一等起者謂説不乘語欲加行者勤説綺語究竟者謂已説綺語貪欲事者謂他財物意樂中想者謂於彼彼事而起是想煩惱者三毒隨一等起者謂屬我欲加行者謂正致力所思之事究竟者謂思財等願其屬我瞋恚心事者想及煩惱如粗惡語等起者打殺等欲如由他緣或自任運思念若殺若縛等等衰損加行者即於所思而起正作究竟者謂於打等作業已作邪見事者謂實有義意樂中想者謂於所謗義作諦實想煩惱者三毒隨一等起者謂損滅欲加行者謂於所思正發加行此復有四初謗因者謂無善惡行為次謗果者謂無彼二異熟三誹謗作用又有三種謂謗播種保持作用如云無播種父亦無攝持母誹謗往來作用謂無前世而來今世亦無今世而往後世誹謗受生作用者謂無化生有情誹謗實有事者謂無阿羅漢等究竟者誹謗已成此等意所思維僅是業耳非是業道身語所有七支是業亦是業道思行處故貪等三種是業道非業寅二輕重差別分二卯一十業道輕重卯二略説有力業門今初本地分説重理六相加行故者謂由猛利三毒或無彼三所起諸業串習故者謂經長時習近并經多次所作善惡二業自性故者謂身語七支前前重於後後意分三支後後重於前前事故者謂於三寶及上師等所作損益偏重相違一類故者謂直至命存一向受行諸不善業未曾一次受行善法遣除相違一類故者謂永斷不善所有善業離欲清淨親友書亦云常時耽著無對治從恩德事所起業是五重大善不善故當精進修善行此復三寶等為具德事父母等為有恩事二開為五卯二略説有力業門分四辰一由福田門故力大辰二由所依門故力大辰三由事物門故力大辰四由意樂門故力大今初謂於三寶上師以及等同上師父母等所雖無猛利意念略作損益亦能得大福德及大罪故此復猶如念住經云若不與取三寶財物雖極少分仍然奉還盜佛法者可得清淨盜僧伽者乃至未受不得清淨此復若盜食物當墮大有情地獄若非食物則當生於無間近邊極黑暗處又諸菩薩善不善田極具威力能入當生信力契印經云或有人焉因忿恚故禁錮十方一切有情於黑暗獄所生無量大罪不如因忿恚故背菩薩坐説不正視此不堪者又如焚燬恆河沙數無量佛塔不如於一菩薩生瞋恚心起損害心説惡名稱能入定契印經云如是剜取十方有情眼目而由慈心令復生長及將前説一切有情放出牢獄令受轉輪王樂或梵天樂如是若於己得勝解菩薩淨信正視及由淨信樂欲正視稱揚讚歎當能生起無量大福究竟寂靜定相神變經亦云如是殺害南贍部洲一切有情或盡奪劫一切財産所生無量衆罪不如於菩薩善行而作障難下至一摶食施於旁生故於是處應極防護辰二由所依門故力大譬如鐵丸小亦沉底鐵製器皿大亦上浮故説智不智者所作罪惡而有輕重此復能悔前失防護後過不隱罪惡勤修善法對治諸惡此於智者故説為輕若不修此妄矜為智由輕懱門知而故犯故説為重寶蘊經云三千大千世界所有一切有情皆入大乘具輪王位各以燈器量等大海炬如須彌供養佛塔其福不及出家菩薩以小燈盞塗以油脂供養塔前所得福德百分之一此謂意樂福田無別然就事物差異極大故所依力極為相顯由是道理有無律儀二種從有者中又有具一具二具三之身於修道時顯然後後勝於前前如諸在家修施等時具足齋戒律儀而修與無律儀所修善根勢力大小極為明顯犯戒制罰戒經説或有一人具十不善常時無間乃至百年造集罪業如是比丘毀犯淨戒仙幢覆身經一日夜受用信施不善極多亦是由其所依門中罪惡力大分辨阿舍亦云寧吞鐵熱丸猛焰極可畏不以犯戒身受用國人食通説犯戒及於學處馳散敦巴大師亦云若以經説所依罪惡衡之十種不善是罪較小例證甚多辰三由事物門故力大施有情中正法佛施供養佛中正行供養較諸財施財物供養最為超勝此是一例餘皆應知辰四由意樂門故力大寶藏經云若有三千大千世界一切有情各建佛塔量等須彌於此諸塔復經微塵沙數之劫以一切種可供養事承事供養如是菩薩不離一切智心僅獻一花其福極多是故所得勝劣及緣自他義利等意樂差別此復應知或由勢力強弱或由時間長短等門如於罪行若煩惱心猛利恆長其力則大其中又以瞋恚力大入行論云千劫所集施供養如來等此一切善行一瞋能摧毀此復若瞋同梵行者及瞋菩薩較前尤重三摩地王經云若是彼此互瞋恚非是多聞戒能救既非靜慮非蘭若亦非供佛施能救寅三彼等之果分三卯一異熟果卯二等流果卯三主宰或自在果今初謂十業道一一皆依事及三毒上中下品而有三三本地分説此中上品殺生等十感生地獄中品一一感生餓鬼下品一一感生旁生十地經説中下二果與此相違卯二等流果謂出惡趣生於人間如其次第壽命短促貧窮匱乏妻不貞良多遭毀謗親友乖離聞粗惡聲言不威肅及貪瞋癡上品猛利卯三主宰或自在果謂由殺生能感外器世間飲食藥果等事勢力微劣由不與取果多枯萎或雨過多或種多果少由樂邪行身多便穢奇臭垢泥衆多不樂由説妄語農作行舟終不完滿由離間語所生處所丘陵起伏險峻難行由粗惡語所生處所樹多枯禿刺石沙礫由説綺語所植果木不結果實或非時結實由貪欲心一切圓滿日耗月損由瞋恚心疫癘災橫驚怖騷擾兵燹戰爭由邪惡見於器世間所有勝妙根源悉皆隱沒丑二示白業果分二寅一白業寅二果今初本地分説謂於殺生不與取欲邪行等三知其過患善心相屬所有於彼正起防護加行以及防護究竟一切身業語四意三亦皆如是其中差別如云語業及云意業事及意樂加行究竟如理配合其中如就遠離殺生業道言之事者謂他有情意樂者謂見過患起遠離欲加行者謂正起防護殺行究竟者謂正防護圓滿身業由是道理餘亦應知寅二果謂由下中上品善業感生人及欲天或生上二界天次等流果及主宰果遮止不善如理應知丑三業餘差別引樂趣業是諸善法引惡趣業是諸不善能滿之中則無決定雖生樂趣亦有斷支諸根不全顏貌醜陋短壽多病資財匱乏等是不善作生於旁生及餓鬼中亦有富樂圓滿是善所作如是於能引善所引中有由能滿善所圓滿及由不善所圓滿二類於能引不善引中亦有能滿不善所圓滿及由善所圓滿二類故成四句次定不定受業中定受者謂若思已作及增長不定受者謂若思已作而不增其中作及增長之差別者謂若正思或思維己身語等起是謂作業凡非夢中所作等十是謂增長凡是夢中所作等十是不增長決定受中依受果時又分三種初現法受者謂即其生受彼業果順生受者謂第三世當受其果順後受者謂於三世以後當受壬二別思業果謂遠離十種不善雖能獲得善妙所依然若成一圓具德相能修一切種智勝所依者則修道進程非餘可比故當成辦如此所依此中分二癸一異熟功德及作業癸二異熟之因今初異熟之因分八初壽量圓滿者謂宿能引所引長壽如其所引久住此以義利自他為首能於長時積集多善二容貌圓滿者謂由形色顯色善妙諸根全具橫豎相稱大衆乍見即善咸共歸仰聽信其言三種姓圓滿者謂能生於世所敬仰高貴種族凡所教諭無違成辦四自在圓滿者謂有財勢廣大親朋並大僚屬此是施攝有情令其成熟五言語高貴者謂其身語於他無欺於諸有情堪為信委此是愛語利行同事攝受有情令其成熟六勢大名揚者謂於惠施具足精進等德故為大衆所供奉處此亦由於支助一切事業為報恩故願速受教七丈夫性者謂具男根有此可為一切勝功德器欲樂勤奮堪為智慧廣博之器衆中無畏可與一切有情同伴或居隱處均無嫌礙八具足大力者謂由宿業力衰損微弱全無病痛於現法緣起大歡喜此於自他義利均無厭倦勇猛堅固能起慧力由慧力故速得神通癸二異熟之因異熟因分八初者謂於有情不加傷害及正依止不害意樂又云放捨將殺生如是長其命遮止害衆生則當得長壽承事諸病人遍施諸藥物不以杖等傷有情故無病二者謂能惠施燈等光明鮮淨衣物又云依止無瞋恚施莊嚴妙色説無嫉妒果當感妙同分第三謂摧伏我慢於他及上師等恭敬如僕第四謂於乞求衣食等物悉皆施與設未乞求亦豫利益又於苦惱及功德田乏資具所前往施供等五謂修遠離語四不善第六謂發宏願於自身中攝持當來種種功德供養三寶供養父母聲聞獨覺親教軌範及上師等第七謂樂丈夫功德厭離女身見其過患遮止樂女身欲是能斷失男根應能脫免第八謂他不能作自當代作若共能作則當伴助惠施飲食如是八因若具三因能感最勝諸異熟果於其三因心清淨中自觀待二謂修彼因所有衆善將以回向無上菩提不希異熟從至深心修習彼因勢力猛利他觀待二謂見同法上中下座遠離嫉妬比較輕侮而修隨喜設若不能如此而修亦應日日多次觀擇所應作事加行清淨中自觀待者謂於長時無間猛利他觀待者謂未受行讚美令受已受行者讚美令喜恆無間作永不棄捨田清淨者即由彼二意樂加行能給衆多妙果如同田剎壬三既思維已當行當遮理趣分二癸一總説癸二別説由四力修理今初如入行論云苦從不善生如何定得脫我晝夜恆時理應思惟此又云能仁説勝解一切善品本又此三根本常修異熟果既了黑白業果則當數數修習以此非是肉眼可見極難獲得定解故又如三摩地王經云星月可墜落山城可毀壞空間可變遷佛不説虛語故於如來語應修殷重若未於此獲得真實定解任於何法總不能得尊勝所喜勝解有一類師謂於空性已得決定然於業果尚無定信如此輕率所謂已達空性實乃顛倒若解空性者先了即是緣起之理是於業果生起定解為助伴故即彼經云一切法空如水月如幻如泡陽焰電有情死後往他世若意生身不可得所作衆業不失壞如其黑白果成熟如此理趣最善妙微細難知佛行境是故應於二業因果生起定解一切晝夜觀察三門而斷惡趣若不先能善巧因果差別或些微了知任將三門放逸而轉此是洞開惡趣之門海龍王請問經云龍王諸菩薩由一種法能斷生於惡趣顛倒墮落一法云何謂如是觀如是念云我是如何度諸晝夜於諸善法觀察思擇如是思已遮止罪行之理者如諦者品云大王汝莫殺生靈一切衆生極愛命由是起護長壽欲意中永不思殺生謂於十種不善一切等起惡行縱能微少亦不現行應多修習防護自心康絨巴謂頗窘瓦云善知識説唯有業果最為緊要目前講説聽聞修習若不以為重者我意唯此是難受持頗窘瓦亦云實爾實爾敦巴大師亦云覺喎瓦心莫濶大此緣起微細癸二別説由四力修理如是雖是勵力不染罪行然由放逸及衆多煩惱增上力故設有所犯不可不思處置須勵力修大悲大師所説還出方便此復墮罪還出理者應如三種律儀分別所説諸罪還出者應由四力此中初破壞現行力者謂從無始所作不善多起追悔生起此者須修生異熟等三果道理修時應由勝金光明懺及卅五佛懺二種悔除第二對治現行力中分六一依止甚深經者謂受持讀誦般若經等文句二勝解空性者謂趣入無我光明法性極深忍可本來清淨三依念誦者謂如儀軌念誦百字咒等殊勝陀羅尼妙臂請問經云乾季猛火所焚燒任運能燒諸草木戒風吹燃念誦火大精進焰燒諸惡猶如炎日照雪山不堪熱炙而消溶若以戒日念誦光火照罪雪亦溶盡如黑暗中燃燈光能除黑暗盡無餘千世所集諸罪暗以念誦燈能速除此復直至未能清淨罪相之前均當念誦所謂相者準提陀羅尼説若於夢中夢吐惡食飲乳酪等及吐酪等見出日月遊行虛空見火熾然及見水牛制伏黑人見比丘僧尼見樹流乳大象牛王山獅子座妙宮飾上聽聞正法四依形像者謂於世尊已得堅信塑形造像五依供養者謂於佛前及佛塔廟設種種供六依名號者謂聽聞受持佛菩薩名號此等唯是集學論中已宣説者餘説亦多第三遮止罪惡力者謂正防護十種不善日藏經説由此能摧所作一切自作教他見作隨喜殺生等門三門業障諸煩惱障及正法障毗奈耶廣釋中説若無誠意防護之心所作悔罪唯成空言阿含中於此密意問云後防護耶故防護心後不更作至為切要能生此心仍賴初力第四依力者謂修皈依及菩提心此中總之世尊為初發業者説有種種淨罪之門然具四力即是圓滿一切對治所謂淨罪之理者謂諸能感惡趣極大苦因或令變為能感微少苦因或雖生惡趣不受惡趣諸苦或於現身稍受頭痛即得清淨如是諸應長時受者變為短期或全不受此復是由淨修之人力之大小四力對治圓不圓具勢力猛弱時間長短等門故無定準諸契經及律藏中均説諸業雖經百劫不失壞意謂未修四力對治若以所説而以四力修對治者雖順定受亦説能淨般若八千頌釋亦如是説如是由悔及防護等破壞能發異熟功能者雖遇他緣亦定不能感發異熟如是由生邪見瞋恚摧毀善根亦復如是此是因明熾燃論所説又由悔護清淨無餘然從最初無有罪染之淨及從懺悔清淨之二有大差異譬如菩薩地中所説犯根本罪雖可重受菩薩律儀而能還出然於此生決定不能獲得初地攝研磨經中亦説此經中説由謗法罪設七年中一日三時懺悔其罪而致清淨然如何速總須十劫始能得忍由是無餘清淨義者是説無餘毀壞當感不悅意果起道證等極為遙遠故應勵力最初不犯是故聖者於微少罪雖為命故亦不違犯若懺悔淨與初無犯兩無差別者是已無須如是行矣即如世間所見傷手足等雖可治療然終不如初未傷損己二生此意念之量謂既真實希求現世為先所謂希求後世唯虛言耳應換其位先以希求後世為主而以希求現世為副則正生起然須令堅固雖已生起仍須勵力修習己三遣除此中邪執謂有一類因為經中有説於輪回中所有一切圓滿悉應背棄因是而作是念身及受用等所有善趣圓滿既是輪回而於此等發起希求是不應理應知所求略有二種謂所暫求現世及所希求究竟義利輪回之中身等圓滿即是求解脫者亦須暫求以由展轉受生最後當得決定勝故並非所有受用眷屬圓滿善趣身事皆是輪回所攝以其身等圓滿究竟即佛色身圓滿佛剎佛眷屬故故莊嚴經論於此密意説云由前四度成辦色身受用眷屬圓滿之善趣身又多教典説由此等成色身故以上菩提道次第共下士道經
