body:
  text: 黃教祖師宗喀巴著邢肅芝譯如是隨念當死及思死後當墮惡趣之理能令其心不耽現世而於後世善趣生起希求次由共皈依門及由定解黑白業果勵力斷惡修善則能獲得善趣妙位然不以此便為滿足從所發起共下士意樂更令引生厭捨一切生死輪回共中士意樂依此因緣發菩提心引入上士故於此中須先修習共中士意樂即是雖得人天勝位然仍未出行苦若即於此執為樂性實為顛倒故於真實全無安樂其後定當墮諸惡趣惡邊際故戊二共中士道次修心分四己一正修意樂己二生起意樂之量己三遣除此中邪執己四抉擇能趣解脫道之自性初中分二庚一明求解脫之心庚二生此方便今初言解脫者謂脫纏縛此復業及煩惱是能纏縛而致生死即由此二增上力故若依界判欲等三界以趣分別謂天趣等或五或六依生處門謂胎等四如是結蘊相續即是能縛之體性從此得脫名曰解脫欲求得此即是希求解脫之心庚二生此方便譬如欲得止息乾渴之苦是由渴逼見水愛欲如是欲得息滅諸取蘊苦而得解脫亦由觀見取蘊苦性所有過患故若未修三有過患於彼未起欲捨之心則於苦滅不起欲得四百論云凡於此無厭彼豈敬寂靜此中分二辛一思維苦諦生死過患辛二思維集諦流轉次第初又分二壬一顯示四諦先說苦諦之意趣壬二正修苦諦今初集諦為因苦諦是彼之果故集在先苦是在後何故薄伽梵不順彼之次第而作是說諸苾芻此是苦聖諦此是集聖諦耶大師於此不順因果次第而宣說者是有極大修持扼要故無過失此復云何謂所化者若於生死曾未生起無倒希求解脫之心徹底斷絶如何能導令其解脫以諸所化久為無明暗障所覆於諸苦性生死圓滿執為安樂顛倒欺誑如四百論云此大苦海中無有岸邊際愚夫沉此中云何不生畏此中正說是苦非樂說多苦相令起厭離是故先說苦諦此後自見墮於苦海欲求出離便見其苦必須滅除又復了知不滅其因苦終不滅便思其因是如何者由是便能了知集諦是故苦後而說集諦次知生死等苦皆由有漏業生其業又由煩惱而生煩惱根本是為我執因而了知集諦若見我執亦能止滅誓願現證滅苦之滅故於集後宣說滅諦若爾開示苦諦之後即於解脫發生希求苦諦之後應說滅諦答云無過爾時雖有欲解脫心欣得息滅衆苦之滅然猶未明衆苦之因未見其因定能滅止故於解脫不能定執為所應得如是若執定當證滅定當解脫便念何為趣入解脫道趣向道諦是故道諦最後宣說如是四諦大小乘中皆數宣說是為如來總攝生死流轉生死還滅諸扼要處故修解脫極為切要亦是修行大嗢陀南故須如是次第引導學者若未真實思惟苦諦厭捨生死則求解脫亦唯虛言隨其所作悉成集諦若未思集善知惑業生死根本猶如射箭未見鵠的是即斷截正道扼要遂於非脫三有之道妄執為是勞而無果若未能知應斷之苦集則亦不明息苦之解脫故欲求解脫亦唯增上慢耳壬二正修苦諦分二癸一思維生死總苦癸二思維別苦初中分二子一思維八苦子二思維六苦今初修共中士一切所緣法類此亦應當修習共下士時所說共法所有不共修事若有慧力亦如所書皆當修習若是慧力劣弱可暫捨置所引教文唯修應時義體此等雖是思擇而修然除應修諸所緣非餘善不善無記等上均不馳散心於所緣遮止掉等亦不任隨惛睡沉沒增上而轉時令其識極為明淨漸次修習入行論云雖長時修習念誦苦行等若心散亂修佛說無義利此說一切散亂善行果微少故大乘修信經亦云善男子由此種種信解如是諸菩薩等之大乘道如其所應大乘所生當知一切皆是由其不散亂心正思法義之所出生此中不散亂心者謂除所緣善法不向他馳法及義者謂句及義正思惟者謂以觀慧觀察思擇由此顯示隨修一切功德之法皆須此二故說成辦三乘一切功德皆須二事一自心除善所緣不向外馳正住專一而住真奢摩他或其隨順二善觀察善所緣境如所有性盡所有性正毗鉢舍那或其隨順如是如解深密經云慈氏若諸聲聞或諸菩薩或諸如來所有世間及出世間一切善法當知皆是此奢摩他毗鉢舍那所得之果此中若無真實止觀及隨順二種則所得三乘一切功德是正止觀之果應非决定如是八苦之中第一思維生苦分五衆苦相隨故生為苦者謂有情地獄及諸一向苦逼餓鬼并諸胎生卵生如是四類於初生時便有甚多猛利苦受相隨而生惡取所隨故生為苦者謂生住增長煩惱種子隨逐流轉不能堪能安住善事更不如其所願自在而轉衆苦所依故生為苦者謂既受生三界由是便能增長老病死等苦煩惱所依故生為苦者謂既受生死便於貪嗔癡等境發生三毒由此能令身心苦惱不靜不安樂住謂諸煩惱由種種門逼惱身心不隨所欲離別法性故生是苦者謂不超出一切生中最後邊際此非所欲復須唯令受苦故應數數思維第二思維老苦分五容顏衰退者謂腰曲如弓頭白如艾額如砧板皺紋滿覆青春消逝更非可愛氣力衰退者謂坐下如袋斷索起身如用力拔樹語言遲鈍行動緩慢等諸根衰退者謂眼不能明見色等忘念增盛記憶力減受用境界衰退者謂飲食等難以消化於他欲塵不能受用壽命消失苦者多分壽盡趣於死亡故當數數思維此等第三思維病苦分五身性變壞者謂形容消瘦皮膚枯槁等憂苦增長多住憂苦者謂身中水等諸界分不平均增減錯亂身生逼惱心起憂痛而度晝夜不能受用悅意境界者謂若有說諸可意境於病有害雖欲享受而不自在如是諸威儀道亦多不能隨欲諸非可愛境界受用雖非所欲亦須強受者謂藥及飲食等雖非愛樂須強飲用如是火炙刀割等粗重苦行皆須依止速離命根者謂見病難治便生痛苦當於此等審慎思維第四思維死苦分五謂捨離圓滿可愛財位捨離圓滿可愛親族捨離圓滿可愛朋友捨離圓滿可愛身體死時當受猛利苦惱乃至意未厭此諸苦當數思惟前四說為苦理者由見將捨此四圓滿而起苦惱第五思維怨憎會苦分五謂怨敵相遇心生憂苦畏其制罰裁決畏其責罵畏苦惱死畏違正法憂懼死後當墮惡趣當思此等第六思維愛別離苦分五謂離最親愛等心生憂苦語現悲歎身起損惱又以念彼功德思戀增盛意生熱惱應有受用而不齊全當思此等第七思維求不得苦分五如愛別離求不得者謂雖耕種不得秋實雖營商業不獲利潤凡於所求雖經努力終不能得灰心憂苦第八思維宣說五種取蘊總為苦義分五謂是當成衆苦之器及依已成衆苦之器是苦之器是壞苦器是行苦器應當數數思維此等此中初者謂依受此取蘊能引來生以後衆苦二者謂依已成之蘊為老病等之所依止三四者謂依二苦粗重隨逐能生彼二五者謂初成取蘊即便生為行蘊自性以一切行為前業惑自在轉故是行苦故若於生死取蘊自性未能發起真實厭離則無由生起真實求解脫心於有情漂流生死亦無方便能起大悲故不論趣入大小何乘此種意念極為切要子二思維六苦如親友書云謂無定過患無飽足過患數數捨身過患數數結生過患數數高下過患無伴過患等六如是亦可總攝為三謂生死中無信託處任受何樂無有飽足邊際無始而轉初中有四一於所得身不得保信者謂數數捨身二所作損益不可保信者謂父子更易親仇變幻等等無定三所得圓滿不可保信者謂高下變易四友伴不可保信者謂無伴獨往第三者謂數數結生展轉受生不見邊際故應如是數數思維復次貪增廣故現前樂受多是於苦漸息滅位妄起樂覺全無未作觀待除苦所顯自性真樂譬如競走為苦略為住息遂生樂覺現見此是先前久苦苦漸滅時樂漸次起故非自性是樂又太久坐亦復如前生起苦故若其自性是為樂因應如苦因隨其習近其苦漸增如是習近行住坐臥飲食晴陰等亦應隨其幾久習近便有如許安樂生起然見太久唯生苦故此是入胎經及四百論本釋所說癸二思維別苦分四子一思維三惡趣苦子二思維人間苦子三思維非天苦子四思維天苦今初初者已如前說子二思維人間苦謂飢渴寒熱不可愛觸貪求勞苦復有生老病死等七如前當知如資糧集云所有惡趣苦人中亦現有苦逼同地獄貧如閻羅界此間旁生苦勢強凌弱小欺壓并殘害相續如瀑流四百論亦云勝者意中苦庸流身苦生二苦日日中能壞此世間子三思維非天苦謂非天不能忍受諸天富樂因嫉而惱由是與天戰爭受割裂等傷身衆苦此等雖具智慧然由異熟障故不堪為見諦之身子四思維天苦分二丑一欲天苦丑二上界天苦初中分三寅一死後當墮苦寅二驚駭苦寅三斬裂殺害苦今初初又分二死歿苦墮下界苦謂臨歿時以與往昔所受天樂相較五種死相現前所起痛苦尤重於彼五死相者身色不可愛不樂本座華鬘萎謝衣服垢染身中出汗第二如親友書云天世壽盡而死歿若無少許善能餘則無自在墮旁生地獄餓鬼任何處寅二驚駭苦謂有具足廣大福蘊及上妙五欲天子生時諸薄福天子見已恐怖因此受大憂苦寅三斬裂殺害苦謂天與非天戰爭之時感受斬裂支節身受殺害之苦若斷其頭即便死歿支節斷裂續生如故驅擯者謂有強力諸天若屬忿怒力弱天子便被逐出自宮丑二上界天苦上界二天雖無此等諸苦然煩惱隨逐有種種障或死或住均無自在故亦為惡取所苦又如資糧集云凡色無色天超越於苦苦禪定樂為性住劫不動搖然非畢竟脫從彼仍當墮似已得超越惡趣苦瀑流勵力難久住等同空飛鳥如重力射箭雖射而不遠如久燃燈等剎那剎那滅所謂諸行苦自然極侵惱辛二思維集諦流轉次第分三壬一煩惱生起理趣壬二聚集彼業理趣壬三死歿及結生之理今初能成生死之因雖須業惑二種然以煩惱為主若無煩惱雖有前所集業漫無數量猶如種子若無水及土等不能發芽如是諸業缺俱有緣亦定不能發苦芽故若有煩惱縱無宿業無間新集取後有故如是亦如量釋論云超越諸有愛非餘業能引俱有緣盡故又云若有愛仍當出生故是故宣示煩惱對治極為重要此復依於了知煩惱則於煩惱當能善巧此中分三癸一正明煩惱癸二如何生起次第癸三煩惱過患今初初又分十貪者謂從攀緣內外可愛境相隨逐耽著如油潰布難以洗滌此亦耽著自所緣境處者與彼所緣難以分離嗔者謂緣諸有情及刀槍劍刺等苦具遍起恚惱發粗猛心於彼諸境思作損害我慢者謂依壞見攀緣內外高下好惡令心高舉高相隨轉無明者謂於四諦業果三寶自性心不明了染污無知疑者謂緣諦等三法念其有耶無耶是耶非耶壞聚見者謂緣取蘊計我我所我我所見染慧為性此中壞是無常聚是衆多為欲顯此所見之事唯是無常衆多之法全無常一補特伽羅故立名壞聚見邊執見者謂緣壞見所執之我計為常有或執斷滅從此死沒無再結生染慧為性見取者謂依壞見邊見邪見三者隨一因是所生見者之蘊執為最勝染慧為性戒禁取者謂依惡戒捨戒及諸行狀軌則身語隨轉所有邪禁及緣彼等所生之蘊見為能淨罪惡能解煩惱能出生死染慧為性邪見者謂計無前後世及業果等之損減執或計自在神我等為衆生因之增益執染慧為性以上十煩惱是隨大小各派共許而出若依中觀辨成派所許下當解釋癸二如何生起次第若許懷見與無明相異者譬如麻繩在幽暗處於繩實體不能明了於彼遂起執蛇之想如是障蔽明見蘊體由無明暗誤蘊為我是故從此生起其他煩惱若於彼二許為一者即此壞見即為煩惱根本此復由其壞見執為我已遂即分判自他差別如是分已貪著自黨瞋恚他黨緣我復生高舉執我常斷於我見等及彼相連所有惡行執為最勝如是便於開示無我之大師所示業果四諦三寶等執為無有邪見倒計或起疑慮如是有無是耶非耶量釋論云有我故知他執二故起瞋與此等係屬生一切過患癸三煩惱過患如莊嚴經論云煩惱能摧自摧戒摧有情衰損并低劣護法大師呵爭執惡名聲當生無暇處得失所損惱意中獲大苦入行論亦云瞋愛等怨敵全無手足形非智亦非勇如何驅役我歡樂住我心於我作損害忍此而不恚非忍處應呵設天非天等全與我作敵彼不能引我入無間火中大力煩惱敵須彌若相遇灰塵且無剩能剎那擲我隨我煩惱敵久遠無終始他敵均不能至如是久遠若隨順承事悉為作利樂若親諸煩惱當得大惱損故當思維所緣過患又如寂靜師云斷除煩惱須知煩惱過患體相對治生因既知過患知為過失計為仇敵若不了知過患則不知為大敵故應如莊嚴經論及入行論所說思惟又了知煩惱相者當聽阿毗達磨并聞五蘊差別論由知根本及隨煩惱不論貪瞋等若於自續生起便能認識此即是彼他今生起與煩惱鬥故須如是了知壬二聚集彼業理趣分二癸一正明所集之業癸二如何集積之理今初思業者謂令自相應心於境轉動策役其心之心所意業思己業者即由彼思發起身語之業均表無表為性毗婆沙師許唯有色世親菩薩破之許身語表俱轉之思故二種業俱說為思此中不善業是非福業福業者謂欲界所攝善業不動業者謂色無色地所攝有漏善業癸二如何集積之理謂既現證無我真實雖有由業煩惱增上而轉受生生死然不新造能引之業是故造集能引生死業者謂住大乘加行道世第一法以下一切異生此復若彼所依三門作行殺等不善集非福業若行捨施守護戒等欲界善法是集福業若修靜慮無色地攝奢摩他等是集不動業壬三死歿及結生之理分五癸一死緣癸二死心癸三從何攝暖癸四死後成辦中有理趣癸五次於生有受生道理今初謂如宿業所引壽量一切耗盡至期而死福盡死者謂無資具而死未捨不平等死者謂如經說壽未窮盡有九死因緣謂食無份量等癸二死心謂行信等善心死及貪等不善心死不論自憶或他令憶乃至粗想現行以來善及不善現行於心無記心死者謂所行善不善自不能憶他不令憶此中行善者如從黑暗趣向光明死時猶如夢中見有種種可愛之色安祥而逝解肢節苦極其輕微行不善者如從光明趣向黑暗死時亦如夢中見有種種不可愛相生起猛利苦受解肢節苦極其猛利又解肢節除天及地獄所餘生處一切均有無記心者謂如前說俱離苦樂又行善不善心二者將命終時昔於何者串習力強此心現前餘皆忘失若於二事平等串習先憶何法便不退捨不起餘心若細想行時善不善心兩俱棄捨住無記心又一切人臨命終時乃至未到昏昧想位長夜所習我愛現前已復由我愛增上力故想我將死便愛自身此即能成中有之因至於預流及斯沱含聖者雖則仍有我愛現行然由慧觀察故制伏不起譬如力士制伏弱者不還勝者我愛不起癸三從何攝暖凡造不善從上分捨上分先冷乃至心口造善業者從下分捨下分先冷二者俱從心處捨識識最初託精血之中即為肉心最後捨處即最初托癸四死後成辦中有理趣如前所說識從何捨即於彼處無間而成死與中有如稱低昂又此中有眼等根具當生何趣即彼身形直至未受生中眼無障隔猶如天眼身無阻礙如具神通此復中有是同類見及修所得天眼無過失見能成何趣中有次定不可轉趣餘生集論中說容有更改造不善行所得中有如黑羺光或陰暗夜善行中有如白衣光或月明夜能見同類中有并見自他所當生處入胎經云地獄中有如燒杌木旁生中有其色如烟餓鬼中有形相如水天人中有形如金色色界中有其色鮮白至於從無色沒生下二界則有中有若從下二生無色界則無中有經中又說天中有頭向上人中有橫行諸作惡業中有目向下視倒擲而行此說三惡趣亦復相同中有壽量若未得生緣極七日住若得生緣則無固定若仍未得則易其身乃至七七以內而住於此期內定得生緣故於此後不復安住如天中有七日死已或仍生為天上中有或轉生為人等中有此由他業轉變勢用能轉中有諸種子故餘亦如是癸五次於生有受生道理若是胎生是於父母精血生顛倒見爾時父母未行邪行猶如幻現行使邪行便起貪愛此是瑜伽師地論所說俱舍釋論則說由見父母邪行此復若當為女欲令母離貪與父會若當生男便欲父離貪與母會生此欲已漸漸逼近如是漸漸不見男女餘分唯見男女二根之相因此發憤中有即沒遂結其生此復父母貪愛俱極最後各出一滴濃厚精血二滴和合住母胎中猶如熟乳冷結與此同時中有俱滅與滅同時即由意識結生之力有餘微細諸根大種和合而生及此隨順精血混合餘根同分相應而生爾時所住之識若屬認可有第八識者許為阿賴耶識諸不認可阿賴耶者許為意識結生相續若於生處不樂趣赴則必不往若不往者定不應生故既造集感生地獄業已謂屠羊宰雞或販豬等諸非律儀中有猶如夢中於當生處見有羊等由先串習歡樂趣赴次由瞋忿生處之色中有遂滅生有即起如是於他地獄癭鬼等受生亦爾若生旁生餓鬼人間欲天色天便於生處見己同類有情生起歡樂如是於彼起欣欲故便往其所瞋當生處中有遂滅生有續起此乃瑜伽本地分所說若非宰雞及販豬等不律儀者生地獄理與此相同俱舍論云餘求香宅舍謂濕生求香化生求舍復如俱舍釋說若是當生熱地獄者求熱寒地獄者求凉中有遂往諸卵生者說同胎生己二生起意樂之量如是從苦集二諦之門詳知生死因相而欲棄捨希求證得彼等寂滅才生此念雖是出離意樂然僅爾許尚為不足當若誤入火宅及陷牢獄不愛其處能生幾許欲脫之心即當生起如此心量次後更令漸次增長又此意樂如夏日瓦云若僅口面粗率了知如麥酒上所擲麵粉則於集諦生死之因知不堪欲亦僅如許如是則於滅除苦集之滅亦復同爾故欲正修解脫道心僅唯空言而已既無從生起於餘有情漂流生死不忍之悲心更不能生有大勢用策發心意無上真菩提心故云是大乘者亦唯名目故當數數修此己三遣除此中邪執若作是念如是修習厭患生死令心出離則如聲聞墮寂滅邊於生死中不樂安住故修厭患僅是劣乘莊嚴若是菩薩不應修此如祕密不可思議經所說此是倒執經義經說不應怖畏生死其義非說凡由業惑增上力故漂流三有生老病死是等諸苦不應厭離是說菩薩悲願力故為利有情誓願受生不應厭離若由業惑增上漂流生死衆苦逼迫尚不能辦自利况云利他此是一切衰損之門故修小乘道者更應厭惡更應滅除如由悲願增上而於三有受生則應歡喜如是仍如祕密不可思議經云諸菩薩為欲成熟攝受有情於生死中見大義利并非於大涅槃若不分別如前宣說則此說法若已有菩薩戒者菩薩地說犯一惡作是染違犯若於生死心善出離次見有情皆自親屬為利他故入三有海此是四百論密意月稱論師在釋論中甚多詳明己四抉擇能趣解脫道之自性如前所說修習三有過患則能生起猛利出離生死欲樂因須滅除生死此中分三庚一以何等身滅除生死庚二修何等道而能滅除庚三如何修學之理今初如親友書云隨生名八無暇過離此等過得有暇故當勵力斷生死是須於既得暇滿時斷除生死既生無暇無斷時故如前已說大瑜伽師云現是躍出畜道之時布朵瓦亦云往昔既已漂流如是久遠自未歸還今亦不能自然歸還故須滅除滅除時者亦是既得暇滿之時此復居家修法有多障緣及多過惡出家反是斷生死身出家為勝是故智者應樂出家勇猛長者請問經亦說在家菩薩應如是願此者主要是慕敬事圓滿莊嚴經論亦云出家品類者具無量功德故能勝勤戒在家之菩薩如是非但修行解脫出離生死讚歎出家即由波羅密多乘及密咒乘修一切智亦以出家身最為第一出家律儀即三種律儀中別解脫戒故當敬重經教根本別解脫戒庚二修何等道而能滅除如親友書云或頭或衣忽然火當應滅除彼等行况所勵求無後有更無餘事勝過此以戒以慧及靜慮證得無垢涅槃位不老不死無窮盡離四大種及日月故應修學寶貴三學之道此中若導所喜中士夫道亦須廣釋三學引導理趣然而止觀心慧二學生起理趣於上士道時詳釋今此當略宣說學戒之理是中最初當數思維尸羅利益令其至心增長歡喜如親友書云戒是一切功德處如動不動依於地妙臂請問經云一切葉實依於地無諸灾患而生長如是依戒勝白法悲水灌溉而生長應如是思既受守護功德極大受而不護罪患亦多如比丘珍愛經云或以戒為樂或以戒為苦具戒則安樂毀戒則成苦又如文殊本續云壞戒而念誦不獲勝成就既無中悉地亦無下悉地能仁未曾說毀戒咒能成非往涅槃城境域及方所於此愚惡人咒何能得成似此毀戒人何能生善趣天趣且不得豈有勝妙樂何况佛所說能成諸密咒故當數數思維毀戒過患三摩地王經云為居家黑衣我所說學處爾時諸苾芻此學處亦無此謂為近事說五種學處圓滿守護苾芻亦已不存若於此時勤修學處其果甚大故應策勉又此經云若經俱胝恆沙劫淨心以諸妙飲食傘蓋幢幡及燈鬘承事百億俱胝佛若於正法極衰敗善逝聖教將滅時晝夜能行一學處其福勝前俱胝倍庚三如何修學之理四犯因中無知對治者謂當聽聞了知學處放逸對治者謂於取捨所緣行相不忘憶念及以正知率爾率爾觀察三門了知轉趣或善或惡依自或法之力羞恥作惡是謂知慚恐他譏毀是謂知愧及由怖畏惡行異熟懷恐懼等不敬對治者謂於大師及所制教同梵行等應修恭敬煩惱熾盛對治者應觀自心何煩惱盛勵修對治若不如是勤學違越而許其罪輕微於佛制教放縱而轉當獲純苦如阿含經云若於大師大悲教起輕蔑心少違犯當為諸苦所自在折籬失壞菴末園現或有於五禁令違犯而未受治罰非理若違能仁教如醫鉢龍墮旁生故當勵力莫為罪染設若已染切莫無所顧慮當如佛說還出罪犯勵力悔除若具別解脫律儀以如是道理守護密咒亦然如妙臂請問經云佛自所說別解脫淨戒調伏盡無餘居家咒師除形軌餘等一切應當學此說雖是居家咒師除出家相別羯摩軌則少分遮罪尚須如毗奈耶所說而行况出家咒師也哉康壟巴亦云若年飢荒糧為最要如是一切均系於戒當勤學此又戒淨不思業果不成故思業果是真教授夏日瓦亦云總禍福生起均依於法其中若依毗奈耶所說如實誓受內心清淨堪能觀察心意安泰邊際善妙敦巴格西云有一類人依律毀咒依咒毀律實則戒為咒伴咒為戒伴唯我上師教授包攝無餘阿底沙尊者亦云我天竺國凡遇要事或突發事邀集受持三藏法師問三藏中未曾遮耶此與三藏不相違耶既抉擇已於是遵行我迦濕彌羅諸師則於其上復問菩薩行中未曾遮耶不相違耶凡事均以依止律儀為本以上已說共中士道修心次第
