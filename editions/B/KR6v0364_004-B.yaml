body:
  text: 黃教祖師宗喀巴著邢肅芝譯如是長時修習種種生死過患見一切有如同火坑欲得解脫息滅惑苦由此希求策逼其意學三學道能証解脫脫離生死又此解脫非如善趣可再退失然所斷過及所証得僅是一分自利尚且不滿由此利他亦唯少分最後世尊勸發當趣大乘故具慧者理從最初即入大乘如攝大乘論云二乘畢竟當捨棄無力成辦世間利應趣佛乘悲所示一味利他為自性當知此中士夫安樂士夫威德士夫勝力謂能荷負利他重担唯緣自利共旁生故故諸大士本性謂專一趣注行利他樂弟子書云飢極撮草畜亦食渴極獲水歡暢飲凡是士夫勤利他安樂威德勝力夫日光徧照遊行乘地不擇担負世間大士無私天性然一味勤勇利世間如是見諸眾生眾苦逼惱為利他故無有喘息是名士夫亦名善巧即前書云照見世間無明煙雲覆眾生迷墮苦火無自在如救頭然精勤無喘息是等士夫亦名大善巧是故能生自他一切利樂本源能除一切衰損靈丹一切智士所行大道見聞念觸悉能長益一切有情由利他行兼成自利具足廣大善巧方便有此大乘可趣入者當思甚奇希有我今所得誠為善妙當盡士夫勝力趣此大乘依是大士道修此中分三己一顯示入大乘門唯是發心己二如何發心理趣己三既發心已學行理趣今初如是若須趣入大乘能入之門又復云何此中佛說謂波羅密多乘及密咒乘此外更無其餘大乘於此二乘隨趣何者然能入門唯菩提心若於身心何時生起他德縱未能生亦得安立為大乘人若於身心何時捨棄縱有通達空性等德亦僅墮於聲聞等地退失大乘大乘教典多所宣說由理辨証亦得成立故大乘者以隨逐有無此心為進退如入行論云發此心後一剎那即入佛子數慈氏解脫經云善男子譬如金剛寶石碎粒既能映蔽一切勝妙金飾亦不失為金剛寶名並能遣除一切貧窮善男子如是發起一切智心之金剛寶雖離殷重然能映蔽聲聞獨覺一切功德勝妙金飾亦不失為菩薩名數并能遣除一切生死貧窮此說雖未正學勝行若有此心便名菩薩金剛手灌頂續云諸大菩薩此最廣大此最甚深難可測量秘密之中最為秘密尼羅尼咒大曼陀羅不應開示諸惡有情金剛手汝說此為最極希有昔末聞此此當對何有情宣說金剛手答云曼殊室利若有正行修菩提心何時此等成就菩提心曼殊室利爾時此諸菩薩行菩薩行行密咒行當令入此大智灌頂陀羅尼咒大曼陀羅若菩提心未圓滿者是不當入亦不令彼見曼陀羅亦不於彼顯示印咒故法雖是大乘之法未為滿足最要是彼補特伽羅入大乘數又大乘人依菩提心若無此心僅唯解了所謂大乘者亦爾若具此心因相圓滿則成真淨故當勵力勤修此心如華嚴經云善男子菩提心者猶如一切佛法種子因須獲得定解故當解釋譬如地水肥料陽光等若與稻種會合則發稻芽若與豆麥等種子會合則發豆麥等芽是共因故如是麥種任遇何緣終不能發稻豆等芽是因系麥芽不共因故由是所攝水土等既成麥芽共因無上菩提心者佛芽因中猶如麥種唯生麥芽是不共因証得空性慧者等同水土等事是三種菩提共因故上續云信解大乘種子父能生佛法慧為母龍樹菩薩亦云不論無上佛菩提聲聞獨覺亦當依此是唯一解脫道除此决定無餘等此讚智慧波羅密多聲聞獨覺亦須依此故說智慧波羅密多為母以是大小乘二子之母故証空性之慧不能判別大乘小乘當以菩提心及廣大行而分判之寶鬘論云聲聞乘法中未說菩薩乘願行及廻向何能成菩薩此說不以見判而以行分如是証達空性之慧尚非大乘不共之道况諸餘道哉是故必須修習菩提心而為首要己二如何發心理趣分三庚一修菩提心次第庚二發起之量庚三儀軌受持法則今初從大覺喎所傳來者說分二種謂修七種因果教授及依寂天菩薩著述所說而修七種因果者謂正等正覺從菩提心生心從增上意樂意樂從悲大悲從慈慈從報恩報從念恩念恩從知母生是為七種此中分二辛一於其次第生起定解辛二如其次第正修初又分二壬一宣示大乘道之根本即是大悲壬二諸他因果是此因果理趣初又分三癸一初重要癸二中重要癸三後重要今初謂由大悲發動其意為欲拔除一切有情出生死故起决定誓若悲力微劣不能如是故能負荷度盡有情重担賴此悲故不荷此担不能入大乘數故故悲為首要如智慧無盡經云大德舍利弗又諸菩薩大悲無盡所以者何為前導故大德舍利弗如呼息出入是人命根之所前導如是菩薩大悲亦是成辦大乘前導伽亞果梨經云妙音諸菩薩行發起云何依於何處妙音告曰天子諸菩薩行起於大悲依於有情癸二中重要如是一次發如是心趣入正行然因有情數量眾多行為暴惡學處難行廣大無邊經無量刧見已畏怯墮於小乘故不僅一次發起大悲應常修習令漸增長全不觀待自身苦樂不厭利他自能圓滿一切資粮癸三後重要諸佛獲得果位時不如劣乘住於湼槃盡虛空界義利有情亦是由於大悲威力此若無者則同聲聞譬如稼穡初播種子次灌以水後得成熟最為重要佛之稼穡初中後三悲為最要此為大德月稱所說香納窮登巴云於覺喎所雖請開示唯說捨世間心修菩提心格西登巴愧怍而告之曰此是覺喎教授中心是知法要得决定解唯此最難故當數數積聚修習閱華嚴經等及諸釋論求其堅定不移壬二諸他因果是此因果理趣分二癸一初從知母乃至大慈為因之理癸二增上意樂及以發心為果之理今初總欲離苦若是數數思惟有情諸苦即能生起然令此心易生且生而堅固有力必先愛樂有情具有愛悅之相譬如親屬有苦則痛仇敵有苦則快怨親平等者則心存中庸此中初者因有可愛此復隨其幾許親愛便生爾許不忍其苦中下品愛下品不忍上上品愛苦雖極細亦生極大不忍若見仇敵有苦非但不生拔除之心反願其苦增長廣大永不相離此是心不愛悅所致此亦由其不悅心量欣樂其苦而有差別親怨平等則於其苦既無不忍亦無欣樂此乃由於中庸心量之所致耳如是而修有情為親屬者是為令起悅意之相親之最極莫若父母故修知母憶念母恩及報恩三是為引發悅意心相愛護有情猶如獨子此種慈念是前三果由是即能引發悲心希求與樂會合之慈及悲因果無定又發菩提心因修諸有情皆為親屬是月稱及大德月蓮花戒論師等之所宣說癸二增上意樂及以發心為果之理如是漸修其心悲心若起便能引發為利有情欲得佛位僅此足矣何故於此更加增上意樂夫令有情得樂除苦慈悲無量聲聞獨覺雖共有之然能負荷一切有情離苦得樂重担為己任者唯大乘者得而有之故須發起心力強盛之增上意樂海慧請問經中了義宣說如是若起度有情心然觀待目前雖一有事情亦未圓成縱得二阿羅汗位亦僅利益少分有情僅得解脫而已不能安立於一切種智故當思維能成辦無邊有情圓滿此等有情究竟現前一切義利則知唯佛而有此能故能引發為利有情欲得佛果辛二如其次第正修分三壬一修習希求利他之心壬二修習希求菩提之心壬三明所修果即是發心初中分二癸一成辦生起此心所依癸二正發此心初中分二子一於諸有情合心平等子二修此一切成悅意相今初如前下中士道所說前行及諸次第於此亦應取而修習又若此中不從最初遮止分黨令心平等則於有情一類起貪一類起嗔所生慈悲皆有黨類緣無黨類則不能生故當修捨此復有二謂修有情無貪嗔等煩惱之相及於有情自性離貪及嗔令心平等此是後者修此次第為令易生先以中庸無利無害為所緣事次除貪嗔修心平等若心平等已次緣親友修平等心若是心未平等或由貪嗔分別黨類或貪輕重令不平等此若能平次於怨敵修平等心若未能平專於怨敵而起嗔恚此若平已則於一切有情修平等心此復二事就有情言一切求樂厭苦皆悉同故若於一類執為親近而與利益或於一類執為疏遠而作損害此不應理就自身言當作是思無始以來於生死中所有有情莫不百次為我親屬何者當嗔何者當貪此是修次中篇所說又於親屬起貪愛時如勝月童女請問經云我昔曾盡殺汝等我亦為爾所殺戳一切互相為仇殺汝等如何起貪心又如前說無定過患時中一切親仇迅速變改所說理趣當善思之則能俱遮貪嗔二心此取怨親差別事修故不須遣怨親之心若以怨親作為因相而起貪嗔判為黨類是為此中當遮子二修此一切成悅意相分三丑一修母丑二修念恩丑三修報恩今初輪廻無始我所受生亦無邊際生死相續於輪廻中未有不受此身更無未有不生此處者故亦未有不曾為我母者此是經中所說此復不僅曾為我母於未來世亦將為母如是思維是為我母當求定解此解若生次念恩等易生此若不生則念報恩等無所依故丑二修念恩修習一切有情是母之後若緣現世母修疾速易生如布朵巴所說而修先修面前母相明顯彼從無始以來曾為我母不可量計如是我母為母之時一切損害悉能救護一切安樂均能成辦尤其今世首住胎藏次分娩時黃毛疎豎偎以體暖十指捧抱哺乳喂食口拭涕穢手抹便溺種種方便無厭撫養又飢渴時與以飲食寒時給衣乏時給財均是自所儲積未肯服用所有受用皆非易得受盡艱辛及惡名稱求來授與又若子染病痛寧願自死求免子死寧願自病求赦子病出自誠心于願替代用盡方便解除其苦竭盡智能凡有利樂無不成辦凡有損害無不驅除於此等理應當專心思維如是修已若念恩心真實生起非徒空言次於父母等諸餘親友亦當知母如上修習次於平等者亦修知母若能生起此心亦如親友則於怨敵亦如知母而正修習若於怨敵亦起如母之心次於十方一切有情知母為先而漸增廣起修丑三修報恩如是流轉生死不僅不識是我有恩之母孤苦無依捨棄無掛只求自脫生死熟有無慚甚於此者弟子書云親屬趣入生死海猶如捲入激流中隔胎不識便捨棄只求自脫豈有慚故若棄捨如是有恩於下等人尚不應理况於我教豈能隨順如是思已即能負起報恩重担若爾正行報恩當如何者生死富樂母自能得然此一切無不欺誑我因往昔惑魔所傷如生熱瘡更注硝鹽自性已苦更生種種大苦慈心饒益應當援引彼等達到究竟湼槃之樂而報其恩總之想念我母未住正念心狂目盲更無導師步履蹌踉趣入險境可驚可怖其母若不寄望其子更望子誰其子不從險處援救其母誰又能救故須從此而救度之如是曾經為母一切有情由于煩惱魔所侵害自心狂亂無主又無慧眼觀善趣生及究竟勝并缺真實善友予以引導一一剎那造作惡行步伐蹌踉墮臨險崖總于生死別于惡趣懸險奔馳母既望子子當濟母如是思已故當拔出生死而報其恩集學論云煩惱狂痴盲極多懸險道步履而蹌踉自他常憂事眾生苦皆同如是觀已則不於他尋求過失雖見一德亦覺希有所說苦惱理與此同癸二正發此心分三子一修慈子二修悲子三修增上意樂今初謂不具足安樂有情行相者謂念云何令遇安樂惟願令其獲得安樂我應令其得遇安樂利益者三摩地王經云充滿無邊俱胝剎盡其無量眾供養以此常供諸大士不及慈心數一分此謂較以廣大財物于究竟福田常時供養其福尤大文殊佛土莊嚴經云於東北方有大自在王佛其世界名千莊嚴其中有情皆具安樂如諸苾蒭入滅盡定設於彼土修淨梵行經百千俱胝若於此土乃至最下一彈指頃緣一切有情發生慈心其所生福較前尤多况其慈心晝夜長住寶鬘論云每日三次施三百罐飲食然不及須臾修慈福一分天人皆慈愛彼等恒守護怡悅多安樂毒兵不侵害任運事成辦能生梵世間縱未得解脫得慈法八德謂若有慈天人慈愛自然集會佛以慈力戰敗魔軍故成守護最勝修慈次第先於親修次於中庸次于怨敵起修其後徧於一切有情如次第修習修習道理如於有情數數思維苦苦道理便生慈愍如是亦當于諸有情數數思維缺乏有漏無漏諸樂樂缺之理若修習此欲遇樂心任運而起又當作意種種妙樂施諸有情子二修悲謂由三苦如其所應苦惱有情行相者謂念云何令離此苦願其捨離我當令離修習次第先於親友次於中庸次於怨敵其後徧於十方一切有情而修如是於其等捨慈悲區分其境次第修者是蓮花戒論師隨順阿毘達磨經說極為扼要若不區分初緣總修似生起時各各思維皆悉未生若於別別生起變意感覺如前說者漸次增多後緣總修隨緣總別則能清淨生故修習理趣當思為母此諸有情墮生死中如何感受總別諸苦已如前說修悲生起之量者修次初篇云何時猶如愛子身不安樂如是亦於一切有情欲淨其苦此悲行相任運而轉自性相應而轉爾時即是悲心圓滿得大悲名此喻自心最愛幼兒若有痛苦其母能生幾許悲痛即以此例而為心量若於一切有情悲任運轉即說此為大悲因相圓滿如是大悲生起之量亦當了知子三修習增上意樂如是既修慈悲之後應作是思噫此諸有情為我所愛為我所悅如是乏樂眾苦逼惱如何令得安樂解脫眾苦使能負此救度重担下至言說不忘修心前報恩時雖亦畧生然此所說遇樂除苦所生慈悲未為完足故特宣示須有能引成辦一切有情利樂慈悲之心又此非唯於正修時即修法後一切加行時中均能相續不斷修習此是修次中篇所說壬二修習希求菩提之心依據前此所說次第便見利他定須菩提於此而起求得之心然僅唯此不為滿足如前歸依時中所說思維身語意事業功德等首須盡力增長淨信是說信為欲依於彼功德發起誠心求証之欲則定了知縱是自利亦必証得一切種智不可壬三明所修果即是發心分二癸一總相癸二差別今初如現觀莊嚴論所說發心為利他圓正等正覺癸二差別隨順華嚴經義所說入行論云將行及正行如知其差別善巧者當知此二次第異是說願行二者相異此中異說雖多然作是念為利有情願當成佛此是願心受律儀已即是行心修次初篇作如是說庚二發起之量分三辛一思維自他更換利益及不能更換過患辛二宣說若修此心定能生起辛三修習自他更換次第今初如入行論云凡於自他等希求速救度當自他更換密最勝當行又云所有世間樂悉從利他生所有世間苦均從自利來何須再煩說愚夫唯自利能仁則利他觀此二差別若不真能換自樂及他苦非僅不成佛生死亦無樂故當思惟愛我執者是一切衰損之門愛他執者是一切利樂根源辛二宣說若修此心定能生起譬如昔為仇敵聞名驚怖後因和順相結為友若無彼時當生極大憂惱均是隨心而轉故若能修觀自如他亦能生起觀他如自即此論云艱難不當退是由修習力先聞名怖畏後無彼不樂又云自身棄如𭕫如是無艱難若作是念他身非我身何能於彼能生如自之心耶即此身體亦是父母精血所成屬他體分而由往昔串習力故生起我執若於他身修習愛執亦能生起宛如自身即此論云如何於他分一滴精血聚虛妄執為我如是應修他若能善思過患利益則能至心修愛樂修乃至定能生起而修辛三修習自他更換次第分二壬一遣障阻壬二變心位今初謂自他更換是說以自為他以他為自非是於他強念為我及於他眼念為我所而修其心乃是改換愛著自己棄捨他人壬二變心位應當發心愛他如自棄自如他故說更換自樂他苦應知亦是於我愛執視為怨敵滅除重視我之安樂於他愛執視為功德滅除輕視他人痛苦殷重修習驅除他苦總以不愛自樂驅除他苦為要修習此心有二障礙一謂執著自他苦樂所依自他二身猶如青黃各各類別次於依此所生苦樂作是念云此是我者應修應除此是他者應棄應捨能治此者謂觀自他自性非有類別唯互觀待於自亦能起如他心於他亦能起如自心如此山彼山言彼山者是就此岸起彼山心若至彼山則生此山之覺此不同青色任待於誰唯起青色之心不起餘心亦如集學論云修自他平等堅固菩提心自他唯相對虛妄分彼此此岸非是彼觀誰而成此自且不成自觀誰而成他此說唯由所觀待處而假安立全無自性二謂又念他之痛苦與我無損不需勵力遣除他苦為除此種障碍謂若如是則如惟恐老時受苦不應少時聚斂財物以老時苦無害於少故如是足痛手不須除是手之他故此者僅是一例上下午等亦均如是若謂老幼是一相續其手足等是一身聚此與自他不同應知相續與身聚是於多剎那多支分而假安立并無獨一自性自我他我亦皆於假聚相續而安立故言自他皆相對有無有自性然由無始串習愛執增上力故自所生苦便不忍受若是於他亦修愛執則於他苦亦能生起不忍之心二正修理趣者謂由於自貪著力故起我愛執由此無始以來乃至現在生起諸多不可愛相唯求自身圓滿故以自利為主行非方便經無數刧自他二利均無所成不僅不成且受苦逼若自利心移作利他則早定成佛當能圓滿自他一切義利由未如是故經長時勞而無益今乃了知第一怨敵即愛我執應依念知多所勵力未生者不生已生者不令相續决定堅固數數修習如是數數思維愛他執之一切功德當由至心生起猛利棄他之心未生不生已生不再相續於他令發可愛可樂可意之相如前於自愛樂執著今者於他應當生起愛執之心如覺喎云藏人知否有不知修慈悲之菩薩若爾當如何者須從最初次第修習朗日塘巴云夏日瓦與我有十八種人方便一種馬方便人方便者謂發殊勝菩提心凡所作事均學利益有情馬方便者謂我愛執能令菩提心未生者不生生既不住不令增長故特於此盡力對治面對有情盡力利益康絨巴亦云我等於此依情有情倒行逆施有情對於我等當亦如此是故立與未立大乘根本入與未入大乘之分均繫於此應一切時觀察此心令其生起能生固善如未生起莫令空過應依止開示此法善知識常與修如是心伴侶共同居住並閱宣說此等經論勤修此因積聚資粮淨治罪障自亦如是淨修其心則定能播圓滿種子萬勿忽畧理應歡喜大覺喎云欲入大乘門除暗息熱惱覺心如日月經刧勵令生第二發起之量如前已釋應當了知庚三儀軌受持法則分三辛一未得令得辛二已得護持不失辛三如有失壞還出方便初中分三壬一所受之境壬二能受之身壬三如何受持儀軌今初諸先覺說俱定願心住其學處非為完足必須行心律儀相應此與勝敵論師所說相同壬二能受之身謂天龍等身及意樂堪發願心者均可為此所依然此中如道灯釋論說厭離生死念死無常有慧有悲如前所說諸道次第已修心者於菩提心轉變其意畧有所得正為能受所依壬三如何受持儀軌分三癸一加行儀軌癸二正行儀軌癸三結行儀軌初又分三子一特別皈依子二集積資粮子三淨修其心初又分三丑一洒淨處所安置塔像陳設供品丑二勸請皈依丑三宣說皈依學處今初先掃幽靜處所塗抹牛身五物洒以栴檀上妙香水散佈鮮艷香花設以塑鑄三寶等像經卷典藉菩薩像等安置壁架或妙高台旛葢香花諸供養具無所缺少并設伎樂飲食香花敷設大善知識所坐之座往昔大德先供僧伽施食鬼趣積集資粮若無供物應如賢刧經說雖一方布亦成供養若有供物應無詭譎殷重廣求友伴心中咸感滿足普與供養藏境先諸大德嘗於莽境及桑耶等處從大覺喎請求發心開示供養太劣不生謂所供佛像是聖教主尊必須開光所供經典亦須攝頌以上諸般若經此後迎請聖像弟子沐浴著鮮淨衣合掌而聽上師宣說福田等功德至心生信自觀本身住佛菩薩前徐徐念誦七友供養丑二勸請皈依謂於上師起大師想禮敬供献右膝著地正為菩提心故合掌啟白如昔如來阿羅汗正等正覺佛等及住大地諸大菩薩先於無上菩提心而正發心如是我名某某亦啟請阿闍黎尊於無上正等正覺而發其心乃至三說次於我佛世尊法之主體滅道二諦永不退轉菩薩聖者僧即從今時乃至未得菩提之中為度一切有情歸佛為師正皈敬法皈僧為伴先具此意樂總相特能猛利發起令如是心在一切時中永不退失如前所說而受歸依阿闍黎尊存念我名某某從今時起乃至証得菩提藏中歸依佛薄伽梵兩足中尊阿闍黎等存念我名某某從今時起乃至証得菩提藏中皈依寂靜離欲諸法眾法中尊阿闍黎尊存念我名某某從今時起乃至証得菩提藏中皈依不退菩薩聖僧諸眾中尊如是三說如是皈依每一種寶各別啟請歸法文句雖不盡同均如覺喎所造儀軌丑三宣說皈依學處如前下士所說學處今於此中阿闍黎亦當宣說子二積集資粮謂於正傳承諸上師等及資粮田前修七支供子三淨修其心謂令慈悲所緣行相皆悉明顯俱如前說癸二正行儀軌謂於阿闍黎前右膝著地恭敬合掌而發其心此非唯念為利他故當得佛位而發其心應立誓願緣所發心直至未得菩提終不棄捨應依儀軌發此意樂願心容有二類若於願心學處不能學者不當發心若依儀軌僅起是念為利有情我當成佛則於發心學處能不能學亦屬可授至依儀軌受取行心若於學處不能學者則不能授或說龍樹無著所傳律儀軌對多種人有可授及不可授之差異不應道理聖光明教授經云若不能學施等學處雖僅發心亦能積聚多福修次初篇亦說若不能修學諸種波羅密多亦獲大果方便攝受亦當發心此謂不能修學施等學處亦可發心不能受取律儀至為明顯受取發心儀軌者維願現住十方諸佛菩薩於我存念阿闍黎尊於我存念我名某甲若於此生若於他生所有佈施自性持戒自性修行善根自作教他見作隨喜以此善根如昔如來應正等覺及住大地菩薩摩訶薩於無上菩提而發其心如是我名某某從今為始乃至菩提亦於無上正等菩提而發其心有情未度而當度之未解脫者當令解脫未安息者令安息之未般泥桓者令般泥桓如是三次啟白皈依儀軌及此發心儀軌雖未明說須隨師念然實須要有師如此若未能獲得阿闍黎時當如何者覺喎所造發心儀軌云如是無阿闍黎自發菩提心之儀軌者自心觀想釋迦如來以及十方三世如來普修禮敬供養不須啟白阿闍黎語皈依等次悉如前說癸三結行儀軌謂請阿闍黎為弟子等宣說願心學處辛二已得護持不失分二壬一修學此生發心不退失因壬二修學他生不遠離因初中分四癸一為於發心增歡喜故修學恒念利益癸二正令增長所發心故修學六次發心癸三應令其心不捨有情癸四應於福慧資糧雙修今初無論閱讀佛經或從師聞應思菩提心諸種利益華嚴經中已詳宣說應當參閱經中引說此為一切佛法種子總攝菩薩一切願行此是總說若廣宣釋支分無邊所謂總說即攝一切故謂總說又如嗢柁南總攝一切菩薩道之扼要說為嗢柁南菩薩地中所說利益是願心利益彼從最初發堅固心有二勝益一成殊勝田二能攝受無惱害福前者如云人天世間皆應敬禮謂發心無間即為一切有情所供養處又如說云發心無間由種性門即能映蔽諸阿羅汗謂成上師尊長又云雖作小福而得無邊大果猶如大地成一切世間所依故為福田此謂等同九有眾生之父二者如說二轉輪王護者常護若寢若狂或放逸時諸惡葯叉宅神非人宅神不能擾害若餘有情為欲息滅疫疾災橫所用無驗咒句明咒若有此者必能靈騐何况已驗由此顯此息灾等業發心堅固則易成辦修共成就亦以有此為速隨所居處所有恐怖飢饉非人傷害未生不生隨轉他生少灾無病能忍他惱不惱於他難生惡趣設有生者亦速解脫即於惡趣生少苦受以此為緣厭離生死於彼有情起大悲心菩提心福若有形像盡虛空界難以容納以諸財寶供養諸佛仍不能及此福一分勇施請問經云菩提心福德設若有形像盡其虛空界其量有餘剩若人以諸寶恆河沙數量充滿佛剎土供養世間尊若有唯合掌歸敬菩提心此是最勝供功德無邊際當大覺喎繞金剛座時心中作念當如何修乃能速得圓滿菩提時諸小像起立請問諸大像曰欲速成佛當如何修答曰唯菩提心是所當學又見寺上空中有一少女問一老婦亦如前答故於菩提心心極堅定由是能攝大乘教授一切扼要一切成就極大寶藏超出二乘大乘特法策發菩薩行廣大行應知即是大菩提心修此心時當勇喜漸增如渴時求飲乃至多刧以甚奇希有智深細觀察諸道諸佛菩薩唯見此為速能成佛勝方便故如入行論云多刧細觀察能仁見此利癸二正令增長所發心故修學六次發心分二子一不捨所發願心子二學令增長今初如是於佛菩薩善知識前而起誓願有情未得度者當令得度俟見有情數量眾多行為暴惡須經多刧時間漫長二種資粮無邊難行皆須修學因而怯弱棄捨發心重担此較失壞別解脫罪尤為重大入行論云若捨所發心則須長夜漂流惡趣又云盲人於糞聚獲得末尼寶如是偶然得我發菩提心謂當思維我得此者極為希有不當棄捨一切種又依所攀緣心更應多立誓願雖一剎那亦不棄捨子二學令增長如是唯不捨棄猶非滿足應當日間三次夜間三次猛力勵力令作增長此復若能如前所說儀軌廣修則當如是若不能者則明想福田供奉供物修慈悲等六次攝受此之儀軌諸佛正法眾中尊直至菩提我皈依我以所作施等善為利有情願成佛每次三反癸三應令其心不捨有情謂捨有情心之所從生是因造作少許非理事緣便起是念從茲不作似此義利癸四應於福慧資粮双修謂從受持願心儀軌當日日無間供養三寶積聚資粮而作增長菩提心因壬二修習他生不遠離因分二癸一斷除為患四種黑法癸二受學能不為患四白法今初四黑法中謂欺誑親教不敬規範師及本師福田境是二師易知言本師者謂欲饒益福田者謂雖非前數而具功德即於此等當如何作能成黑法謂於此等隨一明知故誑即成黑法然非誑之欺者下當解釋是須誑所成欺集學論說斷諸黑法即是白法對治此者即是四白法中第一法故於他無悔令生追悔此有二類境者於他補特伽羅所修善事不具追悔所作如何謂令意樂憂悔不當悔處生起憂悔此等二法能不能欺生不生悔皆同犯罪說正趣大乘諸有情之惡名等境者發菩提心現正具足所作如何瞋恚等起說惡名稱對於何境而宣說者了義即可過失深重前已畧說又如菩薩起毀訾心則此菩薩須經爾刧恒住地獄最寂决定神變經說唯除毀訾諸菩薩罪餘等業不能令諸菩薩墮於惡趣攝頌亦說若未得授記菩薩忿諍得記菩薩者如其所生爾許瞋恚盡爾許刧流轉諸道故於一切種當滅忿心設有現起無間勵力悔除防護非增上意樂現行欺誑境者謂於隨一他等有情所作如何謂行欺誑謂於秤斗行狡詐等如勝智生意欲遣人往惹馬而云遣往堆壠後彼自願往惹馬集論中說誑者詐現不實功德諂者隱飾自身過患癸二受學能不為患四白法初白法者境者謂凡諸有情事者謂於彼所命或戲笑斷除明知故妄如是則能於親教及規範師殊勝境前不以虛妄欺惑第二白法境者謂諸有情事者謂住無所欺誑增上意樂心正直住此能對治第四黑法第三白法境者一切菩薩事者生起似大師想於四方所宣揚菩薩真實功德夏日瓦云我輩須修相似微善增長相無毀滅相多謂由瞋恚訾毀破壞菩薩伴友而致窮盡故能斷此及破壞菩薩集論說依於補特伽羅所生損害悉不得生然於何處有菩薩不能得知如迦葉請問經云普於有情生大師想修清淨相讚揚功德謂有聽者時至非說不往四方宣揚便成過失此能對治第三黑法第四白法境者謂我所成熟有情事者謂不樂小乘令其受取正等菩提此是僅就自身所化須行大乘若是所化不起此心並無過咎非所能故由此能斷第二黑法若由至心欲令他等獲究竟樂定不令他而有極微憂惱以無令他憂惱之加行故獅子請問經云何故一切生不失菩提心夢中不捨棄醒時又云何答云於村或城市或隨所住境令正入菩提此心不棄捨此復斷除慢嫉慳三見他圓滿心生歡喜具此四法不捨大願此是曼殊寶利莊嚴國土經中所說寶積經云若於一切威儀道中修菩提心隨作何善均以菩提心為首於他生中亦永不捨如此心寶眾多人等應作如是觀所說極明辛三如有失壞還出方便謂除捨願心不捨有情心犯餘學處乃至未具菩薩律儀此無依於菩薩所犯罪僅違中類善性學處是成惡行應以四力而悔除之己三既發心已學行理趣分三庚一既發心已須學學處因相庚二宣說完滿智慧方便一分不能成佛庚三正釋修學學處次第今初如是發願心已若不修學施等學處雖如前引慈氏解脫經云有大德益然不修學菩薩學處心要則難成佛故當學行三摩地王經云是以當修心要此復云何童子若能正修心要無上菩提非難得故修次初篇亦云如是發心菩薩既知自未調伏不能伏他自於施等極善修學如無正修不得菩提所謂正修從受律儀學其學處庚二宣說完滿智慧方便一分不能成佛既已趣入成佛方便又此方便須無錯謬若於錯道幾許勵力終不生果如欲構乳而扯其角或道雖正而分不全縱然勵力亦無果實等同種子水土日光若缺其一不能發芽若爾何為圓滿無謬因緣耶如大日如來現証菩提經云秘密主一切智智者從大悲根生從菩提心因生是方便所達究竟此中大悲前已解釋菩提心者謂有世俗勝義二種菩提心之分方便者謂施等圓滿此是蓮花戒大師所說或有一類於如是道顛倒分別如支那和尚等云凡是分別况惡分別固何須說即善分別亦能繫縛生死其所得果不出生死金索草索同是繫縛烏雲白雲均障虛空黑白犬咬均生痛苦是故唯有無分別住是成佛道布施持戒等者是為未能正修如是了義愚夫而說若已獲得如是了義而仍修彼行如王降為民得象求跡和尚於此引八十種讚歎無分別經証成其說此說一切方便分皆非真實成佛之道是大毀損以於聖教心藏所謂無我破除別觀察慧所抉擇故亦遠離勝義理趣蓮花戒大師於此業以清淨教理善為破除宏揚如來所愛善道現時仍有輕毀行品持戒等事修道之時捨棄此等宛如和尚所教而修又有一類除不輕毀方便行分知見相同更有一類捨別觀察智尋求真實全不起念許和尚法而為善哉此等均是不了修習空性法品縱行許空若云善修空性者唯當修空不須修習世俗行品此與一切聖教相違且亦違越正理之道以諸大乘者所當成辦是不住湼槃其能不住生死者是由通達真實義慧依於勝義道次甚深之道智慧資糧所謂慧分等之所成辦故其能不住寂滅者是由了悟盡所有慧俗諦道次廣大之道福德資糧方便分等之所成辦故如是亦如秘密不可思議經云智慧資糧者謂能斷盡一切煩惱福德資糧者是能長養一切有情薄伽梵以是因緣菩薩摩訶薩當勤修習福慧資糧說無垢稱經亦云何為菩薩繫縛解脫方便未攝慧為繫縛方便所攝慧為解脫慧所不攝方便為縛慧所能攝方便為脫伽耶經亦云菩薩道畧有二種何等為二方便智慧此等要義道燈論亦云若離般若行不能斷二障無餘能斷除煩惱所知障當修般若行常與方便俱離方便般若離般若方便何故名纏縛此二不能斷又云除去般若度施等波羅密一切善資糧佛說為方便凡修方便者並修般若行菩提能速得非僅修無我於蘊界處等能現証無生了自性本空此謂智慧度又寶頂經云是須修學圓滿一切施等方便分具一切種最勝空性攝研磨經云若諸菩薩為証菩提而修六度然諸愚夫作如是說菩薩唯應修學般若波羅密多何須餘等波羅密多此是毀壞意念又諸愚夫作如是說唯以一法而証菩提謂以空法此等均是未了修行設作是念修施等行是未獲得堅固空解若有空解即此便足此亦非理若如是者則証得初地等菩薩尤其特於無分別智獲得自在之八地菩薩不須修行十地經云於十地中雖每一地於施等行各各增上然於餘行非不起修故一一地中皆說修六度或修十度尤其証得八地時滅盡一切煩惱安住息滅一切戲論勝義境界諸佛於彼作是勸云唯達空性不能成佛聲聞獨覺亦能得故當觀我身智慧剎土等此等無量我之力等汝亦非有故當精進又當思惟未能息滅有情種種煩惱之所逼惱忍亦不當棄捨八地菩薩尚須如是學行餘無論矣密咒無上瑜伽部份與此雖有差異總之咒乘及波羅密多乘於無上菩提發心及學六度行同是共道如前已釋若作是說我并非說不須施等是於無所思中完具施等不著能施所施施物完滿無緣施如是色攝餘等經中亦說一一度中攝六六故若僅由此便為圓足則諸外道心一境性等持時中亦當具足一切波羅密多不躭著故特如十地經中說聲聞獨覺通達法性無分別時應成大乘包攝一切菩薩行故若以經說一一度中統攝六六便為完足則供曼陀羅中具牛糞水即是施亦說色攝六種應唯修此故見所攝行方便所攝慧者譬如母喪愛子憂傷所逼與他人等正言說時任起何心因憂傷力雖未暫捨然非一切心均是憂慮如是証得空性慧若勢力猛利則於佈施禮拜旋繞等時緣此諸心雖非証空然與証空勢力相屬而轉并不相違如初時起修若菩提心勢猛為先入空定時其菩提心雖非現有此所攝持亦不相違方便智慧不離之理當知亦爾又經說福德資糧果是生死中身體受用長壽等事亦莫誤解此是說若是方便智慧二者相離雖則如是若是二者互攝極能為証得解脫一切智因如寶鬘論云總大王色身從福德因生教証無邊又汝有時說生死過患及一切煩惱是惡趣之因此亦能成佛之因有時又說能為善趣因之佈施持戒等善僅為生死因不為菩提因是為令心正住而說又如經說正著施等是為魔業三蘊經說墮所緣故而行佈施由執戒勝而護戒等如是一切皆當懺悔梵問經云盡其所有一切觀擇皆是分別全無分別即是菩提此亦不能誤解初經說義是於二我顛倒執著所起施等不清淨故說為魔業非說施等即是魔業若不爾者說墮所緣而行佈施則不須說墮所緣故應當總說一切施等當悔然未作如是說故修次後篇於此有最切要之回答若於此倒解則一切行類均為補特伽羅及法我相執許為有相故又若念捨此物之捨心及念防護惡行之防護心如是等類諸善分別均是執著三輪之法我執則諸已得法無我見者如瞋慢等一切種相理合斷除不應習近又念此念彼一切皆是三輪分別法我執者則思善知識功德暇滿義大念死無常惡趣諸苦皈依三寶從如是業生如是果慈悲菩提心行行心學處一切學處均思此為此此從此生思維此中有是功德過患而引定解於如是等增長定解當是漸增法我執又於法無我增長定解彼道定解漸趣微弱見行二類違如寒熱是於二類猛利垣常定解之處全未生起故如果位安立法身為所應得及立色身為所應得二無相違於如是道時二我相執所緣雖微塵許戲論永離引生定解此此此生此中有是功德過患引生定解二俱無違此復依於因位正見抉擇二諦理趣故以教理抉擇生死涅槃諸法於自本性少許自性無故立勝義量及因果法各各决定無少顛倒安立因果名言之量此二相互何能說為能損所損實為彼此助伴若獲定解其後斯為能証二諦義是為能入獲得聖教各數第三經義當說經時正是觀擇生等之時故說施等真實無生言分別者唯是分別假立非說施等不當習近而予棄捨此乃修次後篇所說又說不可單修一邊集經論亦云若諸菩薩離善巧方便不應勤修甚深法性秘密不可思議經亦云善男子如火從因燃無因則熄如是從所緣境心乃熾然若無所緣心當息滅此善巧方便菩薩般若波羅密多徧清淨故亦了所緣息滅於諸善根不滅所緣於諸煩惱不生所緣安立波羅密多所緣空性所緣亦別觀察於諸有情亦以大悲心觀緣此中說有所緣說無所緣二種理趣須善分辨是以煩惱及執相縛應當解除學處之索應當堅繫二罪俱毀一切善業不當壞滅防護學處與相執縛二者非一護戒弛散與我執縛鬆弛二亦不等故毀滅與自脫等義當善明辦蓮花戒阿闍黎所破不作意理趣非是破除諸法實相抉擇正見既抉擇已不起任何作意專緣一境而修是破其見於法實相既無抉擇又不分別如如而住謂能成辦所修空性如前所說密咒雖與波羅密多乘二所共同然此二者是否同以別觀察智抉擇而修理趣如何下當解釋庚三正釋修學學處次第分二辛一於總大乘學習理趣辛二於別金剛乘學習理趣初中分三壬一淨修欲學菩薩學處壬二受持菩薩律儀壬三如何正學理趣今初律咒二種若先未受各各律儀不能聽聞諸等學處此不同彼先行善知所有學處淨相續已後樂受持乃可授與律儀故能善知諸等學處作為意境并於學處至心愛樂欲修學已再受律儀極為堅固此為最妙方便壬二受持菩薩律儀戒品釋中最初如何正受道理從此無間於根本罪及惡作罪防護道理設有毀犯還出道理已詳抉擇受律儀前先須參閱如彼而知壬三如何正學理趣分三癸一何所學處癸二其中能攝諸種學處理趣癸三於此如何學習次等今初詳細分別雖無邊際若以類攝六波羅密盡攝菩薩一切應學六波羅密者總攝一切菩薩道之扼要大搵陀南癸二其中能攝諸種學處理趣分二子一正義數量决定子二兼說位次决定今初佛薄伽梵畧說六度搵陀南最勝佛子如佛密意而為開解解釋如是因相扼要引發定智即此數量决定理趣意若於此獲得定解則執修持六度是勝教授此中有六觀待善趣生數量决定者凡圓滿菩提廣大行者必經多生此復進道若無圓滿德相之身如現在身但有少分縱勤修習亦難增進故須圓滿一切身德又須具足所受用財自受用身共受用伴凡作業悉皆成辦等四種圓滿又唯此等圓滿亦多變為煩惱之緣應不為煩惱所轉不僅如此并於取捨處所無倒而轉善能分辦違滅所緣若不爾者猶如蘆葦水蕉結果即枯騾不育嗣即因圓滿速隕沒故若有智慧而知此是往昔妙業之果更勤修因令作增長若無智慧受盡前果不增新因當受後苦以此為首是故他生生起六事既非無因亦非不平等因其隨順因如其次第定為六度道份受用等即是現前善趣生身圓滿等究竟善身唯佛地有如莊嚴經論云身財及眷屬事業圓滿生恆不隨惑轉諸事無顛倒觀待引發二利數量决定者以如是身學菩薩行菩薩事業唯有二種謂能成辦自他義利其修利他先須以財而作饒益此中若作損惱有情施事則無功用善遮損他及其所依義利極大故須尸羅欲究竟此不忍他所惱害報一報多難以淨戒故必極忍他所損惱由不報復能免眾多他所造罪他若信樂而令行善是大利他自利者謂以慧力得解脫樂若是其心散亂不能得此故以靜慮等持其心令於所緣堪能如欲而住若有懈怠不能生起故須晝夜精勤奮發無有勞倦此為彼等之因故修二利决定於六度如云勤奮利有情修捨不害忍住脫俱根本一切自利行此中非利他一切種言住及解脫者心住所緣是靜慮行跡解脫生死是般若行跡若能明辨則止觀不致混淆觀待成辦圓滿利他一切種數决定者先以財施除其貧乏次於一切有情不僅無所損惱且忍他所惱害為他助伴勤奮無厭依於禪定以神通等調攝其心堪為法器次依智慧善釋抉疑能解脫故决於六度如云不貪及不害忍害事無厭令喜善說故利他即自利觀待能攝一切大乘數决定者謂不貪著已得受用且不希求未得財物全無顧戀有是則能守護學處受戒敬戒依於情及非情所生眾苦能忍不厭修作善事欣喜無厭止觀瑜伽無分別修由此六事盡攝一切能趣大乘彼由六度次第引發無須更多如云不愛樂受用極敬二無厭瑜伽無分別攝一切大乘依一切道或方便數决定者謂於已得受用之境無貪著道或方便者謂行佈施能離貪故諸未得境為得彼故功能散亂防護方便謂持淨戒苾蒭律儀一切事業邊際散亂悉不生故不捨有情方便謂能忍辱意不生起一切能作惱害苦故增長善法方便謂之精進由能精進善法增長淨冶罪障方便謂後二度禪定對治煩惱障般若能治所知障故故六度决定如云不貪諸境道得彼防散亂增不捨有情餘淨治二障觀待三學數决定者戒學自性即是戒度此要有施不顧財物乃能正受是戒資糧既正受已任由他辱而不辱他忍耐守護是戒眷屬禪定是心學般若是慧學精進徧通三學所攝故六度决定如云依三學增上故佛說六度初學攝前三後二攝後二一通三分攝如是當以何等殊勝身圓滿何等自他義利安住何乘具足幾種方便之相修何學處能圓滿能攝受如是身利大乘方便及諸學處當知即是六度總攝一切菩薩修行精要大搵柁南乃至未獲定解時中是當思維子二兼說位次决定分三丑一生起次第丑二勝劣次第丑三粗細次第今初謂不顧財物離貪而施則能受戒若具防護惡行淨足則能忍惱害既有堅忍不厭難行迢緣希少故能精進晝夜精勤心住善緣是生正定若心定者乃能如實通達真實丑二勝劣次第謂前前下劣後後殊勝丑三粗細次第前較後者易行易作故相粗顯後較前者難行難作故相微細莊嚴經論云依前而生後住勝住劣故粗相細相故說如是次第癸三於此如何學習次第分二子一於總行學習道理子二特於後二度學習道理初中分二丑一修學六度能成熟自佛法丑二修學四攝能成熟他相續初中分六寅一佈施寅二持戒寅三忍辱寅四精進寅五禪定寅六智慧初又分三卯一佈施自性卯二佈施差別卯三相續行理今初謂善捨思及此等起身語業此思即是身語施正行時思圓滿施度不必觀待於他捨所施財亦不觀待損除眾生所有貧窮是壞慳貪執著即施捨果報亦至心捨他由修此心到極圓滿則為佈施波羅密多卯二佈施差別分二辰一觀待各各身異辰二施本性異今初總之財施唯是在家菩薩所修出家菩薩當行法施不行財施此是菩薩別解脫戒經所說集學論說此中密意是為聞思修等障碍故遮出家積聚財物而行佈施若不妨害自善所作是由先福德力而多所得是須財施夏日瓦云我不為汝說施功德而說執持過患此謂出家人辛勤追求積聚財物而行佈施是於戒體多生瘡疣不樂之語辰二施本性異施性異中法施者謂無倒宣說正法如理教誨工巧等明世間無罪事業邊際令受學處無畏施者謂從國王盜賊人中怖畏獅子虎等非人怖畏水火等大種怖畏普作救護財施者謂以財物施與他人卯三相續行理唯是無餘斷除身財慳悋猶非佈施波羅密多慳是貪分二乘羅漢并其種子亦能無餘斷除故是以施障不唯破除慳執應由至心發心施捨一切所有利益他等故須修習守積過患惠施利益此中初者如月灯經說身不潔淨生命飄搖如懸崖水身命俱是隨業所轉自無自在如夢如幻觀其虛妄滅除貪著若不爾者為貪所制造大罪惡當墮惡趣次如集學論云如是我身心一一剎那滅若以無常身垢穢常流注得常淨菩提豈非得無價正生起理趣如入行論云身及諸受用三世一切善為利諸有情故當無悋施謂身財善根三法為所緣境數數修習思維惠施一切有情現在力弱勝解未熟意樂雖能將身施給有情然未能實施自身血肉此若不修能捨意樂後亦不能能捨身命集學論云現在雖忍而不能施捨身命故從現在當修意樂集學論又說如是至心於諸有情所捨衣食及房舍等若受用時當作是念為利他故受用此等若忘此心愛著自利是染違犯若無愛著或忘安住攀緣利益一切有情之想或貪利樂餘一切有情非染違犯於己施他作他物想為自受用成不與取若價夠足犯別解脫他勝處罪若謂受用他有情物作利他事由作是念而受用者悉無違犯犯他勝理其密意者謂於人趣至心廻施他亦了知執我現前作他物想自利而取若價夠足可成他勝瑜伽師地論云復次至心清淨意變無量種種所施之法施給有情信解如是信解行者福德微時可以增長無量福德此亦菩薩慧施故學施波羅密多時亦當兼具六波羅密多若如是修功能極大如行法施時防止聲聞獨覺作意是名持戒於種智法信行堪忍忍恕他罵為令法施倍復增長發起欲樂是名精進心專一境不雜劣乘廻向此善於大菩提是名禪定了知所施能施受者悉如幻化是名般若是名六足寅二持戒分三卯一持戒自性卯二持戒差別卯三相續行理今初從損害他及其根本令心厭捨此名持戒此以防護淨戒為上首由修此心增進圓滿為戒波羅密多非由徧離餘外有情損惱建立此名入行論云由得能斷心說名尸羅度卯二持戒差別分三辰一律儀戒辰二攝善法戒辰三饒益有情戒今初此有二種若以等起說即是斷除十不善之十斷若以自性說即是斷除七種不善之身語七種斷菩薩地說七眾別解脫律儀說為菩薩相續律儀戒者是說若以具足別解脫律儀而住菩薩律儀者若在家品或出家品所有真實別解脫律儀及諸共同能斷律儀是律儀戒若不堪為別解脫律儀之身而具菩薩律儀者謂等同別解脫所斷自性罪及遮罪隨其所應能斷律儀是律儀戒應知菩薩相續之別解脫律儀雖是菩薩相續律儀戒但非真正菩薩戒餘等是與菩薩律儀根本和合而有辰二攝善法戒謂緣自相續六度等善未生令生已生不失令倍增長辰三饒益有情戒謂從戒門如其所應引發有情此生後世無罪義利卯三相續行理如是能令尸羅清淨依賴於諸進止之處如制行持又此隨逐猛利堅固欲守護心故當久修未護過失善護勝利而令發起欲護之心此於中士道時業已解釋如攝波羅密多論云毀戒不能辦自利豈有勢力而利他故勸善修利他者於此緩慢非應理又云尸羅能獲殊勝道與諸悲性平等修清淨勝智以為性離過第一莊嚴具徧薰三界悅意香塗香不違出家眾行相雖同若具戒此於人中最超勝又由依此能令相續展轉增盛與諸菩薩大悲性者共同學處永斷一切惡行種子得淨妙智餘等莊飾不宜老幼著戴尸羅莊嚴老少咸宜若具足者徧生歡喜故為最勝妙飾餘等香味順風則散逆風則止是有方域尸羅香味徧薰十方栴檀等香雖除炎熱有違出家除煩惱熱塗香無違出家出家之相雖同具戒寶者勝出餘等即前論云未經言宣未聚積所須受用次第來無匹世間徧敬禮無貪無求得自在不可說為自親族除暴安良均未作曾未相識諸士夫禮彼具戒勝士夫足履吉祥諸塵土最勝頂戴所攝持徧為人天稽首禮故當善自思惟如是三聚戒中律儀戒者謂於真實別解脫戒或此共戒而正進止此於菩薩亦為初要若守護此亦能守護餘二若是於此不能守護亦於餘二不能守護故若毀棄律儀戒者名毀菩薩一切律儀此為攝抉擇分所說是故若執別解脫律是聲聞律棄捨此所開遮等制而說另須修學菩薩學處是來了知菩薩學處所有扼要以曾多次宣說律儀戒者是後二種律儀所依處故律儀戒之最主要者是斷性罪攝諸性罪過患重者厥為斷除十種不善雖等起心莫令現起攝波羅密多論云不應失此十業道是生善趣解脫路住此思能利眾生意樂殊勝定有果應當善護身語意總之佛說為尸羅此為攝盡尸羅本故於此等應善修總之以此為本於自所持戒學數數修習防護心等是為持戒所謂具足六波羅密者自住戒已亦能將他安住尸羅是尸羅施餘如前說寅三忍辱分三卯一忍辱自性卯二忍辱差別卯三相續行理今初耐他怨害安然忍受自身所生眾苦且極安住於法勝解此相違品亦有三種謂瞋恚心怯弱心不信解無其樂欲圓滿忍辱波羅密者唯由自心滅除忿等修習圓滿非為觀待一切有情悉離暴惡卯二忍辱差別一他怨害忍二安受苦忍三思擇法忍卯三相續行理分二辰一修學忍辱利益辰二修學不忍過患今初謂當來世怨敵微少親不乖離身心快樂臨終無悔此身壞後當生天界應當思維如攝波羅密多論云若有棄捨利他心佛說忍為勝方便世間圓滿諸善事由忍救護忿過失是大力者妙莊嚴是難行者最勝力息害惱心野火雨現後生害忍能除諸大士夫忍辱鎧惡人粗語箭難透反成讚歎妙蓮華名稱花鬘極悅意忍為工巧成色身功德端嚴勝妙飾故當於此利益直至未得堅固猛利定解之時而勤修習辰二修學不忍過患如入行論云千刧所施集供養善逝等此一切善行一恚能摧毀此是如其聖勇尊者所作錄於入行論者曼殊室利遊戲經說摧毀百刧所集眾善須瞋何境者或說菩薩或說總境前者與入中論相符如云由瞋諸佛子百刧施戒善剎那能摧壞生恚之身者入中論釋說菩薩生瞋且壞善根况非菩薩而瞋菩薩境為菩薩隨知不知見可瞋相隨實不實悉如前說能壞善根總其能壞善根非是定須瞋恚菩薩集學論中引說一切有教云若諸苾蒭於髮爪塔生起淨心由諸支分而作敬禮覆此地下乃至金輪盡其中間所有沙數則此苾蒭應受千倍爾許轉輪王位乃至又此善根若於同梵行所而為瘡患為瘡患已消滅永盡故於枯樹且不應起損害之心况於有識之身壞善根義者少許智者作如是說摧毀先善速疾感果之功能令果久遠反而先感瞋等之果非後遇緣不生自果以世間道皆不能斷所斷之種定不能斷煩惱種故此理不定如諸異生以四對治力淨治不善所獲清淨雖非斷種然遇後緣其異熟果定不生故又加行道得忍頂時來斷邪見及惡趣因不善種子然遇緣時亦定不起邪見不生惡趣故又如前引諸業於生死隨生隨先熟一善不善業暫遮餘業成熟之位僅以此義不能立為壞善不善亦未說故又異熟暫遠不能立為壞善根義若不爾者應說一切有力不善業皆壞善根故故於此中清辨論師如前所說由四種力對治不善及由邪見損惱心二者毀壞善根俱如敗種雖遇助緣而不生芽縱會多緣亦不生果又如前說雖以四力對治所集罪業而至清淨而與上道生起遲緩無違有一類師雖壞布施護戒之果身財受用圓滿然不能壞修習能捨及能斷心作用等流後仍能生施戒善根又有一類雖壞施戒作用等流同類相續然未能壞發生圓滿身資財等又有一類如前所說若不嗔恚受記菩薩一刧所能圓滿道証由起嗔心自相續已有之道雖不棄捨然一刧中進道遲緩總之如淨不善非須盡淨一切作用故壞善根亦非壞盡一切作用此極重要唯應依據佛陀聖教及其正理而善思察故當善閱經教而予思擇如是能引極不可愛粗猛異熟及能滅除餘業所引最極可愛無量異熟是非現前可見之過患現法過患者意不調柔心不寂靜又先前所有喜樂失壞後不復得睡不安眠心不平等而住若嗔恚重雖先恩養忘恩反殺親眷厭捨雖以施攝亦不安撫又入行論云無如嗔恚惡無如忍難行故應種種理殷重修堪忍故應思維功德過患從多種門而修堪忍然能双具引大異熟及壞善根所有惡行除嗔而外當多謂誹謗因果之倒見及謗正法并於菩薩上師起輕蔑心及起我慢等如集學論應當了知如是修習能忍損害之理者謂先觀察作及不作損害有無自在若有自在應不起害然起損害欲者是由宿習煩惱種子境界現前非理作意因緣和合由此復起損害加行由此加行生他苦故此補特伽羅無少主宰以他亦隨煩惱自在為煩惱使而隨轉故若他自己全無自在為他所使作損害者亦不應瞋譬如有人中魔為魔所使於來解救饒益我者反作損害起捶等行應作是念此為魔使使無主宰故如是行毫不起嗔仍勤努力令離魔惱如是菩薩亦應如是行如四百論云嗔雖由魔使醫生不動惱能仁見煩惱非惑纏眾生月稱論師亦云此非有情過此是煩惱咎智者善觀已不瞋諸有情復次由作損害感受所生苦者是受先所集積惡業之果直至受盡其所造業若是於此修忍不再新造感受後苦之因若起嗔恚業力增長當受大苦如為醫治重病當忍針灸等方便為滅大苦而忍小苦極為應理修習忍受苦報理趣者若已生苦有可治者是則其意無須不喜若不可治縱不歡喜亦無利益非但無益且有過患若過嬌愛雖極微苦亦極難忍若不嬌愛苦雖極大亦能安忍心於苦類受持理趣者若無如是苦不起出離欲故有激勵其意解脫功德由苦逼迫壞諸高慢故有遣除傲慢功德若受猛烈苦時則知其苦從不善生不愛其果須止其因故有羞恥作惡功德由苦逼惱希求安樂若求安樂須修其因故有歡喜修善功德由比我心度餘有情知皆是苦於諸漂流生死海者能發悲愍於此等苦心能堅住數數修心如云學而不易成其事定無有由修忍小惱當忍大惱害若能執持受苦意樂堅甲雜諸小苦次第修習則忍苦力漸次增廣修習於法堅定心勝解忍者一清淨境者謂三寶二現証境者二無我三樂欲境者佛菩薩廣大神力四五取捨境者謂妙行惡行因及此等果六七所修境者謂當得義大菩提及得此方便菩提學道八聞思境者謂十二分教正法於此等理無所偏執而修信解寅四精進分三卯一精進自性卯二精進差別卯三相續行理今初菩薩地說為攝善法及利有情其心勇往直前及此所起三門動業卯二精進差別分三辰一被甲精進辰二攝善法精進辰三饒益有情精進今初謂諸菩薩於發精進加行之前其心勇邁被意樂甲雖以大百千俱胝倍數三無數刧為除一有情苦故唯住地獄乃至成佛我亦勇邁為圓滿菩提所作精進既發精進終不懈廢况時間較短其苦較微如是名被意樂甲辰二攝善法精進為修六度故修彼加行辰三饒益有情戒如前所說卯三相續行理勤修精進利益如莊嚴經論云善資粮中勤最勝謂依於此後得被精進現法樂住勝能得世出世成就精進能得三有財精進能集淨妙善精進能壞薩迦耶精進能滿勝菩提攝波羅密多論亦云若具無厭大精進無有不得不証者又云非人且喜勤利益能得一切三摩地晝夜諸時不空過功德資粮無缺劣勝過人法大義利如青蓮華欣向榮不精進過患者海慧請問經云凡懈怠者菩提最極遙遠遙遠凡懈怠者無有佈施乃至無有智慧凡懈怠者無利他行念住經亦云唯一煩惱根此即是懈怠誰有此懈怠即無一切法正修精進有二違緣一於善法雖見能修而不趣入二因怯弱謂我豈能如是修習初又分二一推延懈怠謂念後時有暇能修二雖非如是然由貪著覆蔽諸下劣事對治前者謂所得身速當壞滅命終之後當墮惡趣難得如此善巧人身修此云者前已解釋對治後者謂觀正法是能出生今後無邊喜樂之因無義談論掉等散亂是能失壞現前大義明見後世當生眾多苦處而正滅除第二怯弱亦分三種一於應得無邊佛功德謂我不能得二佈施手足等無量難行謂我不能行三生於輪廻處所須無數次爾時思及生死苦所惱害便爾怯弱初對治者往昔諸佛亦非先得甚深道是唯如我道漸昇進而得成佛佛薄伽梵尚且授記劣於我者能証菩提我若不捨精進何故不能証得菩提次對治者捨身等行若起難行想時不須即捨捨如給菜不難而捨如是當思後對治者菩薩已斷過惡不起過惡苦受之果堅固通達生死無有自性如幻如化故心無苦身心安樂增盛雖處生死無厭患義思此便能遮止怯弱正修精進依止順緣分四初勝解力者謂修善果能引取捨二種欲故二堅固力者未善觀察不當趣入既善觀察而趣入已即於彼事而至究竟三歡喜力者如童子貪著遊戲無有飽足如是精進亦復如是止息力者謂發精進身心疲勞須暫止息休息無間仍起精進如是依止順緣遮止違緣能令身心輕快猶如棉絮隨風而舞翻勝之間精進不懈正修此時當具六波羅密多者謂自住精進已令他安立精進此謂精進施餘如前說寅五禪定分三卯一禪定自性卯二禪定差別卯三相續行理今初住所緣善心一境性是名禪定卯二禪定差別就自性分有世出世間定就品類分有奢摩他毘鉢舍那及止觀双運三者就作業分有身心現法樂住定引發功德定饒益有情定初謂住定即能引生身心輕安所有靜慮二謂能引神通解脫遍處勝處等共諸聲聞所有功德三謂有定能成辦十一種饒益有情事卯三相續行理謂當思維修定德益及不修過患此於奢摩他時當廣釋之禪定當具六波羅密多者自住禪定亦安立他是禪定施餘如前說寅六智慧分三卯一智慧自性卯二智慧差別卯三相續行理今初慧謂於所觀事能簡擇法此處是說通達五明處等慧卯二智慧差別謂通達勝義慧通達世俗慧通達饒益有情慧初謂有從總相覺悟或由現量覺悟無我真實次謂善巧五明處慧三謂通達有情現法後法能引無罪義利卯三相續行理謂思維生起智慧德益及未生智慧過患初如般若百論云慧為見不見一切功德本為成辦此二故當攝受此菩薩將自血肉施給求者如同擷葯無慢平等分別變異此因智慧現証真實又由般若能見三有涅槃衰損為利他故修學尸羅能令戒淨由慧通達忍與不忍功德過失降伏其心邪行及苦無能劫奪由慧明辨所應精進事即勤修彼道而獲升進又住真實義所有靜慮最勝喜樂亦是由慧依止正理而能引發故淨施等前五波羅密多以慧為依又二功德雖似相違由具足慧則不相違譬如菩薩作轉輪王王四大洲然能不隨欲塵而轉是因具足慧臣僕力如是見諸有情極可悅意雖生猛利慈心然無少分貪欲雜染見有情苦雖生恒常猛利不忍大悲然無懈怠憂惱不樂善行又雖具足歡喜無量心於所緣全無散動又雖具足大平等捨然於有情所有義利剎那不捨均是由慧所成以慧力故滅除此等對等力障如讚應讚云不棄捨法性亦隨順世俗謂諸相縛所執之事雖微塵許亦不可得故於法性獲大定解而不棄捨且與世俗內外因緣各別生果所獲定解隨順無違又諸餘人認為極相違事由有慧力均無相違如前論云若開若遮者佛語或决定或則無决定均彼此無違謂大小乘經咒二者之中見有眾多開遮不同如以一人雙喻二事尋求無邊經論密意時諸無慧力者雖覺相違然諸智者實見無違亦因慧故無慧過患若離智慧施等五度不能清淨如攝波羅密多論云無慧求果報施體不能淨利他為勝施餘唯為增財又云無破闇慧光不能成淨戒多由無慧故尸羅成雜染又云慧倒心混濁不信住忍德不樂辦善惡如無道國王又云智士所讚揚無比最深細欲塵所不障直指心要道無慧不能往又云心不勤修慧其見不能見此中國王名稱如無道國主才正其位即失其德故須引發智慧并隨力能多閱起慧清淨經論如攝波羅密多論云寡聞疑旨不知修彼無多聞何所思故應勤求多聞因如思起修廣生慧至尊慈氏亦云三輪諸分別許為所知障慳等諸分別許為煩惱障除慧無其他能斷此二障聞為勝慧本故聞為第一集學論云應忍求多聞次當住山林精勤修等引諸先德亦云前所聞法浮現於心數數思維稱量觀察若忘其法當學守持其心則無助伴故上品修者是上法師修中品法者是中法師如其所修僅知彼法更須漸次增廣如是思維定解堅固則諸惡友唱說一切善不善思皆是分別悉應棄捨者經中無有是語善知識亦未宣說便能不隨他轉若無此解唯信是奉而無智慧見哭則哭見笑則笑猶如流水隨波逐流以他所說執為真實學般若時具足六度者謂自住般若令他亦自住般若是般若施餘如前說丑二修學四攝能成熟他相續分四寅一施攝寅二愛語攝寅三利行攝寅四同事攝今初施攝者如前諸度時中所說寅二愛語攝謂於所化開示諸度寅三利行攝謂如其教義令所化機如實起行或令正受寅四同事攝謂教他修自亦應修與他同事如莊嚴經論云施同示勸入自亦隨修等是許愛樂語利行及同事何故定為四攝耶為攝受眷屬令修善行故首須令他歡喜此亦先施以財饒益其身既歡喜已引入於道首須令知如何應修故以愛語宣說正法除其無知斷其疑惑令其無倒受持正理既了知已由其利行令修善行自若不修而為他說應取應捨彼不信受反作是難自且不修何以教他汝今當須為他所訓修則不爾若自實修教我修者他亦自修我若修此必獲利樂未修新修已修不退故須同事佛說此為成辦一切眾生義利賢妙方便故攝眷屬應須依此如云諸攝眷屬者應正依此理能成一切義讚為妙方便又此根本後得時經如何修者如尊者云菩薩廣大行六波羅密等根本後得行堅修資粮道謂初業菩薩受菩薩戒住資粮道根本後得皆不出六波羅密多故六度中有是根本定時所修有者是於後得時修謂禪定自性止及慧度自性觀之一分是根本定時修前三波羅密多及禪定般若一分是後得時修精進俱通根本後得忍中一分定思深法根本定時亦修如尊者云根本定起時徧觀一切法修幻等八喻後分別能淨方便學為主正根本定時止觀分平等應常時修習若是未習如是希有難行聞而憂惱應念菩薩於最初時亦不能行然由先所了知所作願境漸修後可不得功力可任運轉故其串習極為重要若見不能正行即便放棄全不修心是使淨道更為遙遠如無邊功法讚云凡所聞法為令世間起怖畏世尊於此亦經久遠未起行佛於此等漸次串習成任運故諸功德不修難增長是故受持菩薩律儀者無有不學方便諸行諸有未受行心儀軌者亦當勵力修求學心若於諸行喜樂增盛而受律儀則極堅固故當勵力茲已釋竟上士道次中淨修願心及學菩薩行總分道次
