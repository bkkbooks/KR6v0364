body:
  text: 黃教祖師宗喀巴著邢肅芝譯敬禮一切具大悲心者殊勝至尊足敬禮無憂自在佛殊勝當來彌勒佛一切佛父文殊智教証龍樹無著前為令有情易了知甚深廣大見與行引導菩提道次第由畧攝理此中說此中攝一切殊勝佛語扼要并攝龍樹無著二大車之道軌到一切智地殊勝士夫法門三士夫一切修行次第至於如何以菩提道次第之門引導具根性者到達佛地是為當說之法要如迦濕彌羅諸善巧大師所許說法之前顯三殊勝一造論者殊勝二法之殊勝三說者聽者應如何作業之殊勝最後正說引導菩提道次故分四科甲一為示法源尊貴故說造論者殊勝甲二為對教授生起恭敬故說法之殊勝甲三具二殊勝已說者聽者應如何作業甲四正說如何引導弟子次第今初總說此論教授是至尊彌勒現觀莊嚴論別說此論則為菩提道燈論故彼造論者即此造論者亦即世所通稱大阿闍黎庇邦噶拉喜卡札那另名具德阿提沙尊者是也此中分三乙一種性圓滿乙二得功德身乙三作聖教事業今初大譯師讚云東薩賀勝境彼中有大城謂次第聚落中有大王宮宮殿極廣大名為有金幢受用極圓滿似中國國王國王具善德后妃名光耀父母有三子長子蓮花藏次月藏德藏太子蓮花藏有五妃九子長子名福德當時大善巧稱打那西卡幼子德藏者比丘精進月次子月藏者是至尊上師乙二得功德身分二丙一得遍知聖教功德丙二得如理修証功德今初尊者於廿一歲前學習內外四共明處所有聲明因明醫方明工巧明無不善巧究竟特如大卓絨巴云十五歲時聽正理滴論一遍與外道戲論大論師辨論即能令之折服故聲名甚噪此後於黑山寺從現証瑜伽自在親見歡喜金剛已得金剛空行母授記之上師羅睺羅翅多請求圓滿灌頂取名慧密金剛尊者於廿九歲前親近甚多獲得成就之上師學習金剛乘法門故於經論教授能無餘善巧尊者有時或於自心作是思維我於密乘最為善巧即於夢中由諸空行母示以前所未見密乘經咒摧其慢心此後并於夢非夢中由諸上師本尊啟示若能出家於佛聖教及眾多有情必能生起廣大饒益為殷重依止故從大眾部上座大持戒者証得加行道真實空性住三摩地之堪布梵名喜那惹卡達尊者出家取名燃燈智此後直至卅一歲精習大小乘內明上下諸部尤其於一切有部大毘婆沙論在能飛聚落從上師當惹噶卡達聽聞十二年之久不僅根本四部經論極其善巧且於所有別部作受食等一切取捨微細部份亦能清晰不紊丙二得如理修証功德總一切如來教正法者是由三藏所攝証正法者是由三學所攝此中戒學者是定慧學等一切功德之所依於佛經中已數數讚歎初須戒學乃能証得一切功德故此中分三所謂具足殊勝別解脫戒者謂其正受苾蒭戒已如愛尾牛若尾一縷纏著於樹雖見獵人傷害其命寧捨其命護尾不斷如是雖於一輕學處尚寧捨命不犯况其所受重大學處故成大持戒上座次具足菩薩戒者因係修習以慈悲心為根本之菩提心教授雖多總之從依止金洲大師上溯至尊彌勒文殊乃至無著寂天一脈所傳殊勝教授常時修習則於自心能生由我愛他之菩提心且由願心引生行心受學菩薩廣大妙行學受隨行所有學處而臻善妙故能不違諸佛子等所有限制次具足金剛戒者成就自身現見本尊之生起次第及具金剛心圓滿次第三摩地之瑜伽行者主要尤其從獲三昧耶起永未超越以上所有受持三種戒學均從受持起隨行守護永未超越如有少許逾越亦以各各還出儀軌疾疾令淨具足定增上學分二共及不共共定者謂從止心中而得堪忍不共定者於生起次第極其堅住并於明禁行實修三至六年具足慧增上學分二共及不共共慧者謂得止觀双運之觀三摩地不共慧者謂得圓滿次第之殊勝三摩地乙三作聖教事業分二丙一於印度所作丙二於西藏所作今初尊者於金剛座大菩提宮曾經三次折服外道惡見護持聖教即於自部上下內道聖法剔除不明了者錯誤者以及可疑等惡垢故一切部均無偏見奉為頂嚴丙二於西藏所作尊者因譯師精進獅子及戒勝二大德前往印度多次迎請經大努力故允來藏又因菩提光之迎請而往上阿里因啟請樹立聖教故故攝一切經咒扼要引導修行次第而造菩提道灯論依此種種受持之門廣大聖教且卓錫阿里三年聶塘九年衛藏等地五年中統為具根性無餘開示經咒教授正法衰落者重新樹立有少許者令作增長有錯誤者予以更正務於聖教法離垢清淨又造論者光顯佛意復具三種圓滿因素一善巧五明處二所受持扼要教授應從正等正覺佛無間所傳承三要親見本尊面賜法要如是具足以上一因雖可造論如具三因則成甚奇希有圓滿法要尊者則三種因素均具焉此中所謂本尊隨持者如讚云具德喜金剛建立誓願王勇世間自在覺窩救度母親見得開示夢中或現住甚深及廣大常聞聽正法其中上師傳承有共及不共傳承二共謂波羅密多不共謂陀羅尼初又有見傳承及加行傳承二行傳承又分從慈氏所傳及從文殊所傳共稱三傳承陀羅尼亦分五軌傳承宗派傳承加持傳承教授傳承等等甚多關於正聽法之上師如讚云正依止上師寂靜及金洲覺賢吉祥智成就者極多遠傳承龍樹一脈相傳來甚深廣大教尊者咸具足此中正依止証得成就之上師統稱十二其他尚有甚多是故尊者能於佛說密意善能抉擇尊者并於克什米爾尼泊爾西藏等地極多不可思議弟子在印度境有大班赤達比第巴當阿噶拉麻地中觀獅子地藏蜜親五人功德相埒尊者在阿里有大譯師寶賢菩提光尊者那羅巴譯師在後藏者有噶格巴古孔巴藏南有穗勝座護善在康地有大瑜伽者棍巴瓦慧金剛確達登巴前藏有庫奪宗三人而於尊者聖教事業護持傳承不斷者則為救度母授記宗登巴勝生是也以上謹為畧說造論者功德若欲廣知可閱本傳甲二為對教授生起恭敬故說法之殊勝總說法者是指菩提道灯論尊者造論雖多而根本最圓滿者應是道灯因一攝經咒二種扼要二所宣正法圓滿三以調心次第為主要易於受持尤其於二大車之道軌於二大善巧上師教授能作莊嚴故勝其他法門又分四科此中分四乙一證得與一切聖教無違乙二顯示一切佛語教授乙三為易獲得佛語密意乙四甚大罪行自行消滅今初乙一證得與一切聖教無違如慈氏云如其所有一切佛語教授了解此中是一補特伽羅成佛廣大之道此復隨其所應有許道之主要有許道之支分因諸菩薩所欲求事是成世間義利所調伏者有三種種姓須學彼等各各之道故說三乘道者是菩薩所許能成義利之方便應知大乘道有共及不共二種共者諸劣乘法所說具有唯希自寂滅心不共乘者謂除共乘外不共乘等復次圓滿正等正覺佛者非盡少分過失類圓滿少分功德類是盡一切過失圓滿一切功德能成辦此所有大乘能遮止無邊過失生起無邊功德故大乘道必攝一切他乘所有斷証功德是故一切佛語皆攝入成佛大乘道之支分中僅盡過失品不圓滿功德品佛語無故凡是大乘者無不成故若作是念波羅密多乘雖是如此金剛乘則非如此亦不應理雖金剛乘與般若乘施等無量差別法門學處不同但加行發心之依止身亦與行六度之依止身同故不相違金剛頂經云縱為活命故不捨菩提心又說六波羅密多畢竟不應捨其他密乘經論所說亦多甚多無上瑜伽曼陀羅儀軌亦說共及不共二種三昧耶兩須受持前者即係菩薩三昧耶也敦巴上師亦云能知一切聖教由四道所挈此句應作殷重觀察乙二顯示一切佛語教授若以諸大經論唯講說法其中無有修持扼要另有精要教授遂於正法執有別別講修二種此則對於無垢經續及密意論藏作生恭敬之障碍說此等中不顯內義唯是外解如所堅執應知是集謗法罪障諸希解脫者應自思維諸大經論即是無欺殊勝教授惜因智慧低弱僅依於彼經論有無殊勝教授不能决定實則除此無餘仍應依止殊勝佛經而求决定是故教授須內尋求不應執著經論唯是斷除外執上師教授乃是開示內義如大瑜伽行者菩提寶云言悟入教授者非說僅於量如掌許一小函卷而得定解是說了解一切至言皆是教授覺窩弟子貢巴仁青亦云阿提沙尊者教授能於一座法中清淨三業今乃了解一切經論皆是教授登巴大師亦云聞甚多法而須別求作法道軌是為錯誤是故雖經長期學法聽法而不能知修法之道於欲修時從他尋求實為不了前說罪患言聖教者俱舍論云正法有二種教法及証法除教証外別無正法教正法者是抉擇修持理趣証正法者是如所抉擇依而起修此二是因果隨行例如跑馬先示跑處目的於是向彼而馳若馬不依跑處而去則成笑謔故修法者如從聞思而外抉擇則修不堪能修行次第末卷亦云何是由聞及思所生智慧之所通達即是由修生慧修所當修非向他求亦如先說跑處而後跑馬是故由此教授從依止善知識乃至止觀中間全攝一切佛語道之扼要如是須要捨修者即作捨修須要觀察修者由慧分別觀察修作為受持次第引導决定生起彼一切佛語教授從語宣示即是殊勝教授所有非法非正教授以及執著邪見無餘滅除乙三為易獲得佛語密意具足佛語密意之經論雖是殊勝教授然初發業全未學習補特伽羅若不依止正教授直趣彼等密意雖可以得亦必觀待時間極長辛勞極大若是依止似此上師教授則易証得乙四甚大罪行自行消滅如妙法蓮花經及真實品所說宣說一切佛語或實或權皆是開示成佛方便有不了者妄執一類為成佛方便一類為成佛障礙遂有好惡應不應理及大小乘之別而云菩薩於此須學或不須學執為棄捨而成謗法攝一切研磨經云謗法障者微細難知若是謗法罪惡極大三摩地王經云於此瞻部洲毀滅諸佛塔謗法者罪障仍是大於彼雖殺恒河沙相等阿羅漢謗法者罪障仍是大於彼總謗法障雖有多說前所開示實為重要故應猛力斷除如前所說若得决定能於罪行自行息滅此應參讀妙法蓮花經及真實品而尋求之此外其他謗法之門如研磨經宣說應當了知甲三具二殊勝已說者聽者應如何作業分三乙一聽者法軌乙二說者法軌乙三共同作業初又分三丙一思維聽法功德丙二於法及說法者生起敬仰丙三正聽法軌今初聞箋註云由聞知正法由聞滅罪障由聞斷非義由聞得湼槃由依止聞如其次第知取捨處既知已生起遮止罪行三昧耶不作非義事攀緣善法如所希求自心安住三摩地由慧學故証得自性無我斷除纏縛生死根本得大解脫佛降生經云若能由聞意起信即可堅住於善喜生起智慧去愚痴用我肉買亦應理聞是驅除愚痴灯賊所難偷至尊寶是殺無明利兵器方便教授之良伴是貧窮人救濟者不作損害苦趣葯摧毀過患勝勇軍亦是德稱之寶藏士大夫中勝士夫眾中善巧智者喜又云聞隨行故修持藏從凡夫城易解脫是故應從內心數數思維聞之功德最為重要丙二於法及說法者生起敬仰地藏經云專一信敬聽聞法不作嘲弄及褻瀆於說法者當供奉於彼生起似佛想此即是說視之如佛由供奉獅子寶座等利養恭敬斷除不敬菩薩地亦云傲慢是能傷害法及說法者應當遠離此二均說應作恭敬佛本生經亦云坐於極低處生被化德相由和悅眼看如飲詞甘露專一起恭敬極淨無垢意如病聽醫者敬信聽說法丙三正聽法軌分二丁一斷三種器過失丁二依止六想今初器口向下口雖向上而不潔淨雖已潔淨而因破漏天降甘霖不聚於內雖聚於內而因不潔不成飲料或已潔淨因破漏故不聚於內如是雖聞說法不入於耳雖入於耳而緣他境或為等起貪等自在或能於時暫遮煩惱而於詞義不能堅住健忘失壞統成為聞法障礙故須遠離彼等如何對治以上三者經云極善聽聞於意受持菩薩地亦說希求心專注心傾聽心調伏心由一切心從心諦聽丁二依止六想六想者一安立自如病者想二於說法者作大夫想三於佛聖教作如葯想四殷重受持作醫病想五於薄伽梵作勝士夫想六於法道軌作常時安住想今初入行論云通常病所困須遵醫師囑須知由貪等眾罪所常困故應了知生起長期難醫猛利病苦是由貪等煩惱長期纏縛噶麻巴尊者亦云不如理修是與修相違者無始以來因集聚三毒極大痼疾是大病根奈何吾人不知是病第二於說法者作大夫想者例如患有極大中風等病痛覓求良醫診治若得良醫生大歡喜如其所說皆願聽聞而作利敬應知於說法善知識亦應如是覓求既求得已永不捨棄如其所示如理而修而作利敬第三於佛聖教作如葯想者猶如病者極其珍惜醫者所配良葯於說法者亦應珍惜所說教授如所宣示見大殊勝數數努力不應由健忘故失壞於心第四殷重受持作醫病想者猶如醫生雖給病者良葯若是不食則不治病若於說法者所說教授不作受持則不能消滅貪等煩惱故應受持不受持者雖說無量數句不能受益猶如瘋癩斷手及足用葯太少不能療疾吾人從無始來而由猛利煩惱所縛僅能受持少許教授不能對治故欲圓滿一切道分應由能分別智慧觀察如瀑流相續不斷尋求如懺悔讚云心相愚蒙由來久長時期作病根依如瘋病者斷手足僅一帖葯何能醫故於自作病者想極重要者因若有此餘想亦生亦即是說若僅趨入名句聞是可成而不能成遣除煩惱教授之事亦如求醫而不食葯惟分析所配之葯不能解脫病苦三摩地王經亦云身當如是修僅詞豈能成唯誦葯名目能益病者否是故於此殷重則能生起除病之想所謂殷重者謂於善知識教授取捨處等能作受持此中須知所謂作者須先聞彼聞已如知而作堪能聞事依之受持是大扼要若不如是不作修持則於死時生起悔惱亦如模仿他人演戲又亦為欲得糖僅䑛蔗皮勸發增上意樂云我因失修今如何死如愚夫作憂愁墮極苦惱之深淵此是愛樂言說失又說如座演戲群眾中演唱他勇士功德本身殷重則失壞此是愛樂言說失又說甘蔗外皮無精要所喜甜味在內中僅食外皮既非糖糖味且不堪能得如是外皮說如彼味喻心於此中義若能因此斷言說常不放逸令思義第五於薄伽梵作勝士夫想者謂隨念世尊是說法者而生恭敬第六於法軌道作常住想者謂由聽聞如此正法心應思維我佛聖教若在世間長時安住豈不美耶復次若聽法者於說法時心不專一法為餘說不趣扼要是故聽者應須抉擇自心譬如若欲了知面貌有無污濁垢染對鏡照看則可除垢自身貪等過失由聞法故亦於法鏡顯現爾時亦了自心是有垢惱且於心中生起希求欲斷過失而修功德故須學法如本生經云罪行醜惡狀明現法明鏡心則生痛惱趣入正法邊如打薩布請月王子開示正法請問品云若諸菩薩心已了知是聽法器則為宣說正法總之應思維我為一切有情義利當得佛果須學得彼之因此是因須聽法故作聽法隨念聽法利益生極歡喜斷過失故生菩提心故故爾聽法乙二說者法軌分四丙一思維說法利益丙二於佛及法生起恭敬丙三由如何思及行而說丙四於何境可說及不可說之差別今初俱舍論云法施離煩惱如理說經等本釋云是故若諸顛倒宣說有煩惱心希求利養恭敬聲名等而宣說者是失壞自身諸大福德故清淨說法隨起極為重要如於無常一次曾未脩習不能說法勸發增上意樂云不為利敬不為財物之法施則於佈施中能生二類廿種德益勇猛續亦云若諸在家無量財施不如出家佛子一句法施福德更大丙二於佛及法生起恭敬如薄伽梵說大般若時自設座位等法者尚是諸佛所應恭敬之因故應於法起大恭敬及應隨念大師功德及其深恩起大恭敬丙三由如何思及行而說分二丁一思丁二行今初如慧海請問經說立五想自是醫生想正法是葯想聞法如病者想如來是殊勝士夫想法軌常住想復次應於眷屬修慈斷除恐他勝我懶惰所牽由常說法疲倦厭煩說他人過失自作讚歎慳吝佛法重視衣食財物受用應如是思我為令他得佛位故宣說福德亦即我之安樂受用丁二行應先沐浴著鮮淨衣選擇潔淨悅意處所設立法座坐於座已誦降魔咒如是在百尋以內魔及魔之眷屬均不能來縱然能來不能侵害次以舒顏具足聖教量因明量及譬喻等支分宣說了義經教丙四於何境可說及不可說之差別如調伏經云不作祈請即是未經祈請不可宣說若知已是法器堅住器內雖不祈請亦可宣說此是三摩地王經所許調伏經亦云餘一切有過失者乙三共同作業如是由諸說者聽者之善根以及善行等願當能清淨廣大增長且由如理聽聞故雖聞一次亦能决定生起如其所說一切利益又由聞者說者依止趣入扼要故不僅能淨所有於法及說法者一切前所集聚等業障即是一切新業亦能清淨又由說者聽者如理趣入扼要故能見說者教授有益相續自能於前聖教而作殷重於後上師所持教授一切師尊生極大殷重又於所示極大教授如不得决定又不作思維雖如何宣說甚深廣大法要而成如天降魔即彼正法反為趣入煩惱之伴是故說者聽者應按道軌諸具根性者應當精勤說聽一次乃至無量次如由首日趣入乃至十五之中不斷以上是為宣說教授殊勝前行甲四正說如何引導弟子次第分二乙一道之根本依止善知識法軌乙二依止後如何修心次第初又分二丙一生决定故扼要闡釋丙二行軌攝釋今初弟子相續中能生一分功德則少一分過失所有一切善樂之根本是尊勝知識故依止法軌最為初要此又分六丁一所依善知識因相丁二能依弟子因相丁三如何依止理趣丁四依止功德丁五不依止罪緣丁六攝以上義今初從諸經論雖有甚多宣說各各乘別然此中是說從三士夫道次第引導能引至大乘佛地之善知識也如莊嚴經論云善知調伏止近止勝功德勤教自在証得自性善巧說大悲為主斷厭倦是說善知識須具十法乃為弟子所依止此中是說自不能調而能調伏他人無有是處凡能調伏他人之上師必先能調伏自續或問須如何調伏者謂不如理修所謂証得功德乃是名目安立實於自續無益故須隨順聖教調伏相續理趣即是由决定三增上學而有調伏等三是調伏者即戒增上學也別解脫經云意馬難駕御必由銳釘轡即此別解脫常精進出離譬如戾馬馴馬師必由利轡始能制服根於逆境隨行趣入非義則如戾馬故應制伏且由數數精進趣入正義品類由戒學故自能約束意馬止者謂如是依止如所了知念念善行遮止罪行內心則能生起止三摩地近止者謂由依止心所堪忍之止於真實義生起分別觀察之慧學如是由此三學謹具調伏相續証功德是為不可仍須具足教功德所謂教自在者即是於三藏等聽聞極多善知識登巴大師云若說大乘上師作業須獲淵博了知然後於受持時能辨何利於聖教標的遵何方向成其義利故須聖教証得自性者即由殊勝慧學証法無我亦即現証真實義為主要受持否則如由教理証得亦可如是所具教証如與弟子平等或劣則為不可須具殊勝功德俱舍箋釋云依劣雖修當退失依平等者住平等如依尊勝成殊勝是故當依勝自者又說具戒及近止殊勝大智慧若依彼尊勝較尊勝尤勝頗窘瓦大師亦說聽諸大德傳記是於彼起增上我見四究竟大師亦說我於彼等熱振老叟而作攀緣故於殊勝功德起增上法見如是六法是自証功德餘是隨他所得功德此亦如論云諸佛非以水洗罪非以手除眾生苦非能贈他以自証是示法性令解脫所餘四法之善巧說者謂善巧引導次第所化心中生起義利而作對治悲者謂淨說法隨起過失不顧利益由悲心等而作開示布奪巴告俄金巴云離魔子任說幾許法要我曾未受讚歎善哉一切有情無不有痛苦者須恆作如是想具勤者堅住奮勉利他事業斷厭倦者數數宣說無厭忍受說法難行布奪巴大師又說三學悲心及証自性是五主要我之阿闍黎香尊亦說既不多聞又不忍受厭倦更無於諸恩德能作少許領會雖有前五能利益誰又說法善知識不善巧說縱於所說功德能如理作但因思維不了所說一切因不了故雖有前五何能利益眷屬似此因相全能圓滿因時間故甚為難得或過失多分或過失功德兩相等分統不應依應須依正殊勝功德故修解脫上師此是無間激勵根本凡諸能依上師不僅於此應當了知且須尋求具足因相而作精進凡諸所依弟子亦當於彼等應具因相而作激勵丁二能依弟子因相四百頌云中道具根求義利此是聽法者法器說者功德安立時聽者亦非不能成註釋云此是須具之法乃堪為聽者法器若能圓滿彼三則於說法者功德見其功德不見過失不僅此也諸聽者功德亦於彼補特伽羅見其功德不見過失若未圓滿法器諸因相雖說法善知識十德全具而因聽者有過失故趣入過失反於說者過失見為功德此中所謂中道者謂不墮一邊若墮一邊而為所障則不見功德不得善說要義如中觀精要云墮邊心苦惱法性現不証所謂墮邊者謂於自宗則貪於他宗則憎若是如此自續安立則須棄捨若如是思僅不墮邊即是中道然於善說正道以及罪道二種現前自心無力分別不堪為器故於彼二心須分辨又若雖能辨別猶如畫影聽法亦不堪為法器故須具足至大義利註釋云於法及說法者恭敬及安立二意加之為五此謂於聽法時為大義利思善安立於法及說法者安立大恭敬棄捨罪道堅住善道等四此四順緣是具根性棄捨違緣謂之中道爾後思察上師引導堪能之法於彼具不具足若是則修歡喜不具後當精勤具足之因丁三如何依止理趣如是如前所說由具法器者觀察上師因相具不具足若是已具因相當能獲得法因如是法因既能獲得則於總別圓滿教授善能引導善知識而作依止此中分二戊一心依止理戊二行依止理初又分二己一根本修信己二念恩起敬今初寶灯陀羅尼經云如生起信前行則可獲持一切功德而作增長此是由信功德未生者生生已安住并作增長十法經亦云凡引導出離信是殊勝乘故具根性者依止信隨行無信諸凡夫不生諸白法種子火所燒青芽如何萌是說從遮止隨行之門信是一切功德根本總之信仰三寶業果四諦等種類雖多此中是指信仰上師又如何觀察上師者金剛手灌頂經云秘密主弟子於阿闍黎應如何觀察如其觀察佛薄伽梵亦復如是諸大乘經及律儀藏亦如是說此說如是若知是佛則生功德心不生過失分別心於自上師亦復如是一切過失相全捨而生分別功德心灌頂經又云於師持功德不持過失邊功德能成就過失則反是若是觀察上師功德雖大但有少許過失則為自身獲得成就之障設過失雖大而不觀察過失唯從功德修信則為當得成就之因是故若是根本上師不論有無大小過失於彼斷除分別罪緣心否則則成障阻設有放逸者或由煩惱多於過失分別生起時應當奮勉懺悔若能如是修持雖有時見其過失心仍執持功德品類於信無碍譬如大尊者持中觀見而金洲大師則持實相唯識見從持見門雖有勝劣但總為大乘道次菩提心依彼而得故於金洲大師與諸上師則無比較勝劣之差己二念恩起敬十法經云應生如是想念我常飄流輪迴能作尋覓久為愚痴所蒙能擎昏夢沉淪有海深淵能作救護誤住罪惡道中能說善道三有牢獄所困能作解脫是為病苦久困良葯是能息滅貪等火燄普被雲兩華嚴經云我今說法善知識能示諸法功德藏遍說菩薩加行道從心思維到此中善知識等如我母喂哺功德之法乳菩提支分遍修習能滅一切過患相如葯能治老死苦如多施天降甘露如月圓滿白法廣如日光耀說寂滅與賊相伴心不亂雖如山高海似深極其艱險遍救護善財善思而來此菩薩能由自心生佛子又能証菩提此等我知佛讚歎由此善知到此中猶如救世大勇士普成依怙歸依處是我權勢安樂根故當恭敬善知識應當憶念以上頌音易其善財而誦自名戊二行依止理本師五十頌云此中多說須如何何為能令上師喜是為斷諸不悅者於彼觀察并精進成就是隨阿闍黎上師即是金剛持由諸世間妙供養當令上師遍歡喜總之是修喜悅不喜悅者應當精進斷除所謂修喜悅者由三門修供奉財物由身語恭敬如其教授而修莊嚴經論亦云依止善知識是從利養恭敬及修持之門此中初者如五十頌云供誓願本師妻子及生命當常時依止動產何須說又說能生一切佛常供即可成供養積福德得最勝成就二者謂洗身擦背以及病侍宣說師德等三者如其教授無違而修是主要者如本生經云報恩供養者是如其教而予奉行丁四依止功德依止善知識者是近佛位為諸佛所喜不虞匱乏不墮惡趣惡業及煩惱所難治伏不違菩提心行由如是憶念則功德資粮展轉增廣能成一切現前及究竟義利且由利敬善知識故所有須受惡趣業力牽引於此生中正現損害身心最微細分或夢境感受均能清淨故說映蔽供養一切諸佛等之善根功德此是最大丁五不依止罪緣若於善知識不如理依止則此生中眾魔所侵疾病所擾死後并須領受無量惡趣之苦如五十頌云何時於上師其心不動搖若由愚痴轉定受地獄苦誰說可驚怖能免此諸苦則唯阿闍黎故應如理住又如黑敵難釋上師品云雖聞一句頌若不認為師百生生犬類成食穢畜道復次諸功德未生者固不生已生者趣入失壞此為依止惡知識或罪伴故功德反為所障過失反而增長是故當斷不悅意所生一切相丁六攝以上義如是名謂上師瑜伽教授如前所說應須了知此亦不可僅是攀緣一次應從自心深處專一於所無誤引導善知識無間而作依止亦如卻卡瓦大師說依止上師時斷除疑懼若不了依止理趣以為空乏無益則應了知凡是此等依止善知識法輪是極殊勝畢竟告誡根本吾人以煩惱粗重不了依止善知識理趣或雖了知甚多不作故諸聽法者於上師前多起高舉且於內心難以生起懺悔律儀是則應當了知如前所說而作攀緣罪及功德若未生起如共所有如理依止應從肺腑懺悔罪障若能如此常時無間常在菩薩位則尋求善知識不知滿足猶如善財童子然丙一行軌攝釋分二丁一正修理趣丁二由二種修行理趣辨別如何修初又分二戊一時分正體如何作戊二未修中間如何作初又分三己一前行己二正行己三結行今初前行有六法是金洲大師傳記所說洒掃靜室安置佛像陳列供品莊嚴而不蕩動坐舒適座身背直立結伽趺座或半伽趺由此加行皈依發心當生决定自續混合如是思惟前面虛空安坐甚深見廣大行所傳承根本上師并有無量佛及菩薩聖者聲聞圓覺及部屬等集聚明顯現前并於所生道之相續集聚順緣資糧清淨逆緣障礙若無此二道極難生故須由能攝集聚清淨扼要七種支分相續修習此中頂禮支分所謂攝三門頂禮者盡所有等云云一頌謂攀緣十方三世一切諸佛從心深處三門敬禮又三門各別身敬禮者善行云云一頌謂攀緣總攝十方三世一切諸佛統於意境明顯現前自身變化如微塵沙數而作敬禮此亦是說由境等故生起信力善行遍起意敬禮者於一微塵上云云一頌謂於每一微塵上有與微塵量等諸佛安住其上四週菩薩所繞隨念彼等功德生起勝解語敬禮者讚歎彼等云云一頌謂若已盡讚歎諸境功德是諸不了者應於每一身變化無量頭又於每一頭變化無量舌由善妙音而作讚說此中音者即是讚頌彼之支分因者是舌海者無量詞句供奉有比供養者最勝花等云云一頌所謂最勝花者是諸天上人間殊勝花瓣鬘者是由種種花瓣串集為環此二是明一切天生及人為者鐃鈸者謂樂器有節奏抑揚等聲塗者謂香料混合塗抹勝蓋者謂尊勝傘蓋燈者謂酥酪等所生光燄以及寶光香者謂董香一種最勝服者謂上等衣裝勝香者謂由栴檀升起香味氣體水份等粉屑浮飾者謂香粉庫斗盛香布袋亦是用畵壇場采色粉末次第增添高廣等同須彌安設者謂如上說而後作種種通常陳飾莊嚴供奉無比供養者所有供養等云云一頌包括以前有比供養世間供此是由諸菩薩等諸大威力變化九善妙供為無比供最後二句謂前二未盡一切所當作者於頂禮供養等隨起善心及所緣境懺罪者謂貪等云云一頌從依三毒因而有所依身等三自性者謂由我所作此有若自作趣入他作見作隨喜總攝彼等一切者謂如其所有是從憶念彼等罪緣於前者悔於後者懺若從自心深處而作懺悔則於已前所作斷其增長於後者等斷其散布隨喜者十方佛云云一頌謂從憶念五補特伽羅彼善功德而修歡喜激勵轉法輪者凡諸十方云云等一頌謂於十方剎中雖現証得菩提佛相因得無碍智永不執取身亦如其數量由變化身說法而作激勵祈禱者出離生死云云一頌謂於十方剎中宣說出離生死等理趣為利一切有情生安樂故量等微塵劫數不般涅槃祈禱安住廻向支分者敬禮云云一頌謂由以上所列六支分善業所有一切善根與諸有情相共作為圓滿菩提之因猛利諄勵廻向永無盡期如是了知此等詞義專一心意漸漸如其所說修作則能受取無量福蘊是故由頂禮供養激勵廻向隨喜等五是集聚資糧懺悔是清淨罪障心於自善及他品類所修歡喜善能增長廻向能於集聚清淨及所增長少分善業而能增多又於暫生善果易消逝者永不消逝總於所集所淨所增長者能三不盡由是明顯攀緣而供曼札所有於善知識不恭敬等顛倒作意無邊遮止則恭敬善知識等無倒作意普遍易生所有內外一切障碍息滅請加持應猛利念誦多遍祈禱己二正行又分二庚一總修理趣庚二此中所修理趣今初此者修習如前所說之道於所緣善如其所欲將護其心是能堪忍此復若有執持從執持已而修所緣於自所欲即使修習如其次第修習爾許善所緣境不能隨轉因從最初成為惡習所有善行悉成過失是故最初將修於諸所緣數量次第應當决定次後如其决定而修次後發起猛利誓願謂如所决定者更無其餘故當具足憶念正知而修庚二此中修理起始思惟依止功德以及攀緣不依止罪等次應多起防護之心應不容納分別上師過失之心隨自所知而起思惟戒定等功德如是直至未能生起清淨信心不斷修習次後思惟如前經說經已利我或將利我一切恩德直至誠敬未生之中從心深處不斷修習己三結行所聚福善應從普賢行願及七十願等於現前及究竟願處等猛利憶念而作廻向如是於黎明午前午後黃昏四時而作修習此中初時若長心易沉掉若如此修難以治心故應時短次數當多如云欲修心長若作截止則於後次心欲趣入如若不爾見座位時即覺發嘔戊二未修中間如何作總說頂禮旋繞念誦等雖多而主要者是從勵力修已放捨中間若於所修緣相不依念知任其散怠則所生極小故於中間應閱佛經數數憶念則由多門集聚生起功德順緣資糧亦由多門而能清淨逆緣障碍當恆守獲自心受持一切根本戒學復應學習四種資糧而為各各引生止觀道之正因此中所謂攝護根門者謂從依止境根生六識已意識便於六可愛境及六種不可愛境生起貪嗔應當從彼守護不生正知而行者如入行論云現前身及心數數當觀察若唯彼所攝正知守護理謂身心等業若於境轉應知當作及不當作而行飲食知量者謂應斷除飲食太多或則太少以不防害善業適量而食此復應修攀緣貪愛飲食罪業而起思維此非煩惱饒益施主身中諸蟲現以財攝於當來世為法所攝又應思維為成辦一切有情義利而受飲食親友書亦云由思飲食似葯理并無貪嗔作近止既不是憍亦非慢非壯唯令身能住精勤輕醒瑜伽於眠息時如何作者親友書云具根性者於永晝夜間亦過初後分眠時亦不空無果眠時恒具足正念此說白晝及其夜間初後二分無論正修及未修時如所應作故行坐時應從五蓋淨修其心當具義利眠息徧行者是在修後不令空散此中身行道者謂於夜間三分中分當眠右脅而臥重叠左足於右足上如獅子臥憶念者謂憶念日間所修全分善業直至未熟睡之中隨念依止如是雖在睡時亦猶醒時能修三摩地等善行正知者謂由如是依止念時隨起煩惱即能了知斷除不取起身想者謂應思維僅此睡眠已應當起如是唯除正修之中不共修法之外所有前行正行結行中間行等諸應行者乃至觀中所修一切所緣行相皆如是行丁二由二種修行理趣辨別如何修莊嚴經論云此中依止聽聞如理作意從如理作意生起真實境智此說由聞而思由思生慧更從如理作意起修乃得生起現証真實義境現觀莊嚴論亦云抉擇分見道以及修道中常思維稱量及觀察修道此謂大乘聖者修道尚有數數思維稱量觀察集學論亦云以如是故身及受用福德相續不斷當修捨護淨長此說身及受用善根等三於一一中皆應當修捨護淨長四事修又有由別觀察智先觀察後修之觀察修以及不觀察唯專止於一境之止修二種然則云何於如何道是觀察修於如何道是為止修謂於善知識修習誠信及修暇滿義大難得死沒無常業果輪廻過患及菩提心於此等者須思擇修謂於此等令心猛利須恒常變改其意若無此者則不能滅此相違品類不敬等故能生起如是心者是唯依賴數數觀察思擇修故譬如貪境若多增益可愛之相則生猛利之貪又於仇敵若多思惟不悅意相則生猛利之嗔是故修習此等諸道境相明不明顯皆可然須心力猛利恒常故應觀察而修若心不能住一所緣於一所緣為令如欲堪能住故修止等時若數觀察住心不生是故爾時則須止修又有未明此理說凡博達者唯觀察修凡古薩黎應唯止修亦不應理以此各各均須二種故智者既須修習止等諸古薩黎更須於善知識修猛利誠信故由是若執由分別智數數觀察是聞思時而非修時亦不應理又有若執一切分別是相執故能障成佛此是未能分辨非理作意是實執分別如理作意乃正分別故有是過又有於此教授作如是說心於一境如其所欲如理安住是須修習不分別定者若於以前多觀察修是能障定生起亦不應理此如善巧匠人將諸金銀數數火燒數數水洗淨除所有一切垢穢成極柔輭運用堪能次作耳環諸莊嚴具如其所欲任運成辦如是於根本煩惱及諸惡行如在修習諸黑業果輪廻罪惡等已前時中所說應以觀慧數數修習彼等過患令心徧生熱惱或起厭離以是作意如火燒金令意背棄諸黑惡品淨此諸垢如在修習知識功德暇滿義大三寶功德白淨業果及菩提心等時中所說由觀察慧數數修習此等功德令心潤澤而成清淨以此作意如水洗金令心趣向諸白淨品愛樂歡喜以白善法潤澤其心如是成已隨所欲修若止若觀於彼屬意無大劬勞即能成辦如是觀修即是能成不分別定最勝方便亦如聖者無著云譬如巧匠及彼弟子於任何時欲淨金銀一切垢穢則於時時火燒水洗柔輭隨順現前堪能成辦彼彼妙莊嚴具如是巧匠及彼弟子隨所了知順彼工巧隨其所欲作成莊嚴如是瑜伽行者亦復如是於任何時令心不趣貪等垢穢而生厭離即能不趣障垢憂惱自心由於趣向愛樂善品而作歡喜是故瑜伽行者為令其心於止或觀加行修習即於彼彼極能隨順極能安住無動無轉如其所思一切義利皆能成辦復次令心堅固安住於一所緣所有違緣要有二種謂沉及掉是中若有猛利不斷能見三寶功德之心極易斷沉對治此者即是由見功德門中策舉其心定量諸師多宣說故若有不斷猛利能見無常苦等過患之心則易斷掉以掉舉者是貪分攝是散亂故能對治此是謂厭離故諸經論讚歎厭離乙二依止後如何修心次第分二丙一於有暇身勤取心要丙二如何攝取心要之理初又分三丁一正明暇滿丁二思其義大丁三思維難得初又分二戊一暇戊二滿今初如攝功德寶云由戒斷諸畜趣體及八無暇常得暇此說離八無暇謂之有暇八無暇者謂無四眾遊行邊地粗鄙喑啞斷肢缺耳等名根不全妄執無前後世無業果無三寶等名邪執見無佛出世無佛教此四是人中無暇又三惡趣等三及長壽天是非人無暇如親友書釋云所謂無想及無色天二中初者在第四靜慮廣果天中處於一分如聚落外阿蘭若處後者謂生無色之異生類八無暇論亦云常為欲事散亂諸欲界天者謂常壽天戊二滿分二己一五自圓滿己二五他圓滿今初人生中國根具業無倒信處所謂生中國者謂生有四眾遊行處根具者謂非喑啞斷肢眼等皆悉圓具業無倒者謂不自作或教他作無間罪信處者謂信律藏是世出世一切善法所生處律藏者包攝三藏此五屬於自身所攝是修法助緣故名自圓滿己二五他圓滿佛生說正法常住隨教轉他故具悲心言佛出世或降生者謂經三無數刧集積資粮現証圓滿正等正覺說正法者謂佛自說或聲聞說聖教常住者謂從成佛說法乃至未般湼槃中間勝義正法能現修証永不壞滅法住隨教轉者謂由如是証正法諸眾生能令了知有力當証而如所証於聖教隨轉他故具悲心者謂有施者及諸施者給法衣等此五是他身所有亦是修法助緣故名他圓滿丁二思其義大為畢竟安樂故若未修習清淨正法僅為命存以來引樂除苦而劬勞者旁生亦有故雖生善趣等同旁生故修大乘道者須有如前所說之身如弟子書云如來道所依能引導眾生是由人身得心力廣大故道非天非龍亦非非天得非金翅持明非腹行似人又有欲天昔人世時由其修道習氣深厚堪為新証見諦之身然上界身則定無新得聖道者如前所說欲天亦多成無暇處故於最初修道之身人為第一此復北俱盧洲人不堪為諸律儀所依故讚三洲之身其中尤以南瞻部洲身最為稱讚是故應當作是思維我今獲得如是善妙人身何令空無果利我若令其空無果利者更有何事較此自欺較此愚蒙而為重大既經多刧輪轉諸惡趣等無暇之處而今一次幸脫如仍空耗仍還彼處者則我實無心志如為明咒之所蒙蔽故應由此等門數數修習如入行論云既得有暇身我若不修善更無欺過此亦無愚過此又說難得利益處如何偶然得若我具知識若被牽地獄則如咒所蒙是我心全失何蒙我不知自心有何障如是觀察畢竟不僅義大即是觀察現前亦為善趣身受用眷屬圓滿之因如以此身而修佈施持戒忍等能易成辦故應思維是理如是義大之身若不晝夜精勤此二之因如入寶山空手而回丁三思維難得如事教中說從善惡趣死後復生惡趣者如大地土從彼而生善趣者如爪上塵故從善惡二趣而思難得更應思惟如前所說為何難得四百頌云凡人多執持非是勝義品故諸異生等多定生惡趣此說人等大凡愛行十種不善品類由是定多往生惡趣又如於菩薩等起嗔恚心雖一剎那尚須經刧住無間獄况自相續已有多生所積罪障果未出生對治未壞於三惡趣須經多刧更何須說如是若能决定清淨以茲所積惡趣之因防護新造則諸善趣雖非希貴能如此者亦極珍少若不如是修則定往惡趣既入惡趣則不能修善相續作惡故經多刧雖善趣名亦不得聞此是入行論所說如布朵瓦尊者云在昔盆地有一壯麗碉堡名麻却卡後為賊據經久傾頹有一老者因此堡故心極痛惱後聞復得因不良於行僅憑一矛逶迤而至歎曰今得麻却卡莫非夢歟如是既得暇滿亦應獲得如是喜悅而修正法乃至未得如是心時應當修學如是若於暇身如能生起具足圓滿因相受取心要願望須思四法此中須修行者謂一切有情唯求安樂不求苦惱然引樂除苦亦唯依賴正法故能修行者謂應具足外緣善知識內緣暇滿此復必須現世修者若現世不修極多生中暇滿難得故又須即刻修者謂死期不一定故其中第三能遮推延於後生中修法懈怠第四能遮已知此生須修但以前前年月日未修後後能修之遷延懈怠思惟總攝此二為應速修作三亦可是則念死亦與此聯繫然恐文煩至下當釋如是若由種種門而正思惟制心力大故應如前所說思惟如若不能則應攝持何為暇滿體性現前究竟門中義大道理因果門中難得理趣隨所相宜從前說中取而修行此中從因門中難得者總說僅僅得生善趣亦須修一戒等淨善別說得具暇滿則須受持淨戒而為根本施等為伴無垢淨願為結合等眾多善根現見修如是因者極為稀少由是推度善趣身果若總若別皆屬難得又由果門中難得者謂觀察異類諸惡趣眾唯此善趣是三有邊際觀察同類善趣殊勝暇身是為至寶故應當修格喜奪巴云殷重修此餘則由此引生故當勵力丙二如何攝取心要之理分二丁一道總建立生起决定丁二正說取彼心要理趣初又分二戊一三士夫道攝一切佛語理趣戊二顯示從三士夫門如其次弟引導理由今初佛初發心中間集聚資糧最後完滿正等正覺一切均為義利有情說一切法亦為成辦有情義利是故所成辦有情義利有二謂現前善趣及究竟定勝其中依於初所成辦盡其所說攝入正下士或共下士法類殊勝下士者謂此生中不以為重而求後世善趣圓滿義利唯作能成辦此等之因故如道灯論云盡所有方便唯求輪廻樂希求自義者此謂下士夫畢竟定勝又有二種謂從輪廻僅得解脫及証一切智智其中若依聲聞獨覺乘為準盡其所說一切均悉攝入正中士或共中士法類中士夫者謂於一切諸有生起厭惡欲從三有而得解脫為求自利是故趣入彼之方便三種學處道灯論云背棄三有樂遮惡業為性唯求自寂事故名中士夫成辦一切智智之方便又有二種謂密咒大乘及般若大乘此二攝入上士夫法類上士夫者謂由大悲自在轉故為盡一切有情苦故為得佛位是故學習六度及二種次第等道灯論云由了自續苦所有他諸苦希求正除盡此是上士夫此士所修菩提方便所謂六度及密咒二者後當解釋關於三士夫之名攝抉擇論及俱舍釋等說有多種下士夫中亦有二類有樂現世或樂後世此中是指第二因須趣入善趣無謬方便故戊二顯示從三士夫門如其次第引導理由分二己一顯示何為由三士道引導之義己二如是次第引導之理由今初如是雖說三士然於上士道中亦能攝納餘二士道因此二種是大乘道之支分馬鳴菩薩所宣說者是故此中非是引導唯三有樂為所欲得下士夫道為求自利唯脫生死為所欲得中士夫道是將少許共彼二道作上士道引導前行為修上士道之支分己二如是次第引導之理由分二庚一正明理由庚二明所為由今初趣入大乘能入之門者即是於殊勝菩提而能發心若於相續生此心者如入行論云若能發心一剎那繁生死獄諸苦惱應說是諸善逝子謂得菩薩名已其身即入大乘之數若失此心即從大乘數中還退出故是故凡欲趣入大乘者須以眾多方便勵力令發然發此心須先修習發心利益令於利益猛利善悅而作增廣及須皈依七支願行此是集學論及入行論所說如是所說利益略有二種謂現前利益及畢竟利益初中又有不墮惡趣及生善趣二種若發生心能淨宿所集積及斷新造惡趣之因諸善趣因先已作者由此攝故增長廣大諸新造者亦由此心為等起故無窮盡邊畢竟義利者謂諸能脫及一切智亦依此心易於成辦若於前時無有真實欲得現前及畢竟利益雖如是云云此諸利益是從發心所生應當勵力發心亦唯空言反省自續極其明了是故若於善趣及定勝二種利益生起欲得心者須先修習共中下士意樂如是既於彼二利益生起欲得心已而修具有殊勝利益之心者則須發起生此根本大慈大悲此後若思自於安樂匱乏眾苦逼惱生死漂流理趣心極哀痛毛髮驚豎則於其他有情亦復安樂匱乏眾苦逼惱定起不忍入行論云先於諸有情似此自利心若夢中不夢何能生利他是故於下士時思維自於惡趣中眾苦所逼理趣於中士時思維無寂滅樂唯苦理趣次於親屬諸有情所比度自心而修即是生起慈悲之因大菩提心即因此生故修共同中下士心者是為生起菩提心真實方便如是又於彼二時中思維皈依及業果等門多門勵力集福淨罪是為菩提心前行如是由七支願行及皈依等如其所應既為對治相續方便亦當了知此等是為生起此心方便此中下中一切法類即是生起菩提心支分道理凡為師者亦當曉喻弟子於此應獲定解每次修時當念此義則於修時極應愛重若不爾者則此諸道與上士道別別無關乃至未達正上士道於菩提心未得定解而為生起此心障碍或於此中失大義利故有情於此應當殷重如是若善修已於相續中隨力令生真菩提心次令此心能堅住故應以不共皈依為先而受願心儀軌既受持願軌已學諸學處次應多修欲學之心而學六度四攝等學處若由至心起欲學已再受行心清淨律儀次應直至捨命不犯根本罪戒餘中下纏及諸惡作亦當勵力不染設若有犯亦應如所宣示犯後對治門中善為淨治次於六度總則學習別則令心於善所緣此能如欲而安住故應學止為體性靜慮次為斷除二種我執縛故以見决定空性真義次應將護無倒修法成辦慧為體性之觀如道灯論註釋說如是除修止觀學習律儀學處以下是為戒學止為心學觀為慧學復次止以下是方便分福德資糧依世俗諦道廣大道次生起三種殊勝慧者是慧分智慧資糧依勝義諦甚深道次應於此等次第决定數量决定方便智慧若是分離不証菩提故應生起廣大定解如是由諸共道淨相續已决定應須轉入咒道以若能入速能圓滿二種資糧故設若此外非所能堪或由種姓功能羸劣不樂轉者則應唯將此道次第漸次增廣若入密咒者依止善知識法當是勝出前者以總一切乘別咒乘中殷重宣說故次以清淨續部所說灌頂成熟身心爾時所得三昧耶及律儀應寧捨命如理護持別言之若犯根本罪染雖可重受然相續己壞功德難生故應不染設若有染亦應悔除防止令淨故當不為一切支分罪染所染次染密部若是下部有相瑜伽若是上部生起次第隨其一種善導修學此堅固已若是下密部無相瑜伽若是上部圓滿次第隨於其一應善修學如是建立道之正體是道灯所說故道之次第亦應如是引導庚二明所為由若中下士諸法類等悉是上士前加行者作為上士道次足矣云何別立共中下士道名目耶別分三士而引導者有二大義一為摧伏增上我慢謂尚未起中下士夫之心即便自許我是上士二為廣益上中下心廣饒益理者謂上二士夫亦須希求善趣及解脫事故於所導上中二類補特伽羅教令修習此二意念無有過失起功德故若是下品補特伽羅雖令修上既不能發上品意念又棄下品俱無成故復次為上善根人宣示共道令共修習此等功德前已生起如未生起速令當生若生下下可以引導上上故於自道并不迂緩須以次第引導心者陀羅尼自在王請問經中以善巧摩尼匠人漸磨摩尼法喻合說龍樹依怙亦云初中善趣法次生决定勝以得善趣身漸得决定勝此說善趣身及决定勝道次第引導聖者無著亦云又菩薩者為令漸次成辦正善品類故於諸劣慧凡夫為說淺法隨轉粗近教授教誡知中慧者為說中法隨轉中間教授教誡知廣慧者為說深法隨轉幽微教授教誡是名菩薩於諸有情次第利行聖者提婆亦於攝行灯論中先須建立修習波羅密多乘意念次趣蜜咒漸次道理嗢陀南云諸初業有情趣入勝義諦佛說此方便漸次為階梯
