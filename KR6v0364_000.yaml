front:
  text: 菩提道次第略論譯者序佛教已逐漸世界化尤其在亞洲幾乎普及到每一角落如中國南北韓日本暹羅緬甸錫蘭越南馬來印度等國佛教徒占了總人口的三份之二然而欲求保持佛教的完整無論在學術上在實行上在發展上在制度上處處表現有其獨特的風格者那還是首推西藏西藏佛教導源於第六世紀那是中國的盛唐時代漢族文明發展到了最高峯這時距離鳩摩羅什法師譯經已有二百餘年西藏則因松贊岡布王之與文成公主通婚而把佛教種子帶來了西藏若以時代來説西藏佛教應與日本同一傳播時期五九三六二八但在特質上兩地則大異其趣日本是完全以漢文佛經為主多少世紀來脫不了印度早期佛學的窠臼故在形式上及思想上多是保守的毫無新發現西藏佛教就不同了牠是直接師承印度假定印度晚期佛教是以世親而後為起點直至印度佛教滅亡其間約八百年而那爛陀寺及超岸寺的學風經過幾個世紀的陶鍊已與早期大異其趣當玄奘法師留學印度時未聞龍樹提婆等空宗有宗大師有關於密宗的特別著作待佛教開始輸入西藏密教學説已發展到與中觀唯識不可分離的階段那爛陀寺的上座們公開研討密教已列為主要課程見達惹那他佛教史在今天西藏丹珠爾大藏中存有不少的密教論典是龍樹提婆等所著而且印度晚期佛教聖人如月稱的中觀論獅子賢解脫軍的現觀論法稱的量釋論金洲的唯識論德光的戒律論都是晚期才有的傑作這些均在印度佛教衰亡之先而傳入了西藏加以西藏代有聖人如寧瑪派的創始人蓮華生大士迦當派的創始人阿底沙尊者薩迦派的創始人貢曲甲布迦舉派的創始人瑪巴及彌拉勒巴菊南派的創始人米交多傑及達惹那他等無不解行並勝學貫梵藏闡幽探微發前人之所未發且能加以融會貫通形成佛教中一種特殊風格在以上歷代聖人中格魯巴教主宗喀巴祖師尤為晚出之傑出人物宗喀巴祖師一派之學説其所以在西藏發生龐大影響作用之原因分析起來約有四點一理論精闢知見正確二極重實踐三組織完密四凡聖階段依據顯密次序井然是那爛陀寺而後最能通達三藏者因為學佛的最高目的是能獲得成就如果知見不正何以能修又何以能證關於知見是否正確這個問題古往今來的祖師們無不重視對於了空之程度西藏早期修密法的人也同中國祖師禪一樣的不依經教只著重在氣脈明點等等有漏神通之外相偏重定學漠視慧學不依道次而修大悲心菩提心這與今天修密法的人沒有兩樣請注意中國禪宗是頓超法門但奈衆生之根性何自宗喀巴大師起才把清淨正見作一個肯定的明確指示所謂清淨正見就是了解緣起道理一切諸法緣生幻有緣會則生緣散則滅有不撥無無不執有如諸法本無實性何能執為有又諸法名言假有豈可撥為無生死法固是寄於妄執假有為實有故萬劫沉淪就是涅槃法也是依於斷障而安立豈可也落相執學佛的人未能透徹了解此理每每以為世間萬法都沒有只有涅槃是實這仍然未出斷常二邊之邊見斷就是損減執無見譽如鏡中人影雖無實體但由明鏡空間光線人體等因緣會合自然便有人影顯現且能發生應有的作用應承認其假有幻有而不能全無全無則影響了善惡業果生死輪回大道理常就是增益執有見譬如人法二我自性本空但因衆生無始妄執習氣之所薰染於是遂起我法二執由我執故障礙涅槃由法執故障大菩提若能離此斷常二邊則明白了解世俗諦是怎麼一回事勝義諦又是怎麼一回事世俗與勝義兩者的關係是一是異既了緣起即是了空故龍樹云因緣所生法我説即是空其空之定義不僅可解釋為緣起故空空故緣起且可釋為自體本淨如果再於空上而起空執有一性空之實體或起無執性空為畢竟無則又離開中道遠甚故中論云若於空起執斯人無可救總之言語道斷心行路絶之境界若以凡夫之心度之則無不處處碰壁故生死根本首在我執我執又因於我見若能破我見斷我執乃能常住於明空無執境界至於修中道正見的方法本論亦有詳細説明先以四理或七相觀察衆生無始時來所執的我通達我空再以四理或破四生等理觀察衆生無始時來所執的實法通達法空四理就是一認識所破的我二決定我與五蘊的或一或異二者必居其一三認識我與五蘊是一的不合理四認識我與五蘊是異的不合理七相就是一我與五蘊是一異我與五蘊是異能依我依五蘊所依五蘊依我具有我有五蘊支聚五蘊合聚為我形狀五蘊組合的形式為我四生就是自生他生共生無因生以四理來破所執實法先認識所執實法與構成牠的支分再以我及五蘊為例照上述以四理破我的道理來破既通達無始妄執的我及實法空再詳細推察緣起道理得知諸法雖無性而有緣起因果如果還覺得緣起因果與自性空各是一回事就是還沒有真正通達中道深義若是由見諸法因果緣起就能破除內心執著了達諸法空無自性才是得了中道正見這樣的正見不只是由空來破常執而且見緣起有的力量來破常邊不只是由見有來除斷執而且由見空無實性空的力量來破斷邊這就是中道正見的特殊作用然僅有甚深見仍不足以成大菩提須有廣大行為之輔導廣行六度四攝始得謂之圓滿福智資糧佛號兩足尊義即指此若無空見之布施縱然盡有情仍不得謂之布施圓滿以仍未能空去布施之體相用故亦不得謂之波羅密凡夫二乘均能行布施持戒律之所以不能稱之為波羅密者其分際是在未得甚深般若大乘經論講六度互容互攝布施中有般若般若中有布施乃至禪定亦爾此是大乘佛教所特有之真精神是真佛教然如何能做到六度互容互攝其命脈又在禪定智慧二度之能否雙運故宗喀巴祖師在本論中有別明止觀二卷議論精要次序井然是乃本論之精華在漢文大藏中亦有不少關於止觀論著如天台智者大師大小止觀博引旁徵詳則詳矣然總嫌其語未中的尤其凡夫定境異生定境聖者定境實際含混令人難以捉摸祖師語録如六祖壇經精則精矣又非普通根性當下立斷豈如本論之刻劃入微痛快而淋漓也哉宗喀巴祖師之學説在中國邊強風行六百餘年迄今未衰藏中學者雖以宗派關係研學方便容有不同但以宗喀巴之學説組織完滿超越古今若言正宗獨繫於此以與漢文流行佛學相比則其得失短長自可立判日本佛教更不必論矣時至今日還在捨本逐末之中極類印度初期大乘佛教流行之情形蓋印度初期龍樹無著所釋經論大多銜接小乘毗曇辨析法門不厭繁博令人難以獲得心要歷後著述則較簡約如四百論之於中觀攝論顯揚論之於瑜伽然猶未臻簡要至寂天菩薩入菩薩行論出則刪煩存淨資於修行極切實際此種簡當之風因阿提沙尊者而傳至西藏宗喀巴祖師遠承龍樹無著中承佛護月稱近承阿提沙於清辦之辨難縱橫唯識之組織微密悉無所取蓋即承受此種學風而來以視後代注疏演譯注疏愈多真理愈遠之捨本逐末者固遠勝矣又印度自瑜伽菩薩地而後有組織井然之菩薩學然猶條理較繁至寂天菩薩以六度為綱綸貫經論以成集菩薩學論益見簡要阿提沙更取其精要著菩提道炬論即本其意取捨諸家當於修行故炬論釋增上戒取瑜伽菩薩地以龍樹之書於此不備釋增上心則取中觀家言以瑜伽於此説之過繁無覺賢資糧品之精要又如唯識諸藉説增上心學又失之大略又不如中觀方法之圓備故唯中觀之説為獨適矣如是以實踐為鵠的而組織異言形成一時之學風而悉傳之西藏益發揮之自宗師而後以瑜伽學為廣行中觀學為深觀合龍樹無著二大家渾然為一大乘學實際顯現不託空言以談修學似無間然矣宗喀巴祖師生於紀元後一三五七年籍貫中國青海十六歲入藏遍參名師習學經教草二歲後閉關自修獲大成就卅一歲著現觀莊嚴論金鬘疏從此講經説法廣行教化直至六十三歲圓寂一生之中説法數百次著書數百種建立佛寺數百所有名的西藏三大寺即其創建大師四十六歲時著菩提道次第廣論自以卷帙浩繁有失精要乃於五十九歲時更著菩提道次第略論是本論為大師最後定量之著可無疑義譯者自幼醉心佛教少受庭訓尤慕玄奘法顯之高行乃弱冠赴藏訪求大德親承教授旅藏凡十餘年有入寶山之感方期繼續研究不意大陸變色乃避亂香江一九五八年春因應香江佛教同人之請開講本論隨講隨譯隨譯隨刊將近脫稿適譯者又有美洲之行直至航近檀香山始全書譯完故本論前四卷譯於香港後一卷譯於日美途中至譯者本人佛教思想在知見上余奉宗師為正宗在實修上則各派均無所偏頗故當入藏之初先從噶舉巴學大手印繼從寧瑪巴學喜金剛二次第又從薩迦派學密法大集最後所受黃教灌頂尤多不可勝述總之見正則行無不正特志於此以與學佛者共勉方今世亂日亟亞洲人民水深火熱茲願以此譯經印經功德回向全世界人民獲致永久和平譯者序於美國加州大學圖書室一九五九年七月四日菩提道次第略論科目茲將全文分四科卷頁甲一為示法源尊貴説造論者殊勝分三一二乙一種性圓滿一二乙二得功德身分二一二丙一得遍知聖教功德一三丙二得如理修證功德一四乙三作聖教事業分二一五丙一於印度所作一五丙二於西藏所作一五甲二為對教授生起恭敬故説法之殊勝分四一七乙一證得與一切聖教無違一七乙二顯示一切佛語教授一八乙三為易獲得佛語密意一一乙四由遮止甚大罪行之有情殊勝一一甲三具二殊勝己説者聽者應如何作業分三一一一乙一聽者法軌分三一一一丙一思維聽法功德一一一丙二於法及説法者生起敬仰一一一丙三正聽法軌分二一一二丁一斷三種過失一一二丁二依止六想一一二乙二説者法軌分四一一五丙一思維説法利益一一五丙二於佛及法生起恭敬一一六丙三由如何思及行而説分二一一六丁一思一一六丁二行一一六丙四於何境可説及不可説之差別一一七乙三共同作業一一七甲四正説如何引導弟子次第分二一一八乙一道之根本依止善知識法軌分二一一八丙一生決定故少許聞釋分六一一八丁一所依善知識因相一一八丁二能依弟子因相一二丁三如何依止理趣分二一二一戊一心依止理分二一二二己一根本修信一二二己二念恩起敬一二三戊二行依止理一二四丁四依止功德一二四丁五不依止罪緣一二五丁六攝以上義一二五丙二行軌攝釋分二一二六丁一正修理趣分二一二六戊一時分正體如何作分三一二六己一前行一二六己二正行分二一二九庚一總修理趣一二九庚二此中修理一二九己三結行一三戊二未修中間如何作一三丁二由二種修行理趣辨別何修理一三二乙二依止後如何修心次第分二一三四丙一於有暇身勤取心要分三一三四丁一正明暇滿分二一三四戊一暇一三五戊二滿分二一三五己一五自圓滿一三五己二五他圓滿一三五丁二思其義大一三六丁三思維難得一三七丙二如何攝取心要之理分二一三九丁一道總建立生起決定分二一三九戊一三士夫道攝一切佛語理趣一三九戊二顯示從三士夫門如其次第引導理由分二一四己一顯示何為由三士夫道引導之義一四己二為是次第引導之理由分二一四一庚一正明理由一四一庚二